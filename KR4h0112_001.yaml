body:
  text: 文氏五家集卷一明文洪撰淶水詩集墅村雜詠五首避地心方定耽詩癖漸增閉門防俗客下榻待髙僧逺志雖雲驥生涯尚雪燈聖恩原曠蕩潦倒愧無能其二春雨朝初霽居南似錦沙野猿窺落果林蝶戀殘花引水斜疏沼編籬密護家何憑消永日欹枕讀南華其三納涼開北牖防雨覆西垣自得翻書趣渾忘對客言徑隂螻蟻集林暝鵓鳩喧分得清溪水時時灌藥園其四楊柳津亭北幽軒瞰碧波緑鋪雲葉足紅落雨花多載鶴湖中放看猿澗底過有時攜短策松下聽山歌其五地僻意還便春來物物妍微風翻麥浪淺水浸荷錢林靜疑塵外山晴落枕前幽情忘不得次第入詩篇詠泉噴雪蒸雲不盡頭玉龍飛下碧山秋江湖莫作閒風浪須向人間旱處流柳枝詞芡葉寧如荷葉香素絺那比葛衣涼人生莫學章臺絮飛去飛來枉斷腸對菊蓐收肅霜威草木咸凋瘁眷兹東籬藂孤芳可人意迎風散竒芬浥露含幽思吾生抱孤僻兹焉獨云契醉誦離騷經閒咏柴桑句外慕茍不羈蕭然有真味夏月行畦隔田疏雨浥浮埃信腳郊原意暢哉桑葉漸稀蠶欲老菜花都盡蝶空來農歌時逐車聲起藜杖遙隨落日回景物清妍還滿目臨風欲賦愧無才送祝先生維清赴召錦服才看故里逰又隨嚴詔向神州依歸誰不歡襟佩簡注其如切冕旒紅霧一庭螭陛曉清風千里桂林秋乘時早建平湖䇿丹鳯重鳴十二樓五雜俎五雜俎宫錦袍往復還挈冰橰不得已南郭逃自君之出矣自君之出矣鸞鏡護常深留待君歸日持將照妾心題畫浩浩前山雲盤盤後山路我欲訪仙源歸來恐迷誤杭州感舊髫角隨親客武林六街行樂及芳辰翠分螺黛三峯曉花擁笙歌萬户春青幕紅欄臨水店竹輿油笠看山人十年厯厯重遊事慌忽前生與後身南行舟中雜述露白沙涼月滿空雁聲厯厯度西風客程尚與鄉關近歸夢如何便不同兀兀篷忩意不舒苦無人與寄家書家人此際應相說知過錢唐幾日餘蘭橈乘月渡錢唐萬事辭家已漸忘惟有老親牽夢寐宵來三度在高堂力挽孤舟溯急湍溪流如箭湧狂瀾長年為指前頭水此是南行第一灘九里瀧峭壁攢峯一萬重小舟曲折亂山中濤飛近渚潮潛應岸轉回塘路細通蔽野瘴雲朝霧黑帶溪霜葉晚霞紅書生小濟心私慶十日蒲帆逐順風烏石灘百川過雨灘聲亂渺渺雙篷溯急流山氣蒸雲斜走馬浪花飛雪倒行舟參差漁網斜陽外零落人家古渡頭望望三衢知不遠爛柯山下即龍丘寄家書緘書千里托鱗鴻雲路漫漫歎未通為報白頭親莫念平安還與在家同自警人生受斯理厥初本無僞一物為之役聖賢始縣異惟聖乃克全浩浩莫匪天弗假思與勉所欲咸自然衆心緣汩沒斯理未純一惟學能反之兹焉造其極反之曰伊何亦曰慎其獨日用亦云糾罔俾有纎恧一念隱以微淵然人靡知而我於斯時必謹察其幾暗室屋漏中神明常在側翼翼深自間天理何曾息畫景尺素山千頃雲多路更深人行巢鶴磴寺接掛猿林雨過朝添澗霞生晚護岑江南舊風景時得畫中尋雪畫雲沍長天雪滿林釣魚人去巳黃昏分明一段山隂意底事高人不出門宛轉歌宛轉復宛轉宛轉情無斷郎情似車輪妾情似香篆車停輪亦歇香盡篆亦滅郎情與妾情宛轉何時輟羅敷行采桑怕歸遲使君前致詞君詞何綢繆不顧妾蠶飢君將金買心妾將金比身君金可柔淤妾心亦漂淪妾夫本有婦君婦亦有夫使君當自思無事挑羅敷書鐙小小銀釭短短檠紙屏風定暖浮馨春花一穗吐金粟秋水半泓涵素星致用不宜筵上舞第功應廢案頭螢他時肯作牆根棄傳與兒曹照一經倦繡圖簇得芙蓉兩朵金倚牀無語又沉吟玉奴都不知人事抵死相催下幾針還鄉非關張翰憶鱸魚不為陶潛念菊籬底事歸心急於箭雙親門巷立多時寄友書劒飄零故舊踈離懷戚戚竟何如江山不隔還家夢魚雁難通寄友書藝館晝閒花落後柳塘風軟燕來初楚雲吳樹元相接靜倚江樓嘆索居睡起寂寞掩林扉東風晝方永睡起落紅多斜陽半樓影春暮垂楊覆井欄新筍漸成竿數日無人到薔薇獨自看病目患目強難開冥心暫死灰併除青白障寧計晦明催默誦新成句愁閒舊舉杯近來添佛念十日面如來下第回經丹陽京塵漠漠染襴衫依舊書生跨蹇還防虎夜投淳化鎮聽雞朝度句容關僕夫已熟驅馳事道路爭看困悴顔六誤科場垂草載鬢毛那得不斑斑春日郊外書所見麥熟菜黃三月天村姑塗抹鬭嫣然茜紅裙子東風揚小立沙頭喚渡船蠶月人家戶若封小姑隨嫂入桑中蓬頭赤腳無顔色只有裙兒映水紅漁父睡鷗個個鋪明沙清商一曲鳴蒹葭垂綸似忙還似暇意豈果在尋魚蝦魚多還將換村酒暖酒烹魚坐船首醺醺囑婦早曝網嗚嗚命兒急擊缶儂家此樂真自然何必人世無神仙全家不知離别苦年年歲歲江湖邊村居六言村前村後放犢溪北溪南捕魚案頭積高士傳門前迎長者車秋夜六言楊柳搖階月色梧桐落井秋聲報道銅壺漏轉先生酒醒詩成香奩三首倦倚雲屏意暗傷錦衾瑤鴨靜吹香如何花外濺濺漏才到孤眠便覺長半幅花箋著樣裁丁寧緘與玉奴來就中盡寫難言事莫向人前便展開龜甲屏風繞絳籠夜深涼冷與誰同愁來恨殺歸寧事斷盡人腸是此風鶺鴒碧池露冷秋荷悴鶺鴒兩兩迎風戲相呼相喚不能違欲去不去情依依眷兹微物尚知義寧不令人憶兄弟莫春郊行樹裏人家半露牆郊原春盡有餘芳偶然聞鳥扶藜出不覺沿流去路長一抹微風柳吹絮滿村晴日麥登場何時解脫人間事來結山翁作醉鄉次韻丁雪坡遊仙玉龍觀前花亂開飛瓊邀我相追陪翠管聲翻羽衣曲緑醅香㵼流霞杯試騎長鯨入海舞忽有孤鶴橫江來清風吹夢寂無語弱流渺渺空徘徊句容道中拂面風埃已句容依然風景去時同不堪一種秋池上寂寞芙蓉尚未紅宿白土僕夫倦行役迫暮停征輪解鞍憩村墅言兹息艱辛爇薪代明燭敷草為重茵呼童買村酎滌我胸中塵酒薄心不怡欲醉渾無因傷哉東野蹇痛矣范叔貧亦知有命在念此白髮親出白土晨興即長路曙色喜初分白土家家店青山處處墳虎踪當路見雞唱隔林聞逰子心中事悠然嶺上雲漁父一葦橫江澨船頭雪正飛魚租輸未足不是暮忘歸訪徐尚容滸溪溪上草堂閒雲樹千重杳藹間欲向梅南問消息東風吹我過西山阻雨再疊前韻偶尋君至得身閒十載情悰一笑間天意不教人遽别斜風吹雨暗前山無題集句四首一别音容兩渺茫羅幃空度九秋霜日高睡起無情思萬轉千回懶下牀子規枝上月三更展轉紗帷睡不成添得情懷無是處背燈愁泣到天明夜合花開香滿庭酒醒還醉醉還醒一痕心事難消遣卧看牽牛織女星山色滿樓人未歸淚痕空濕嫁時衣何由得似雙鸂鶒只過寒塘亦並飛毗陵道中昨日嘆辭家今日行更遠因思明日程忡懷愈難遣志喜桂子吹丹香滿身姓名今日薦書新幸酬老大青雲志粗慰衰遲白髮親霧斂南山通隱豹水生北渚縱窮鱗草年一舉非容易豈是看花得意人丹徒鎮冰合陸行至江口曉起敲冰促去程舟膠無計達江城功名何物能驅我冒冷丹徒鎮上行北行道中述懷又攜憔悴上京華行李三千北望賖親老誤將身許國歲殘時有夢還家聲催落木風添信隂結層空雪弄花客緒懨懨排不得坐籠紗帽自煎茶宿遷夜行雲籠新月映青霄坐啓孤篷促去橈積雪滿川風色緊旅懷添得是今宵獻縣早發曉起驅車涉大荒離離雲月照車廂酒醒怪得寒侵骨起視征衫滿袖霜客中思親帝京逢歲晏南望憶親居負矣冬溫被懷哉暮倚閭漫多歸去夢頻閲寄來書說著農家樂從前悔業儒中乙榜不就南歸喜承恩詔解儒官正以為師自古難山斗怕孤諸子望雪螢未遣舊氊寒半擔行李和書束千里江山引劒看獨有懷君心未巳紫雲西北是金鑾吕梁洪經旬病體怕支風兀坐篷忩若夢中慌忽耳邊奔萬馬扁舟橫渡吕梁洪渡江渺渺寒江駕短篷斑斑頭髮尚西東淹流客況兼逢雨輕薄征衫不受風萬里長空沒鷗鷺一泓秋水老芙容十年書劍成何事羡殺磯頭把釣翁先府君復土手培新土漸成墳誰念傷哉子路貧三釡空懷他日恨一衾才掩沒時身精英不斷惟餘夢禮限難踰尚作人三尺青松和露種百年腸斷紙錢春除夕風物蕭條一歲殘忍將衰病對椒盤蹉跎尚握班超筆慷慨時看貢禹冠梅漸有香因得暖竹能無恙為禁寒一杯莫道貧非幸且得團圝共笑歡高郵湖參差城郭是高郵望望平湖不盡頭初日蒼涼波底上閒雲零亂水心浮平分烟樹藏村塢並立鸕鷀傍釣舟一笑乘風馳百里片帆回首失揚州宿汶上汶上經過薄暮天空村雞犬亦蕭然編茆作屋才容膝築土為牆不及肩老少團圝依壞坑牛羊成隊下荒阡旋持藳秸炊黃黍斜日西風一縷烟言懷十年書劒屬飄零憔悴青衫太學生有子䇿名粗畢志衰年隨計未忘情風塵欺鬢蕭蕭短雨雪侵衣漠漠輕爭似歸來故鄉好西山自買薄田耕友人陳君竹圃主人自種千頭竹手洗長竿結為屋層層蒼翠作深幃瑟瑟清風響寒玉湘雲一片蔽晴空卓午猶疑未晨旭炎炎赤日燒空時涼隂四布無纎燠也知高興比王猷終日臨軒靣晴緑閉户常令俗駕回掃榻時延清隱宿豈惟至貴等封侯得此兼令人不俗世塵不到意殊清肯厭常貧食無肉過易水馬頭沙草入秋枯易水蕭蕭恨有餘烈士聲名在天地伯圖消歇有丘墟千年吕政辜難逭當日燕丹計亦疏不盡書生懷古意西風斜日倍唏噓寄林時官永嘉雨雪天寒雁北飛越南燕北渺天涯可憐薄祿驅人得兒客南窮父北陲題畫六言籠柳輕煙不斷催花細雨無多古徑深藏蔓草小堂遙隔松蘿寄舅父國子張先生碧梧飛葉動秋風回首江南意萬重斗祿驅馳疏骨肉百憂荏苒變形容囊無長物貧依舊案有清樽病亦封望望渭陽情不極幾回談笑夢中逢秋日思歸庭樹蕭蕭忽報秋離懷拍塞思悠悠敝廬南國何人守薄祿窮燕竟歲留馬上黃塵深汗靣樽前白髮已䝉頭西風吹醒功名夢一片閒情繞故丘歸得園二十八詠歸來堂久客念當歸何待秋風生黃花有佳色青山無俗情是間有真樂悠悠空令名今是亭履道心神融馳勞性真涸是非兩悠悠大夢誰當覺陶翁悟已久疇須問今昨晨光樓人生亦旦暮一往不可追晨興陟層樓光景已熙熙感此惜遲暮悠然千載思三荒徑種竹滿東原清隂接鄰壤三徑未全荒秋風吹灌莽不容車馬過幽人自來往菊存坡杪秋風氣肅繁霜被原野采采黃金花盈盈尚堪把會心即欣然何必東籬下自酌軒牀頭酒新篘南軒花初灼開軒對新花引酒自斟酌無人不妨閒客至亦不惡寄傲忩忩前有涼風道上有車馬渺渺塵埃中何似南軒下未問羲皇初自是遺形者容膝窩人生百年內所適但秋毫顧此易足形而以物自勞一安等千厦始識柴桑高日涉園芳園僅十畝頻䇿信夷猶嘉蔬日夕繁緑隂行已稠豈曰勤四體亦復散襟憂常關門青苔滿蘿徑白雲護雙扉非關習性懶地偏人迹稀春風翠簾捲惟有燕來歸流憩坳肆目山之坳意行還自息萬里白雲思悠然寄輕䇿天地寂寥中此意無人識出雲岫古岫寒冥冥春風雲靡靡日出行雨歸日暮隨風起彼美山中人無心任流止知還巢鴻鵠萬里心秋風迅征翰何如巢栖鳥朝翔暮知還彼狂志四海此借一枝安盤桓處歲晏空山寂端居寡過逢衆卉紛已息悠然撫孤松澆世不可羣聊復托高蹤息交齊脫簮謝朝行泉石任蕭散非關世我違自覺交游懶稍得喧煩隔不嫌輪鞅斷情話館浮世白日短青春曾幾何言念親故歡顧景共婆娑倘此畢歲年所得良已多琴書室讀書娛道心非以祿仕謀瑤琴無俗調聊以寫煩憂彼窮方求知寧復知天遊西疇舍緑野佳雨霽芳條青鳥鳴東作念良日西疇課農耕丘園無俗事隴畝有閒情巾車岡崇岡帶平壤時時巾我車春晴涉芳陌秋晚厯荒墟於焉有真適終老不願餘棹舟溪清溪不可唾時時載輕舟鮮颷漾文裾弱槳依寒流禽魚共翔泳日晚更夷猶窈窕壑平生謝幼輿寄情在一壑豈無治世才不易閒居樂酒醒山月高松風自回薄﨑嶇丘楊侯不去鄉端思釣逰處一丘何足多當年共容與魚鳥亦會心良能供暇豫欣欣林膏雨潤芳原欣欣樹如沐物化無終窮春風自清淑還似端居人道榮生意足涓涓泉新流瀨寒谷涓涓湜而沚不供濯文纓聊堪洗塵耳悠哉川上情誰應會深㫖植杖坪閒居鮮世營良辰每孤往一笑自耘耔芳坪堪植杖豈惟服農勤亦足寄遐想舒嘯嶺登高發孤嘯聊以寫憂端松風挾鼓吹疑是鹿門山孫登不復生勝踐屬高閒清流閣清風在閣上流水在閣下纎塵不復生須眉堪倒寫日暮聞滄浪知有臨流者樂天居榮願有終畢富夀豈人為彼狂不知天徒為小兒嗤所以柴桑翁乘化不復疑道傍殘碑夕陽贔屭擁寒莎土蝕苔荒斷亦訛人世直饒金石固百年風雨亦須磨古井改邑何妨舊井存苔花翦翦石欄春轆轤聲裏千年澤不是郵亭閲過人漁歌斜陽詩思繞寒汀何處秋風欵乃聲水渺蒹葭情不極錦溪橋下白烟生村漏風雨空村人斷行荒譙寒漏夜冥冥不須辛苦論長短正好詩翁醉裏聽魚紫萍香暖雨初晴波漾纎鱗映日明欲識遊鯈箇中樂試從濠上問莊生文氏五家集卷一
