body:
  text: 文氏五家集卷十二明文肇祉撰録事詩集五言律詩侍大父過王二丈履吉越溪莊隨翁訪叔度放棹越溪深竹徑數椽屋桑園十畝隂汲泉頻洗硯促膝坐鳴琴髙士平生慕今朝慰夙心汪子木園與薛用傳施安卿明卿陳子白文會名園啓文會繞屋樹交加捲幔窺新燕臨池看落花樂耽長統志書效子雲家竹裏輕煙出軒前試煮茶野望因過楞伽侃公精舍野曠山藏寺祗林一望中諸天懸采翠殘照遲晴空松下疏精室簷前聽晚鐘欲耽清淨賞隨喜訪支公石湖湖光披白練日夜泛青簾帆影鏡中落鷗羣沙上眠楞伽山裏寺茶磨晚含煙羡殺鴟夷子飄飄去不還蔭白堂即事結屋近清嘉虛堂背郭斜門間人問字簾捲鳥啼花盛世容踈懶端居戀物華齋頭書滿架不羡子雲家早起曉起露光沃熙微景物鮮窗間蠅擊紙庭際草含煙短髮頻看鏡殘星猶在天虛齋絶塵想坐久意澄然月夜與王明度明善登文筆峯晚來秋雨霽山月向人髙同上留雲閣因攀栖鶴巢詩聮林外句幘岸醉中豪獨立羣峯下天風吹鬢毛讀書楞伽寺松風閣重來湖上寺借榻上人居月色侵虛閣松聲和讀書攬衣驚鼠下開卷試燈初萬籟一時寂鐘推更漏餘雨夜與吳元定朱日宣范子潤王玄靜袁振伯集石湖草堂晚步山中寺堂開萬竹林清宵一把盞細雨共論心秉燭成歡會髙歌傳谷音佛前禪誦息遙聽磬聲沉天平山謁范魏公祠入山人境隔古寺白雲留萬笏齊青漢斜陽下石丘義田存後裔勳業慰先憂尚有泉清冽濺濺一脈流餞馮信伯杜與言會試小集樓居好開窗新捲簾名推馮奉世聲重杜樊川二妙忽同至一杯行色前行行曲江上更喜得春先過陳丈白陽田舍留集浩歌亭種竹開三徑編籬翠作屏憐公千載調憶别兩秋螢杯盞香醪白盤餐菜甲青因過問竒字醉卧子雲亭外舅召復翰林兼司經局校書當代青宫輔如翁獨異才校書供閣直補衮代天裁名譽留東觀文章落上台輞川空别業未許賦歸來寺遊同王玄靜正上人野寺羣峯裏藍輿一徑通窗開飛瀑外殿落翠微中饋饌延過客翻經叩逺公慚非蘇晉侣玄覽得相從黃約之愼之招飲書齋江夏聲華舊君家譽望宏獨憐千古調喜得二難并方館開嘉宴庭梅吐玉英寒宵須秉燭月上巳深更虎丘出城將數里塵土離人寰逺見林端塔來登寺裏山雲飛千頃碧石點一臺斑簫鼓中流起白公堤上還楞伽寺湖山樓同朱日宣王履均王玄靜侃朗二上人晚眺湖上知名寺樓臺倚碧岑法堂虛枕簟狂客散冠簮塵劫空中滅鐘聲靜裏沉方知禪可托共禮白雲深秋夜王吏部録之丈招飲吏部聲名久堂虛客到稀舉杯留夜酌邀月弄清輝露沃天香襲談霏玉麈揮清朝思報答明主正垂衣毗陵舟中約陸子行韓承孚從陸入京雷聲喧夜泊早巳過毗陵驛樹隨溪度篷窗帶雨憑語音時漸别壯志欲鶱騰明日丹陽郭肩輿擬並乘丹陽早發丹陽道行行路轉賖聽雞過野市並馬踏槐花酒肆青簾接茆茨緑水斜征途知不逺明日到京華高橋門秋風吹鴈影佩劍斗光寒輦路飛塵逺橋門勒馬看青宵雙鳳闕黃屋五雲端題柱平生志何時上禁鑾姚元白市隱園借榻禁城藏别業披莽似郊坰沼引秦淮碧山排鍾阜青竹光分曲徑秋影瞰虛亭下榻市喧息林扉盡日扃雨花臺金陵山水勝佳麗是城南法雨飛空磴天花散碧潭明光曽杖錫太白有吟菴行到煎茶處泠泠玉一涵徐魏國園亭麟閣勳庸冠金貂寵後昆氷漿浮碧碗槐桞蔭重門池泛青簾舫堂開白玉樽笙歌時不徹月上巳黃昏葉曽生書齋結屋近山塘柴扉護短墻野花開竹徑湖石磊山房室淨生虛白窗明拓硬黃晚來人散後獨自引壺觴九日不出一秋慚失意九日廢登臺菊為佳辰發懷從濁酒開哀蟬猶夕響征鴈向南回時序愁中改城髙砧杵催君山與黃吉逺望石徑攀蘿上風松山半亭天浮江共逺沙積水俱渟海蜃吞銀闕秋煙虛翠屏春申遺像在吾亦薦溪萍大父玉蘭堂小酌時將奉侍家君應試南畿吾祖巳垂白堂開聚德星衣裳動雲氣杯酌吐玄音喜共趨庭日那堪駕逺臨歐公倘相遇蘇氏慰初心侍家君同黃子旋杜與言過龍門得二鯉家君賦詩因命作鼓枻龍門上驚看雙鯉跳錦鱗初出水鰭鬛欲騰霄霜創霏花白松枝帶葉燒欣然一餐飽把盞自通宵焦山山寺猶存姓門寒古樹停丹臺雲氣紫蓮閣寶光青未辨華陽逸空餘瘞鶴銘登臨吾巳倦暫憩海雲亭登金山波心千古寺日夜一峯浮草色分江岸潮聲帶海流月髙人返棹更靜水鳴樓欲坐金鼇閣攀躋最上頭出場月色如晝侍家君至顧尚書園登見逺樓長安秋過半乘月上危樓星斗中天燦乾坤萬里周漏傳金闕逈桂瀉玉杯浮坐久忘言處臨風起暮愁江上懷張幼于獨卧吳淞上令人憶季鷹詩篇憐敏捷志氣羡飄凌天末雲千疊江頭月半稜軍麾今滿眼音問阻親朋太湖太湖八百里七十二峯縣震澤禹功逺洞庭仙迹傳波翻沙際鳥石繡鏡中蓮煙水秋來濶平吞萬里天黃子旋宅會文清嘉風土淨華館晝沉沉選日開文宴良辰會盍簮追隨期辨志相與共論心亭際無塵雜松聲奏雅音春晝午睡酣初醒日斜花影移夢回烹紫笋几淨寫烏絲乳燕窺新竹文魚漾淺漪問竒人去後一任掩茆茨杜與言登衡嶽回鴈峯有佳什見寄回鴈峯頭坐新篇寄舊知憐君遙念想動我故鄉思南嶽開雲處高樓待月時此時一壺酒誰與共傳巵過孔加丈蕉露館髙人多道氣曉啓碧窗寒摘葉供書寫研朱點易看霏談揮塵尾逺興薄雲端相對渾無語須教杯盞寬陸夀如陳懋吉過射涇田舍秋暮初收穫香醪巳自開江頭新雨過溪上故人來簡略忘幽僻輝光動草萊論文真有愧竹徑日徘徊牛首山下馬獻花處千巖秀色連乘風吹晚步披莽上山巔神宇江流繞禪房塔影縣夜深催擊鉢詩就不成眠靈谷寺山寺度門逺松寒十里隂鐘樓苔蘚合閣道雨花沉泉咽山中路人傳空外音歸途未忍去猶自戀祗林秋宵月下有懷張叔貽獨坐空庭下涼風入袂吹起看新月上忽動故人思驚鵲栖還定髙梧影漸移壯圖愁未立青鬢巳絲絲休休菴高士蒙山老市㕓精舍開何如嵒壑趣俱入戶庭來法雨飛禪徑天花下講臺雲書遺一匣玄悟少人推覽鏡覽鏡對愁顔西風秋雨􅀢慚看新白髮猶著舊青衫酒醒難成寐詩裁不用芟辭巢雙燕子空自語喃喃過吕梁王水部茂行邀飲境入吕梁勝水縣洪上頭狂瀾思一障巨石伏中流樹接江淮逺雲連齊魯浮才名王水部攜酒上蘭舟題百穀半偈菴髙人愛精潔築室學逃禪半偈題菴額長齋坐佛前架頭齊古帖簷下起茶煙茟硯間緣在時還對簡篇大父書至云周孫得子於我為玄孫此是家門之慶也賦詩志喜昨夜燈花吐書來喜得孫高玄看五世閭里賀盈門繩武培前業貽謀有後昆吾翁當此際燕賞倒金尊讀書吕公祠滿眼江南景芳祠緑樹遮苔花侵畫壁旭日射簷牙四座虛堂敞一灣流水斜晚來橋上望明月照蒹葭舟泊潞河遇雨無媒辭魏闕潞水殢歸舟一夜溪頭雨千林樹作秋鄉心頻入夢篷底轉生愁不為琵琶泣青衫淚自流見新月去國未千里俄驚近德州仲秋才二日新月已垂鈎影逐斜陽下光隨過雨收一年前此際結伴五陵遊夢長安旅食京華久風塵興巳闌出城逾半月猶夢在長安未遂金門隱空思玉宇寒不知行路裏還作未歸看山齋雨過新涼襲人夢中有作起而足成之一雨祛煩暑虛齋竟日涼簷前殘溜滴庭際晚花香簾捲風吹鬢雲開月在牀睡來多爽氣夜短夢偏長春盡春盡園林寂風來水弄漪自開南畝際誰寄草堂資室靜生虛白門間有問竒吾能委窮逹聊以慰遐思塔影園次皇甫司勳鑿池來塔影結屋倚山阿疑是浮員嶠翻同瀉翠娥昔聞挂青漢今倒映渟波惠我驚人句賡酬奈拙何附司勳詩因山開别業幻迹在南阿映水疑浮鷲臨妝似影娥綦詩咏青漢竺偈頌澄波牛首君登未窗間校若何嶺南黎維敬寄書至不才人共棄高誼爾偏求一自吳門别三經炎海秋拂衣還挹袖軒名涉水訪浮丘兩地懷思切何時得卧遊晉江蔡少參别有十三載月夜過訪又别久與蔡經别俄驚訪釣磯乘風來九曲帶月扣孤扉握手談疇昔登山思逸飛飄然解維去佇望獨依依早朝後遇雨初旭射金扉朝霞護紫微輕煙回御輦細雨濕朝衣仗逐蛟龍轉班隨鴛鷺歸天家膏澤遍苑樹緑隂肥署中官舍書懷出城七十里一望路迂賒雞犬村邉塢桑麻樹裏家民居環署治風土亦清嘉官舍無塵雜高槐映碧紗秋日早朝雙闕千官集平明曙色微聽殘清禁漏初啓掖垣扉劍佩聲成韻旌旗露下晞自慚通籍晚敢謂素心違乞休腐儒通籍晚潦倒愧生平官署依村市朝參入帝城奔馳頭盡白辛苦事無成今日乞間去歸舟日夜行清江浦追憶沈虞部一入新莊閘令人無限思窮愁文與可空憶沈佺期挂劍慚無處遺金感昔時心香聊一炷飛淚薦江蘺秋暮夕陽閣西嶺秋色亂川中衰草猶餘緑殘荷撼碎紅浮生元自寄歸老慊余𠂻忽聽漁舟笛溪頭弄晚風山居追和羅太史卜居依虎阜茂苑卧文園心會禽魚樂門無車馬喧塵中三十載歸悟五千言杜甫愁行役常思晚計存附羅太史詩平居無雜慮所志在丘園種竹非醫俗耕山得避喧年多知物候春近卜禽言豈不營朝市謀生各有存和袁魚叔喜雨用韻今嵗旱何久令人生隱憂通宵雷雨作殘困鬱蒸收倚檻花枝重迎風燕羽柔山齋聚良友五月類清秋張伯起同王玄靜吳恭先攜榼過塔影園林卧春方盡簷前鳥鵲喧羣公將小艇攜榼過丘園握手談陳迹澄懷悟道言溪頭相别去歸獨倚南軒伯起有詩次韻林花落未掃好鳥尚求聲忽枉故人駕依然舊日情題詩敘離别促席話平生何日重過此相期待月明雪中閉户不出去歲冬無雪今冬雪早飛因風飄上箔帶雨潤沾衣入夜寒仍重推忩晚更輝村中僵卧者竟日掩柴扉到園歸來三閲月今日到園亭剪伐亂荆棘重修新竹屛鄰墻過濁酒晴鵲噪間庭依舊草堂在北山空勒銘雨過入山莊一雨連三月園林久不來盈池環緑水繞徑長蒼苔鸚鵡褰簾語薔薇滿架開心間無一事重葺舊亭臺避暑山莊城中如在甑避暑到林堂近水樓臺逈開窗枕簟涼銜杯同阮籍髙卧傲羲皇箕踞科頭坐山深白晝長久雨夏秋連月雨日日掩柴荆簷溜窗前滴班鳩竹裏鳴香焚凝淨几茶焙煮砂鐺何日開樽酌中庭待月明新晴即事久雨不出户秋來日日隂今朝將野艇出郭過園林水漲橋梁沒堂開竹徑深間居無雜慮消盡市朝心雨霽三月雨不歇苔花滿徑生經時不出戶今日喜新晴庭際無塵雜簷前有鵲聲何時將小艇坐看晚霞明九月九月巳將盡園林景物嘉草堂三嵗别修竹萬竿斜野鳥間關語芙蓉爛漫花間居無客至汲井自烹茶釣魚撈蝦以供午餐疏澗洗塵沙澄然水一窪呼童拋釣餌著屐自撈蝦煮飯舂香稻烹茶汲井花欣然無一事憑几讀南華山莊倚杖入山去山園村徑通嵐容開晚霽塔影卧池中籬落野花碧枝頭霜柿紅小庭看月上鄰笛起墻東出郭一雨連三月今朝天喜晴間移書畫舫出繞闔閭城晴色開山霽溪流與岸平民廬俱沒盡觸目總傷情人日開歲已七日清晨暖氣回郊園亭樹逈人日草堂開寒勒梅枝瘦雪殘新水來有懷吟不就取次試新裁春日書懷春來風日好放棹到山莊雨過花枝媚泥添燕壘香青山露墻角新水漫池塘獨坐無人至茗杯聊自嘗初夏初夏山莊好園林風日嘉閉門時晏起㪺水試新茶雨細魚吹浪風微燕蹴花草堂空寂寂竹樹自交加目眚目眚不出戶麥秋天氣寒鳥聽枝上語花似霧中看纍月惟髙卧經旬不整冠心間人事少容膝易為安五月園林亭館靜仲夏緑隂微乍暖荷香滿新晴梅子肥碧雲將雨過紫燕引雛飛竟日無人至呼童掩竹扉園亭春色巳過半山園晝掩門池平榆莢雨酒貰杏花村簾捲几初淨香殘火尚溫地偏人迹少用拙道應存過周公瑕支硎山房吳王賀九嶺西去有松關鳥語屋頭屋雲橫山上山翻疑隔塵世别境非人間樽酒共酙酌乘輿夕照還又不見故人久相逢意共欣盤餐多海物棐几有罏薰簾色浮香帶草名波光寫練裙羅含亦有宅遙隔數重雲曉山月流墮西漢巖樹散鴉羣曙色初分處樵歌已漸聞仰看松頂路半是隴頭雲頃刻朝暾動晴開錦繡紋經闔塘不到闔塘久俄驚二十秋村墟猶歷歷日月去悠悠古樹埋蒼蘚少年新白頭門前一灣水依舊向西流吳淞之水皆西流新厯兩年十月朔頒厯五雲邉今日歸林下猶思拜陛前重看新嵗厯自喜樂餘年獨坐間無事焚香結靜緣文氏五家集卷十二
