咫尺常依天北極分香曾直殿東廊紫泥浥露封題濕寶墨含風賜扇香記得退朝歸院靜微吟行過藥欄傍其二紫殿東頭敞北扉史臣都著上方衣每懸玉佩聽雞入曾帶宫花走馬歸此日香罏違伏枕空吟高閣靄餘輝三年歸卧滄江上猶記雙龍傍輦飛其三扇開青雉兩相宜玉斧分行虎旅隨紫氣氤氲浮象魏彤光縹眇上罘罳幸依日月瞻龍衮偶際風雲集鳯池零落江湖儔侣散白頭心事許誰知其四一命金華忝制臣山姿偃蹇漫垂紳愧無忠孝酬千載曾履憂危事一人陛擁春雲嚴虎衛殿開初日照龍鱗白頭萬事隨湮滅惟有觚稜入夢頻荆溪道中荆溪西下小船通離墨銅棺在眼中坐詠風烟懷杜牧曾穿巖竇識張公逺山如畫雲開嶂落日供詩翠滿篷賸欲躋攀老無力空餘雙目送飛鴻人日喜晴有懷故友王履吉良辰樂事不相違一笑褰簾喜上眉浮弄新晴初日色破除殘臘早梅枝山林爛漫青樽在老病侵尋白髮知不見故人春滿眼臨風空賦草堂詩江隂道中賦贈王祿之春水浮煙柳映空蘭舟西下兩人同等閒機事楸枰外咫尺江山畫笥中一笑頭顱忘我老百年家世與君通不眠共理平生語落盡燈花月滿篷湯子重赴南雍望望金陵路不遙故人西上木蘭橈春風貰酒丹陽郭明月題詩白下橋壯志君方事行役暮年吾每戀親交江城雪後梅花盡無限殷勤在柳條顧榮夫園池臨頓東來十畝莊門無車馬有垂楊風流吾愛陶元亮水竹人推顧辟疆早歲論文常接席暮年投社忝同鄉寄言莫把山扉掩時擬看花到草堂榮夫見和再疊為愛高人水竹莊幾回繫馬屋邊楊每開蔣徑延求仲常伴山公有葛彊陋巷誰云無轍跡城居曾不異江鄉春來見說多幽致開遍梅花月滿堂春日雨中彤閣煙輕翠陸離曉簾風急雨絲絲情淹宿酒春愁重坐弄殘棋晝景遲野色送青山半出暖㾗回緑草先知老來自覺才情減開盡梅花未有詩人日期與孔周子重小集以事愆期獨坐有懷草痕簾影碧參差此日逢人有所思樊圃又看挑菜始江梅剛是試花時喜無冰雪春寒淺況值清明淑景遲有約不來成寂寞臨風再詠草堂詩穀日孔周子重祿之南樓小集靈莢初開第八蓂玉梅新試兩三英要知春早花期近喜卜年豐穀旦晴緑醑不教虛節叙白頭聊復話平生相攜莫便匆匆去新月南樓正自明伍疇中太守惠酒將過訪玉川有約到吾廬先遣長鬚致鯉魚老我草𤣥方寂寞故人乘興定何如山園夜雨剪春韭花徑春風候小車青眼交遊無幾在白頭光景莫教虛齊居漫興香消古鼎靜沈沈寂寞城居似逺林日上樓臺朝氣爽燕飛簾幕夏堂深疏花淨掃風前迹碧樹新添雨後隂老覔知音殊意懶任教塵暗壁間琴春寒病起十日春隂一日晴春衫猶怯曉寒輕蕭條病骨梅花瘦宛轉閒愁蔓草生閉户新波平野岸倚樓山色繞江城東風早晚持樽酒去聽橫塘滿樹鶯夏雨六月飛塵撲靣黃蕭然一雨破驕陽長風鼓浪翻茅屋宿霧排雲壓短牆秋事已占南畝喜午眠仍飽北窗涼登樓别啓西窗看橫卷湘簾一片蒼袁與之送新茶薦以榮夫新笋賦謝二君揀芽駢笋薦新泉石鼎沙鐺手自煎一笑月團欣見靣百年玉板更參禪錦舒風籜春雷後翠展雲旗穀雨前珍重故人披拂意盡驅塵俗破昏眠秋夜宿酒微消睡思濃孤懷兀兀夜溶溶半窗涼影雙桐月一榻秋聲四壁蟲坐閲歲時成老大天教貧病養疏慵曾參際會無禆補羞更從人說卧龍九日招孔周諸君芙蓉波冷桂風涼晤語蕭疏白髮長青眼平生幾親舊黃花荏苒又重陽越樽久湛金華露吳蟹初肥笠澤霜擬合羣賢酬一醉呼兒為掃玉蘭堂宗伯招湯子重逰虎丘入門連嶺翠崚增别徑穿雲次第登碧瓦參差蓬宇靜古藤依約紫崖崩眼中厯厯悲前劫方外悠悠愧老僧十載同逰半零落長明惟有佛前燈湯右卿寄十月菊奕奕秋光照眼新扁舟來自楚江濱多君珍重黃金贈老我衰遲白髮新應是晚香同臭味故教寒艷發清真誰言已落重陽後十月江南正小春再逰虎丘短簿祠前樹鬱蟠生公臺下石孱顔千年精氣池中劍一壑風煙寺裏山井冽羽泉茶可試草荒支澗鶴空還不知清逺詩何處翠蝕苔花細雨斑三月晦徐少宰同逰虎丘海湧峯頭宿霧開王珣祠畔少風埃林花落盡春猶在巖壑無窮客又來水囓滄池消劍氣雲封白日護經臺一樽不負探幽興更試三泉覆茗杯同南充王子正登崑山卧雲閣時為尹春雨初晴白玉峯春風冠蓋一尊同使君不負青山約高會還參白髮翁煙領夕陽飛鳥背天圍平野曲欄東怪來日暮衣裳冷身在卧雲高閣中春歸三月春光積漸微不須風雨也應歸與人又作經年别回首空驚昨夢非江燕引雛芳草滿林鶯出谷杏花稀沈郎别有傷情地不為題詩減帶圍詠白燕高下翩翻雪羽齊江南社後絮飛時夢回王謝烏衣盡舞罷昭陽縞袖垂簾外風輕銀剪剪叉頭春冷玉差差畫樓霜月傷心處只許張家盼盼知五月五月雨晴梅子肥杏花吹盡燕飛飛晴光已到青團扇士女新裁白苧衣黃鳥故能供寂寞緑隂何必減芳菲子雲自得幽居樂不恨門前轍跡稀五月望日登望湖亭是日微雨作風木末虛亭瞰碧瀾倒飛天影入慿䦨嵐光浮動千峰濕雨氣薰蒸五月寒石磴躡雲芒履短松風吹雨苧袍寬狂吟莫怪遲歸去白髮還能幾度看秋夜四壁鳴蟲露下餘片雲收雨酒醒初風撩墜葉秋聲早月印空庭夜色虛衰病不禁時序改蕭閒自與世情疏若為白首安眠地時有驚塵報羽書丁未九日與履約諸君同泛石湖就登上方宿雨初晴水拍天碧雲微斂日華鮮時當黃菊茱萸候秋在滄洲白鳥邊柳外畫橋人似蟻湖心蘭棹酒如泉攜壺更醉湖山上白髮重逢又一年泛湖春盡南湖碧玉流故人湖上共夷猶平橈野渡沿青草疊鼓中川起白鷗雲日霏霏梅子雨風蒲獵獵藕花洲行春橋外山千疊盡逐波光上綵舟是歲閏九月再泛剛喜重陽臨閏月不辭老病復登臺多情秋色依前在有待籬花故晚開佳節從知難再值青山端不厭重來畫船記取橫塘路十里笙歌載月回新夏暖風庭院草生香晴日簾櫳燕子忙白髮不嫌春事去緑隂自喜夏堂涼閒心對酒從時換老倦拋書覺晝長客有相過同一笑竹罏吹火試旗槍聞砧明滅疏燈鑒薄帷誰家搗練夜遲遲驚回短夢千門月不斷秋風萬里思歲晚江城還自急天寒閨閣最先知高樓人靜星河爛正是霜華欲下時自華亭還吳夜泊磧礇放棹華亭指故園九峰晴色接吳門秋風沽酒唐行市斜日維舟磧礇村墟落風煙沙溆口人家燈火竹籬根機雲踪跡今何處一望岑山一斷魂袁魯仲邀登列岫樓故人湖上有高樓十載清尊續舊逰飛翠窗中仍列岫片帆天際見歸舟依然緑樹啼黃鳥無賴青山笑白頭不盡阿戎淹戀意渚雲江草兩悠悠是晚過行春橋玩月再賦行春橋上月娟娟杜若洲西宿畫船萬鏡不波天在水四山沈影夜如年已知世事皆身外肯著閒愁到酒邊宛轉清歌出林表晚煙依約正蒼然𤣥墓道中輕隂駮日水含沙二月江南好物華早辦行輿衝細雨不教山屐負梅花烟林滴翠千峰濕石磴穿雲一徑斜風泊晚烟寒不散磬聲遙識梵王家雨後虎山橋曉望虎山橋下水交流正是橋南宿雨收光福煙開孤剎逈洞庭波動兩峰浮已應浩蕩開胸臆誰識空濛是勝逰渺渺長風天萬里眼中殊覺缺扁舟夏日永夏茅堂風日嘉涼隂寂厯樹交加客來解帶圍新竹燕起衝簷落晚花領略清言蒼玉麈破除沈困紫團茶六街車馬塵如海不到柴桑處士家新秋秋風昨已到山塘坐愛閒庭過雨涼月榭誰家悲玉笛露桐虛井滴銀牀病侵肌骨驚寒早年入衰遲覺夜長氣候無慿殘暑在手中紈扇未能忘八月十四夜對月有懷月近中秋夜有暉幽人戀月卧遲遲及時光景寧須滿明日隂晴不可期清影一簾金瑣碎涼聲何處玉參差酒䦨無限懷人意都在庭前桂樹枝十五日銀漢無聲夜正中十分秋色小樓東空瞻朗月思𤣥度誰有高懷似庾公把酒金波浮桂樹捲簾清露滴梧桐碧雲何處人如玉惆悵東䦨一笛風十六夜入眼冰輪積漸摧白頭顧影重徘徊極知物理盈當缺自惜流年去不來蟋蟀早將寒氣至芙蓉都受露華開殷勤不負花前醉依舊清光在酒杯小至夜雲物熙微度曉光閉關聊復謝迎將隂陽自與時消息身世都歸日短長潦倒已無朝省夢氤氲空憶殿罏香向來心事葭灰冷贏得蕭蕭兩鬢霜送彭赴嘉興訓導二首清時一命忝師儒百里鄰州接里閭志養於今欣有祿官貧莫嘆食無魚微名聊足酬初志多暇何妨讀舊書九十老人須在念頻頻書札問興居其二東望嘉禾近百程漫隨儒牒去親庭蟬聯宦業承三世辛苦傳家有一經我老自憐衰鬢白汝行不失舊氊青還應别後鍾情處飛夢時時秀水亭戊午元旦黃鳥風簷遞好音白頭窗下整冠巾喜聞海上烽烟息又見人間日月新霽景騰輝金勝曉暖痕飛雪玉梅春何當載酒尋芳去緑滿郊原草似茵肇孫北行阿翁九十苦鍾情倚杖那堪送汝行璧水去逰天子學春風須聽上林鶯壯途初發千山軔雅志無忘萬里程三百年來忠孝在慎言無潰舊家聲己未元旦勞生九十漫隨緣老病支離幸自全百歲幾人登耄耋一身五世見曾𤣥秪將去日占來日誰謂增年是減年次第梅花春滿目可容愁到酒樽前秋夜新寒髙閣夜何其野笛荒砧不斷思澤國變衰菰菜老長安迢遞帛書遲江空露下芙蓉葉月出風吹桂樹枝何必潘郎能自省年來青鬢已絲絲文氏五家集卷六
