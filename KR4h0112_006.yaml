body:
  text: 文氏五家集巻六明文徴明撰太史詩集七言律詩謁江浦莊先生留宿定山草堂十畝青松四靣山草堂宛轉亂流間若非清福安能主為訪高人得暫閒竹圃眠雲秋濯濯水舂孤枕夜潺潺就中何事尤堪羡國是人非了不關重至滁州同諸友逰琅琊兼旬行李滯滁州不到琅琊亦枉留飲伴況来多舊好山靈應不厭重逰四時風景初無恙千里登臨易起愁安得移家終此住讀書朝暮對溪流再至定山辱莊先生贈詩次韻奉答稺齒窮身豈有知偶陪高論得移時感公不以愚頑棄顧我何堪逺大期草閣便須終歲住僕人休訝出山遲歸来乞得堯夫句暮雨秋燈不斷思附録莊公贈詩一燈何處寫相知對坐寒牕暮雨時詩本平生非杜甫琴才臨老遇鍾期儘堪出手名家早但覺忘年得友遲儻許無言真妙意欲將千載慰深思暮春高榆風定翠相圍天氣悠揚思轉微晝閣凝香新試扇春肌生汗欲更衣乍聞幽鳥渾無見時墮逰絲忽漫飛惆悵東䦨尋曉夢落花芳草已都非奉次吳匏菴先生續潘邠老詩韻滿城風雨近重陽暝色寒聲漫繞堂向去隂晴難逆料邇来牢落已粗嘗直饒詩思如秋淡未害臞顔映菊黄好事例乖何用歎但令有蟹薦桑郎田舍秋風田舍有閒情野老迎賓喜不勝小徑穿松敷細石短籬縁水束枯藤堆盤蝦蟹輸村樂匝屋雞豚騐歲登却戀城居留未得晚山囘首白烟凝詠芙蓉九月霜清卉草荒拒霜池上獨宜霜誰憐憔悴春無主賴是遲迴晚自芳太液風烟情黯黯仙人城闕事茫茫幽貞自有金莖菊相對疎籬各淡粧十月江南十月乍風埃簾箔垂寒晝不開身計蕭蕭存斷簡人情黯黯付深杯雨中秋事芙蓉盡霜後時新橘柚来抱病經旬賓客減卧看香鼎篆縈迴停雲館燕坐有懷昌國山館無人午篆殘便閑經日不簮冠時慿茗椀驅沈困聊有書編適燕歡漠漠黄梅生濕潤纎纎白苧試輕單梧桐小砌隂如許不得君来共倚欄與邢麗文登葑門城樓天風異制木蛇空雉堞差差夕照中百里山川形勝舊萬家烟火歲年豐迤南茂苑迷陳跡直北荒原識故宫會取千年興廢理與君極目送飛鴻次韻答希哲見懷兼乞草書牆外車音寂不聞閒縁誰解病中紛涼風著急吹芳樹落日含情詠碧雲高誼乍違黄叔度清篇先枉沈休文秋来定有臨池興榻得鵝羣倘見分懷錢孔周徐昌國時應試南京停雲寂寞病中身旅夢秦淮夜夜新見説踏槐隨舉子終期鳴鹿薦嘉賓人言漫漶真無㨿吾道逶迤合有伸想見馬蹄輕疾處薄羅微染帝京塵叔父侍御致仕詩二首聖恩剛遂我公私乞與閒身未老時行樂擬裁居士服入山誰送草堂貲浮雲多態何當散高鳥無求不可羇明月青山一杯酒閒情未許俗人知其二詔許先生解舊官依然豸繡賁丘園孤危宜負平生志歸宿還叨曠蕩恩誰謂今人無古道欣看盛事出家門從今只辦溪山樂世事如棋不足論奉陪吕太常沈石田逰虎丘次韻高賢尋壑共經丘偶得追從續舊逰陸羽泉甘春試茗王珣祠古暮維舟風簷落落鈴相語雨徑登登屐似油怪是酣吟留不去水雲千頃正當樓金陵客樓與陳淳夜話巻書零亂筆縱横對坐寒牕夜二更奕世通家叨父行十年知己愧門生高樓酒醒燈前雨旅榻秋深病裏情最是世心忘不得滿頭塵土說功名立春日病起十二月卄三日青絲裹餅薦春盤喜見鞭春在臘前便與一冬除舊病尚餘七日是殘年梅花消息嚴寒後綵勝情懷薄酒邊旋取物華供帖子暖痕浮緑草生烟初六日與客自葑門汎舟至東禪小集淺痕霏緑淡烟光逺樹依依春水長落日五人浮野艇東城三里到溪堂寺有青溪堂餘寒人日梅枝瘦半醉僧寮菜飯香轉信投閒閒不得題詩還博靜中忙人日停雲館小集新年便覺景光遲猶有餘寒宿敞帷寂寞一杯人日雨風流千載草堂詩花枝未動臨佳節菜飯相淹亦勝期春色到今深㡬許小山南畔草痕知詠孔周圍坐清談麈尾長墨痕狼籍練裙香水亭紈扇歌楊柳春院琵琶醉海棠王謝風流才子弟齊梁煙月錦篇章豪華豈是泥沙物好在揮毫白玉堂春日舟行書所見日出吳山歛霧蒼平橈十里下横塘弄春草色偏宜逺繞竹溪流不覺長一塢人烟自花柳千畦麥菜間青黄不因出郭供人事負却風光二月強重陽前一日飲孔周有斐堂塵土欺人兩月忙深秋才上故人堂却憐違濶翻情厚不覺淹留入話長翠箔香風吹桂子布袍寒信作重陽百年辛苦還防死好對良辰盡此觴鄭太吉送慧泉試吳大本寄茶醉思雪乳不能眠活火砂瓶夜自煎白絹旋開陽羡月竹符新汲慧山泉地罏殘雪貧陶穀破屋清風病玉川莫道年来塵滿腹小忩寒夢已醒然歲暮齋居即事簷樹扶蘇帶亂鴉蕭齋只似野人家紙牕獵獵風生竹土盎浮浮火宿茶日色射雲時弄彩雨絲吹雪不成花庭中卉物凋零盡獨有蒼松領歲華謝永嘉趙君澤寄蘭草堂安得有琳琅傍案猗蘭奕葉光千里故人勞解珮一牕幽意自生香夢囘涼月甌江逺思入秋風楚畹長漸久不聞餘冽在始知身境兩相忘金陵詠懷鍾山日上紫烟收金闕參差萬瓦流帝業千年浮王氣都城百雉隠高秋聲華誰覔烏衣巷形勝空吟白鷺洲囘首壯逰心未已西風䇿馬看吳鉤詠玉蘭花孤根疑自木蘭堂怪得人呼作女郎繞砌春風憐謝傅一天明月夢唐昌冷魂未放清香淺深院誰窺縞袂長漫説辛夷有𤓰葛後開應是愧穠粧此花以辛夷接本賀九嶺相傳為吳王賀重九處嶻然飛嶺帶晴嵐路出餘杭更繞南往跡漫傳人賀九勝逰剛愛月當三巖前鹿繞雲為路木末僧依石作菴一笑停輿風拂面松花閒看落毶毶三月三月江南柳色勻海棠風暖駐游塵山齋病起詩逋積曲巷春晴轍跡新習氣未忘聊應世虛名何益漫勞人閒来自理幽居事莫道花時不稱貧李咸用詩衰世難行道花時不稱貧逰吳氏東莊題贈嗣業渺然城郭見江鄉十里清隂護草堂知樂漫追池上跡振衣還上竹邊岡中有知樂亭振衣岡東郊春色初啼鳥前輩風流㡬夕陽有約明朝汎新水菱濠堪著野人航詩人孫太初過訪把劍南来賦逺逰又看東上浙江舟山齋動是經時别菜飯聊看半日留醉裏江湖真有味春來花鳥正關愁天台雁蕩平生夢慿仗詩囊次第收暮春雨後陳以鈞邀逰石湖遂登治平貪看粼粼水拍堤扁舟忽在跨塘西千山雨過青猶滴四月尋春緑已齊湖上未忘經歲約竹間覔得舊時題晚烟十里歸城路不是桃源也自迷次韻王秉之新莊書事背郭通村小築居任心還往樂何如山中舊業千頭橘水面新租十畝魚未遂隠謀聊避俗不忘壯志有藏書抱衾曾借西齋榻囘首題詩十載餘與宜興吳祖貽夜話有作就簡李宗淵杭道卿吳克學有客扁舟自陽羡夜堂風雨對高眠不辭談笑成佳會祗覺淹留有宿縁别後交逰如夢裏意中山水落樽前青燈酒醒還生戀明日烟波更渺然寄陳以可乞米秋風百里夢姚城無限閒愁集短檠零落交遊懷鮑叔逡巡書帖媿真卿謀身宜信貧難忍食指其如累不輕見説湖南風物好何時去買薄田耕宿相城有懷石田先生何處重占處士星草堂突兀夜燈明風流已與人都盡手澤空憐物有情依舊短牆圍野色不禁高樹送秋聲傷心未了生前約漁子沙頭一棹横金陵秋夜與彭寅之湯子重步月雙闕深沈夜向䦨碧天露下葛衣單風吹急柝嚴城閉月照行人古道寒往事悠悠歌鳯去青山靡靡識龍蟠壯懷萬里同遊在滿目風烟引劍看道復西齋古石玲瓏蒼壁太湖姿浪蝕沙陶面面竒百穴晴牕通玉女一拳小石夢仇池乍逢合下南宫拜欲咏還輸白傅詞便擬高齋題列岫朝来秀色滿襜帷新正四日雪後方崑山思道過訪值余不在留詩而去奉答一首偶扶藜杖出柴荆虛却王猷過訪情高興自縁脩竹住通家還許小兒迎百年契分叨君厚一笑閒縁媿我輕留得新詩珠滿案紙牕殘雪共光榮楊儀部君謙纂述之餘頗修淨業瞻對無由悵然成詠不見髙人動經月似聞觀道獨澄懷一函自課維摩品百日方持白傅齋春到梅花開小閣夢囘涼月印空階從知不受風塵累二十年前已乞骸子重賦詩徴余逋畫未即踐言先以小幅展限就和来押飛嵐疉巘翠撑空畫得幽居似剡中滿地清隂山木合隔溪野色小橋通倚䦨詩思蕭蕭雨繞竹茶烟細細風想得髙人方閉户那知市上軟塵紅夏意五月江南櫻筍殘疎花吹盡緑漫漫雨来恰及梅黄候春去猶餘麥秀寒白日幽深茆屋靜野情蕭散苧袍寛美人何處經時别滿耳新蟬獨倚䦨次韻九逵山中步月黄葉蕭蕭没斷踪風將牢落入窮冬三更酒醒人何處千里月明山自重逺水浮村微見火碧烟藏寺但聞鐘知君逸思難分付都屬尋詩七尺笻虎丘劍池吳王理玉㡬千年水落池空得暮磚地下誰曾求寶劍眼中吾已見桑田金鳬寂寞隨塵劫石闕分明有洞天安得元之論往事滿山寒日散蒼烟石湖横塘西下水如油拂岸垂楊翠欲流落日誰歌桃葉渡涼風徐度藕花洲蕭然白雨醒煩暑無賴春山破晚愁滿目烟波情不極逰人還上木蘭舟席上題扇景夀外舅大參吳公解組歸来歲五更天教閒散養脩齡東華風浪今無夢南極休徴已見星閱世儘容醒眼白倚樓自愛晚山青扁舟或獻南飛曲慿仗東坡醉裏聽雞鳴山金陵勝處往歲葢屢逰之未有作也偶閱九逵逰慿虛閣記追賦一首金陵佳麗石頭城傑閣登臨正雨晴帝業稱雄維虎踞逰人選勝得雞鳴長江天際孤帆滅落日煙中萬瓦明滿目廢興題不得獨看名畫繞廊行與外甥陸之箕夜話安甫子一笑燈前覩陸雲後生殊是逼吾頻文章有待成先志眉目分明見故人潘岳任咸千載恨何充王導一家親虛齋短榻寒相對禮數雖疎意却真上己日獨行溪上有懷九逵郭外青烟柳帶柔洞庭西去水悠悠故人不見沙棠楫燕子齊飛杜若洲日落晚風吹宿酒天寒江草喚新愁佳期寂寞春如許辜負山花挿滿頭寒食自横金歸汎石湖澤國春深霧雨收越城橋畔水爭流斷煙西去浮蒼嶼斜日中川起白鷗村店寂寥寒食節行人迢遞木蘭舟芳晴滿目東風急欲採汀花不自由侍柱國王先生西園游集園在夏駕湖上名園詰曲帶城闉積水居然見逺津夏駕千年空往迹午橋今日屬閑人江南白苧迎新暑雨後孤花殿晚春自古會心非在逺等閒魚鳥便相親附王先生次韻吳王消夏有殘闉特起幽亭謝要津曲徑轉時迷到客短牆缺處見行人緑楊動影魚吹日紅藥留香蝶送春為問午橋閒相國自非劉白更誰親百花菴北郭名藍舊有名歲長無復百花深柴門日落空流水古木春来長緑隂滿眼風流文字業一龕荒寂道人心野橋詰曲通幽徑短䇿何時許重尋詠庭前藂菊寒英翦翦弄輕黄百卉凋零見此芳天意也應憐晚節秋光端不負重陽郊原慘淡風吹日籬落蕭條夜有霜輸與陶翁能領略南山在眼酒盈觴賦得野亭秋興斷雲狼籍近簾櫳天地蕭條四壁空盡日倚䦨黄葉雨一番吹髩白蘋風年光搔首孤鴻外山色供愁落照中欲寄閒情無那逺烟波江上採芙蓉贈王履約履吉兄弟春風獨目總琳琅素月流雲縹緲光未用寡辭推子敬故應相敵有元方百年有待麟呈瑞千里欣看雁逐行手結幽蘭成雜珮思君欲贈不能將揚州竹西簫管玉參差柳外樓臺舞陸離落日蕪城非故國春風后土有荒祠錦帆煙月千年夢禪榻情懷兩髩絲二十四橋何處是扁舟西去不勝思先大父有宿汶上之作舟中閱先集敬次嚴韻日暮風霾欲漲天獨臨古渡意悽然春光三月行當暇客子長途未息肩白漫河流還岸岸緑垂楊柳自芊芊當年汶上城何處一抹斜陽萬樹烟過張秋追懷武功先生遺跡投薪沈鐵事悠悠巨掃千尋壓上游河濟從来天下盡江淮今入地中流當時物論輕文士千載行人仰壯猷人事㡬囘桑海異依然高碣鎮東州魏家灣有感博平縣地也博