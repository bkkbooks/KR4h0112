body:
  text: 文氏五家集卷十三明文肇祉撰録事詩集七言律詩緑荇村莊簡城中諸友數椽茅屋倚江開門徑蕭然長緑苔出郭清間塵事少經旬時斷故人來滿池鷗鳥忩前浴夾岸桃花桞外栽寄語城中舊知道小詩隨手報新裁同杜與言瞿德徴登茅山與言病不能從而余與德徴直躋絶頂時夜將半殿簷星月可摘歸至山腰惟見燈火輝煌笙簫合響真仙境也捨輿而步詩以紀之遙望三峯橫紫煙藍輿屈曲似飛仙華陽洞口泉聲合貞白祠前草色連子夜朝元星可摘半空聞樂月低懸尋真不覺歸途逺一帶松濤欲曉天與葉曽生黃子旋陸夀如金時章陳楙吉杜與言趙凝甫會文于馮信伯樓居郭外山塘近市㕓層樓高棟接雲天飛花點點時沾硯鳴鳥嚶嚶窺捲簾欣賞竒文頻檢閲剖分疑義試窮研明時會聚同心友賦就河東獻陛前秦淮夜泛秦淮灔灔雨初收結伴沿流夜放舟月轉桞梢人候渡雲移沙渚樹回洲簫聲近水龍吟細河影橫杯琥珀浮醉去側身天地小卧聽潮向夢中流喜倭冦平携妻孥躬耕射涇田舍海上三年寇橫行好音慰我巳收兵即攜妻子還田舍重載琴書出郡城聖世喜聞歌夏武材官今見答升平但求處處銷金甲帶雨牽犁日課耕項子長邀集煙雨樓重來檇李暮春時煙雨樓開近水湄飛燕浴鳬沙漠漠新蒲細桞碧差差吾生事業慚文可君等聲名似項斯倚檻臨流無一事停杯分韻賦新詩崑山傅氏園偶過名園風日嘉編籬護室樹交花開窗拂几頻揮塵汲井臨軒試煮茶萬斛天香涼雨過一枰棋局篆煙斜主人知是商霖後肯負明時閲歲華集顧文康公園亭相國園亭木萬章昔時幾度醉瑤觴四圍穿沼遊魚躍數頃當門晚稻香北望青山開􅐩氣東臨緑野印斜陽郎君方擬明時用付與間雲護草堂燕子磯殿宇參差倚翠崖碧桃開處有仙家半空濤雪當軒舞滿目春帆帶雨斜江草含煙連斷岸桞風吹絮颭平沙何時借榻虛亭裏早服簷前一片霞觀音閣曲磴層巖擁殿臺朱宫斜瞰大江開桃花翻浪江豚上石壁停雲山雨來時倚曲欄瞻貝闕醉眠芳草夢蓬萊浪遊十載經過地此日登臨獨暢懷衡翁示肇孫北遊太學阿翁九十苦鍾情倚杖那堪送汝行璧水去遊天子學春風須聽上林鶯壯途初發千山仭雅志無忘萬里程三百年來忠孝在慎言毋潰舊家聲泊楓橋用大父韻辭親逺别動離情滿幅風帆帶雨行水長關河無阻道春深桞陌尚聞鶯輕拋故國三千里細數遐征第一程此夜維舟不成寐寒山依舊起鐘聲唐職方邀登金山命諸將官射潮萬古江心湧殿臺髙賢雅會得追陪迎潮落羽蛟龍避簸岸飛濤天地回報答升平諸將事挽回滄海使君才歸舟日暮心偏壯極北紅雲是上台長安市得蓮硯寄吉水羅太史石蓮洞中舊硯渾如玉版蓮墨花狼籍紫雲鐫時憑棐几披香潤想摘金莖滴露研題稱洞名存古制天完山骨得長年須令洗淨京華土寄與高人日草玄秋夜借榻胡太史楙禮嘉樹館早起有詩見贈次韻奉答滿架圖書一榻空小庭花影上簾櫳眼前踈懶無如我海內文章誰似公一𣲖笙歌人靜後萬家砧杵月明中夜長酒醒難成寐睡起窗間日已紅附胡太史詩風斂微雲淨碧空松聲和月到房櫳却疑窺戶懷安道絶勝登樓對庾公四海交遊投轄處百年心事把杯中良霄聚晤真難值莫訝頻挑燭影紅立春日嚴相公招直閣中賞紅梅恭遇上賜春盤御酒拜嘗賦詩以謝晴日辛盤出上供青絲玉碗護黃封雪殘鳷鵲春回早花映蓬壺色更穠紅日近窗凝瘦影暖風吹酒暈寒容願公厚養和羹味長伴仙桃醉九重韋園同姚元白胡楙禮送姚太史左遷韋園開遍滿庭花相送姚崇去路賖忍見仲舒辭闕下愁看賈誼謫長沙左遷暫去趨紅幕內召還來侍翠華更盡一杯燕市酒那堪回首各天涯徐李二相公留飲直閣直閣朱扉傍苑開豳風殿轉過南臺珍盤逺自中厨出法酒傳宣內使來頻下南洲徐孺榻時銜北海李膺杯同心推食欣殊遇何幸追陪近上台逰攝山栖霞寺晚過名山暫解鞍萬松深處俯清湍斷碑小篆題陳額古佛千巖蝕蘚斑春茗試烹紗帽側峯名石蓮翻出鹿泉寒白玉泉冒出石蓮井何時借我僧寮裏間取楞伽帶月看龍節推寄胡太史楙禮書至漫世虛教俗眼看敢期垂問到江干一尊常醉山花笑萬慮都消宇宙寬忽報逺傳銀字帖翻思高處玉堂寒故人不解余心事一紙空煩寄熱官姚元白官舍侍家君夜集因寫小圖紀興論交草載鬢蒼浪握手髙歌指建康豪興漫沽燕市酒風流猶説少年場龍蛇濩落嬰塵網猿鶴驚猜憶草堂雲裏鐘聲度雙闕月明寒夜話偏長寄謝羅太史昔日青宫輔導臣今歸蓮洞葆玄真八行逺寄三千里一别俄驚十四春丙午抵己未豈有虛名流藝苑不虞推譽動高人燈前夜色興懷處兩地相思益愴神宿琅琊寺追和韋蘇州韻繫馬琅琊古澗灣寺門深寂倚豐山試邀月向亭中望誰似雲歸洞裏間虹影倒垂環駟外泉聲飛出萬松間一宵借榻逢僧話又逐征鞍度曉關重遊西山自𢎞濟院轉出登五花閣薜蘿深處玉虹流錦石踈花曲磴幽禪境未追蘇晉侣煙霞即似庾公樓憑欄逺送千峯雨高閣猶疑五月秋欲卧名山談釋部只愁凡骨異玄丘大宗伯南充王師有詩贈行次韻為答西風羸馬出城東滿目離愁落照中塵世百年心獨醒江湖數載鬢雙蓬敝裘懸結思歸切操瑟空慚有意工負教孤恩真潦倒可能復夢大槐宫附王公詩剖符曽向五湖東巳見為儒多士中二十年餘重會靣三千里外又飄蓬傳家節操心逾厲奕世文章體更工歸去好應修舊業賦成還獻大明宫恭候聖駕幸成均玉輦傳宣下禁鑾軨星門啓曉鐘殘旌旗影拂蛟龍動劍佩光凝璧水寒日上雲裘開五色仗分馳道擁千官青襟何幸躬逢盛喜得今朝對御看聽講仙仗平分日月懸天香飄拂御爐煙橋門環擁千官肅槐樹隂濃夾道連坐論尚遵周典禮授書開講禹謨萹君臣克艱愚生欣喜遭殊遇何幸躬瞻玉陛前立秋逢七夕和張伯起韻久雨山齋掩薜扉雨晴新月一鈎微卧看天上雙星度又見庭前一葉飛貧似阮咸難免俗賦如永叔和應稀回思帝里承歡處猶著斑斕戲綵衣宿馬林雪積寒林深復深肩輿隨處繞車聲西風古道過羊巷落日孤村宿馬林四壁有詩題往嵗百年無計慰初心寒雞野店聲偏早一夜無眠獨擁衾清秋清秋一月廢梳頭落盡槐花雨未收詩句長從無意得功名元忌有心求人多憎愛何須校天賦踈慵不解愁萬事不關心似水還將生計付沙鷗過寶應訪朱子價不遇十年一别問何從此夜維舟又未逢夕照斜翻山帶閣月明遙聽竹西鐘思君淮海維揚俊愧我江湖汗漫蹤見説一麾方出守朱雲溪屋白雲封同家弟訪顧克承雨過間行訪辟強東風茅屋竹圍墻柴扉盡掩知君出圖畫翻看笑我狂空往不須題鳳字重來還擬續罏香茗杯棋局堪忘世不羡當塗日夕忙自遣日臨閣帖學羲之時有間人過問竒非為避喧成小築只因踈懶畏趨時貧能尋樂愁俱遣年欲瞞人髮不私數卷圖書香一縷茶甌初歇試彈棊京邸移居明世羞為失路人帝城風物自凄清客心又向移居見歸思偏從逆旅生暫止飛烏棲未定繞簷晴鵲報新成飄零即是羅含宅蔬食鶉衣敢厭貧朱將軍宅燕集憶忠熙公寶善堂開倒玉樽緑槐依舊擁朱門不妨垣瓦從殘草猶見金貂寵後昆細聽歌聲翻白苧獨留月色照黃昏感恩門下當年客雌伏雄飛幾尚存穀日立春帝里慚為久住人五雲樓閣接楓宸喜占穀日逢晴日信是看春不當春間對茗杯元有味老於筆硯益相親何時覔取歸舟去谷口躬耕學子真雨中秦評事攜酒見過失意逡巡且未回強携栖止帝城隈愧將白眼看人醉愁見黃花冒雨開九日未賡邠老句兩都空負孟堅才殷勤喜得秦評事携酒衝寒為我來嘉靖癸亥舟泊廣陵南充王師出訪留三宿甲子至日復泊於此王師又留數日今萬厯己卯至日亦於此繫舟而王師致政巳十有一年矣撫景興懷不能無感兩度揚州逢至日今逢至日又揚州百年真愧長為客一處曽經幾繫舟鄉土不殊人事異天時無改歲華流草橋明月人何處撫景興懷滿目愁元旦不出傳呼車馬放朝回獨掩衡門晝不開春帖懶尋詩句寫辛盤飣候故人來從知白雪難為和未見黃金再築臺作伴還家何日是滿園桃李待移栽自菱湖歸泊峴山月夜泛碧浪湖雨晴重到峴山前萬頃湖光月在船塔湧奎文移北斗峯浮螺黛落遙天漁歌逺向煙中起帆影翻從鏡裏縣酹酒臨風堪寄傲醉來真欲挾飛仙毗山訪潘子不遇郭外毗山虛翠屏潘炎别業鬱喬林雲深未辨郎君谷春半不聞山鳥音小艇暫維桑塢下重門深鎖草堂隂去因興盡來乘興輸却當年泛剡心夜泊垂虹橋有懷家弟片帆東下向湖州夜泊吳江憶舊遊前歲不堪人送别新年重見月當頭寒侵孤枕回殘夢風引晨鐘到客舟出處關心慚蹭蹬天涯鴻雁動離愁過江數載奔馳上國遊又攜書劍過江頭樓船簫鼓中流發殿閣煙嵐曙色浮滿目風濤連海嶠一枰棋局報瓜州同行喜有王摩詰不羡當年李郭舟申相公過訪奔走風塵歲月遷卜居人境地應偏蕭齋喜有高軒過曲巷傳呼駟馬旋公位日尊心愈下吾才元拙志空堅無聞剡薦雄文似賦就長揚愧有年附申和韻漢廷才子競超遷閉戶憐君寂莫偏車有鳴騶還自愧門無題鳳只空旋凌雲共道長楊就用世寧同大瓠堅射䇿公孫休恨晚平津猶及拜恩年姚少宰以經筵賜宴招飲席上口占奉謝鐘鼓餘聲御講堂論思啓沃侍明光雍容日馭聮南極次第珍盤出上方列鼎羡君稽古力賜酺呼我故人嘗大烹推食同姬旦為誦春風湛露章附姚和詩樗材重忝侍明堂三載長瞻日月光啓沃敢期希傅説滑稽端不似東方近臣寵渥君休訝謫吏風塵我備嘗吳苑徑荒頻入夢沐恩難上乞休章清重誰云白玊堂淺才亦屢荷恩光經陳東壁圖書富饌出天厨貢物方法酒攜歸邀上客八珍入坐愧先嘗醉來感我茹茅興願以緇衣作講章徐侍講公望有詩嘲余不歸舟中偶閲唐人春賦秋還之句因足成之聊以自適非解嘲也春賦秋還計已違故人笑我獨歸遲空懷鴻鵠志千里暫假鷦鷯栖一枝出處有關吾道在伶俜還許舊交知今朝作伴還鄉去真是仙舟晚更移夢先大父吾祖頻頻入夢中昨宵有夢又追從提攜無異當年愛談笑依然舊日容玊磬音餘桐館靜碧山寒瑣白雲重覺來枕上飛雙淚月落長安上苑鐘劉錦衣宅與莫廷韓梅客生李世延得還字獻書不報又空還點檢行囊早度關會飲金吾投轄地高燒銀燭照愁顔分題授簡裁新句沉醉翻疑在故山他日功成如訪我虎丘南畔屋三間汪學士子聲丈過訪話别一見故人情自親相逢重别十三春杜陵借榻論文處翰苑懷思入夢頻舉世幾多青眼在舊交猶恐白頭新明朝又向都門别誰是汪倫情最真趙太史以賜糕分惠兼餽香粳新米我愛風流文敏公高標玉立意雍容曽投一疏關千古能以危言動九重帶雨逺頒香稻粒賜糕分惠紫駝峯閉門一醉渾無事髙卧遙聞禁苑鐘和杜子庸春雪詩讀罷故人春雪詩雪花五出覆茆茨自憐冀北非吾土遙憶江南遲爾思回首光迷鳷鵲觀流澌凍解鳳凰池何時覔取歸舟去笠澤溪頭理釣絲送董刑部之萬全漢代文章重董生許身元是比南金孤忠何止關軍國一疏真能格帝心邊境逺隨秋鴈去聲名髙共暮蟬吟應知不久虛前席詔許還朝雨露深嵇職方雪中招飲縱觀法書名畫獨坐山齋寒色侵雨絲吹雪擁衡門多情喜得嵇中散折簡來呼文可孫畫出名人題最古香消瓦鼎火猶溫展翻竟日渾忘倦醉後歸來已夕昏徐州夜泊與白伯望話舊繫纜南徐洪上頭已同白傅共仙舟一燈聚話當時事數酌能消滿目愁夜永相將長至候寒深偏重敝貂裘起來醉看中天月曽照當年燕子樓宿京口客樓舟行兩月歲將殘牢落窮途雙鬢寒數卷圖書投夜宿一天風雪阻江干驅馳自愧聞雞舞不寐重將瘞鶴看鐵甕城邊黃葉寺鐘聲依舊出林端春盡過虎丘竹亭逢王百谷諸友同聽禪誦三月韶華日換新一畨花事巳成陳間過竹徑題新句偶入山房逢故人誦罷楞嚴停拂塵靜修禪觀寂聞塵此時正合樊川句古寺風煙又一春馮武選正伯攜榼過訪次韻一首新晴初旭射簷楹數卷圖書一几橫自喜客來茶正熟忽聞鳩向竹間鳴塔縣池沼排山影風奏松濤隔水聲君欲問余真樂處身心安穩夢魂清得曾孫志喜卜居虎阜近南村犬護踈籬晝掩門自覺老來容易老喜聞孫又報生孫眼看四世家庭慶架有遺書父祖存十月江南天氣好試沽春酒酌金樽秋興去歲今朝候駕還追隨鴛鷺集賢關九重殿啓回仙仗五色雲中覲聖顔一代盛儀文郁郁千官鳴珮玉珊珊歸來獨卧山莊上半掩柴門水一灣孫修撰以德夜訪梅花樓因余熟睡而去曉起作詩貽之雨收月出四山沉獨擁吳綾入夢魂高處鐘聲懸碧落一牀林影過黃昏毗耶小閣燈初燼閬苑仙人夜扣門醉卧不知清露冷曉看屐齒破苔痕憶羅太史翰苑當年第一仙訓儲遺疏至今傳銀魚焚却歸蓮洞寶訣書成祕草玄獨往名山非慢世偶攜開士即逃禪髙岡孤鳳今何在徙倚西風思惘然築園于虎丘南村池中忽移塔影志喜幾年浪迹寄江湖歸葺田園半已蕪環沼倒懸新殿宇浮丘翻映小蓬壺分明馬逺晴巒景絶似南宫煙寺圖真覺世心消欲盡閉門羞復看隂符政府申公和詩欲從野寺開新社故向郊園剪舊蕪地近青山來白鳥人同秋月在氷壺蓮花七級涵空影祗樹雙林入畫圖今日潛夫能雅詠不須著論學王符示龍兒會試禮部攜家昔共住長安歸葺田園數載寬汝復去遊雙鳳闕親猶縣念五雲端家聲好繼書香在行色須知道路難聖主好文方尚少萬言擬合上金鑾家弟乞間喜而賦詩清朝林下幾人歸吾弟翻然早拂衣清草池醒蝴蝶夢紫荆花伴鶺鴒飛珉珣舊業名仍在求點山居迹已非旬日一來猶恨晚笑他頭白戀輕肥王珉王珣何求何點皆兄弟也俱有别業在虎丘子悱弟歸約余旬日一至虎丘山莊而連雨愆期殊覺疏逖偶閲蘇長公迎子由之詩追和其韻招之山深雨濕木棉裘五月如秋卧虎丘訂約愆期虛别業經旬疑復殢他州邯鄲夢醒君初返漢上襟題我獨留行樂及時須記取莫教人訝未真休蘇公云幾人林下是真休初夏晴明家弟子悱同從弟子長過余山莊小酌既登虎丘憩茂林修竹下時黃鳥哢聲山僧供茗而詠歌言旋宛然春風沂水之樂也徐步溪頭惟見一川夕照目送歸舟又豈無黯然之别思哉返卧鵝羣閣恨無詠以紀之次早子悱詩至遂走筆和韻蘇家兄弟是前身重結今生未了因作伴追遊山寺路乞間能樂故園春樹隂團蓋堪圍坐鳥哢嬌聲解喚人夕照一川舟去逺還山惟有白雲親題虎丘梅花樓昔曾東閣賦梅花此日山樓感歲華滿目羣峯雲萬疊一林殘雪樹交加風來塔院遙聞磬手汲憨泉試鬻茶知是英賢舊遊地至今題處有籠紗午門朝見曽向天門十上書無媒空自待吹噓羞將白髮遊燕市猶著青衫謁帝廬強起彈冠慚貢禹誰憐作賦似相如聖王尚少吾年老肯住長安久借居雪中元老送酒米彤雲密布雪漫漫擁舊青綾獨自看未得掃門同魏勃只宜僵卧學袁安香粳分惠來厨傅法酒應知出大官賦就河東無一薦任教先逹笑彈冠徐侍講送鹿脯深山昔與鹿同遊閬苑今朝薦脯修亟問敢云勞孔伋拜嘉真自愧裴休休有人饋炙鹿辭云疏食且不足食鹿脯後何以繼長安往事成蕉夢旅館嚴寒擁麂裘何日得歸尋樂處長林豐草聽呦呦得舍弟書至離家三月苦無書有客來傳愛弟貽秋老鶺鴒栖未穩天寒鴻雁到偏遲平安深慰羲之帖消息真傳杜甫詩更喜阿咸題數字琳琅玉樹慰吾思送鄒吉甫左遷南比部幕鄒陽再逐下咸英獨倚孤忠向舊京瑣闥空餘麻草在髙岡無復鳳凰鳴白雲司裏修封罷玄武湖邉緩轡行不久天書還內召聖王知必問蒼生遣興一甌新茗玉河泉几上香殘午夢還風墮手書知困頓鳥鳴簷樹任間關地偏心逺門如水事少官間日對山盡道長安塵十丈可容飛到小窗間放朝出城至署中旅食長安久未還朝鐘初徹下鵷班九重天逈回仙仗五色雲開覲聖顔廪祿虛縻慚住久踈慵成習喜官間不防隨例趨朝謁拄笏郊南又看山秋日早朝值傳臚有感銀漢沉沉曙色微殘星數點鴈南飛黃羅扆逈金龍繞翠羽旗翻玉露晞錫命傳宣天語近拜瞻遙接尚方輝寸心真乏絲毫補愧著先朝舊賜衣先祖先父俱有賜衣志感慚著烏紗映白頭老年日侍翠雲裘悔從去歲辭家出強自隨人學宦遊滿目風塵思怨鶴一生辛苦愧眠鷗促歸頻有兒書至好葺茅茨待乞休袁駕部考績還南都奏績趨隨右掖垣又乘匹馬向長干從知袁紹名推重莫笑文同老得官久别暫逢今又别小寒初過正嚴寒行行不久天書至召入承明侍禁鑾內苑內苑秋深景物清黃金題榜日晶晶龍舟錦纜瓊華繞羽節紅旗翠殿行萬頃瑶波圖畫色一羣嬌鳥管絃聲昔年閣直談玄處午夜雲中天樂鳴獻俘侍班聖主親臨五鳳樓千官分列擁豼貅鸞簫合奏鈞天響虎衛森嚴御道周事異魯公居泮水俘同光弼獻懷州華夷一統升平盛願誦鐃歌拜冕旒夢歸昨夜西風夢到家不知身尚繫天涯孤身作客渾如寄愁緒平添亂似麻遙憶故園三徑在回思修竹萬竿斜起來霜馬催行處猶整朝衣入翠華韓太史再送羊脯同學如君最妙年優柔雅度玉堂仙文章似昔推韓愈太史于今嫓孟堅亟饋有勞頒鼎肉踏蔬無夢愧前賢感君不忘山陽社默坐時歌既醉篇上林齋宿上苑鐘聲出景陽玉河橋畔月蒼蒼瞑鴉栖定喧初息至夜相將漏更長自愧衰年通仕籍強隨鵷侣綴班行心清元自無塵想手撥爐灰細續香思歸花事闌珊春又殘好懷無著帶圍寬故山園上荒三徑采育村中寄一官親舊常思難聚晤兒書時獲報平安何時早辦歸舟去半掩柴門竹數竿乞休二載趨朝侍冕旒秋來三疏乞間休平生志願終難遂此日功名念已收莫道百年過太半且從三徑任間遊歸家自喜身還健繞膝孫曽笑白頭和申相公送行兩年端笏一微臣子告今朝解珮簮無復京華塵滚滚不聞長樂漏沉沉回瞻紫闕逺逾逺歸向青山深更深從此閉門惟靜坐有時乘月一微吟附申相公詩早學相如賦上林一官未久竟抽簮自憐白首耽雲卧不逐金門混陸沉松菊長依三徑好蒹葭獨釣五湖深倦遊我亦思吳苑惜别那堪更越吟瀕行以詩見投疊前韻奉答青襟藝苑舊知音白首交情重盍簮君向明時甘寂莫余慚厚祿尚浮沉間居自覺風波穩髙卧偏知雨露深遙憶虎丘山寺裏月明誰與共行吟葺園園廬重葺近山村寂寂無人晝掩門手植棕櫚看漸長徑栽松竹喜猶存盤無兼味樽常滿几有餘香火尚溫正是一畨新雨過任教庭砌長苔痕元旦丁亥去嵗今朝候掖垣千官鳴珮五更寒山窗此日唯髙卧天語無聞慶履端拜謁先祠忙盥櫛笑呼兒女共團圝昨宵有夢居間樂不到金鑾白玉欄寄申相公數載辛勤兩鬢蓬歸來三月又春風恩私圖報愁無地知己平生獨有公老我自怡三徑樂扁舟時泛五湖東投間自識林間趣回首京華是夢中山亭雨坐鳴鳩乳燕繞簷飛灌木陰隂結夏幃倚杖去看新水漫經旬來覺故人稀當年館閣爭求識此日山莊靜掩扉舊事欲談誰與共一簾梅雨自霏霏試茶鬻筍欣然一飽喜而賦詩青山南畔久為家曲曲陂塘樹樹斜鄰叟供來龍塢筍山童時焙虎丘茶舊時梁燕營新壘開到薔薇又落花此日山林聊自適鶴瓢鳩杖足生涯寓目自遣梅子肥時雨乍收園林夏五景偏幽池邉翠鳥兼黃鳥屋上晴鳩喚雨鳩字學永和修禊帖茶傾宣德小磁甌一生辛苦成何事待得安間已白頭嘉禾沈王二憲長過訪讀罷楞伽掩竹扉山中忽枉故人車共談當日曽遊處回首東風草載餘見説買山同謝朓還期薦剡似相如二君方繫蒼生望未許明時擬卜居園亭園亭梅雨一畨過樂事偏多俗事無蘭蕊筆鈎笻竹帖羲之書水磨香爇博山罏一枰棋了茶初熟頃刻花開酒已酤正欲北窗支枕卧又看池上浴鷗鳬自遣開窗四望意欣然插遍新秧緑滿田乍暖又寒芒種候啓晴還雨熟梅天池邉細浪知魚樂草長平坡看鴨眠自笑老來生計拙踈慵真適有間緣雨晴書懷一窗晴旭映池塘緑樹成隂覆草堂新竹萬竿鳴珮玉踈松滿耳奏笙簧光流几簟新鋪地火焙薰籠近製香如此清間受清福何須復夢殿東廊新竹數百竿欲置小樓未就賦詩自遣緑遍園亭雨乍收籜冠野服稱行遊時攜拄杖穿紆徑欲傍新篁著小樓天肯與間還與健我真無纍亦無求詩逋畫債常堆積興到揮毫倦即休晏起日上山窗猶晏眠起來無事坐茅簷不聞門外催租吏時泊溪頭問字船飯煮長腰香稻粒魚烹縮項細鱗鯿罏薰初燼茶甌歇白石燈明繡佛前曝背獨卧山中閲歲華白雲雞犬護桑麻避人只為身先懶曝背因知日易斜數酌舊藏燕市酒一甌新焙小春茶回思京邸懷歸日不覺年餘已在家夜榻鵝羣閣不寐卧抱白雲山幾重山深野碓隔溪舂世心消滅思酣睡年力衰遲覺意慵半夜月明漁市鼓五更風動虎丘鐘江湖十載空奔走乞得歸間兩鬢鬆申政府寄書厯至歸來重葺虎丘居地僻時回長者車喜見春王新嵗厯欣看厚祿故人書公孫延士猶開閣玄晏窮愁自閉廬莫問踈慵只如昨文園終合卧相如虎山橋玩月光福西來水繞盤虎山橋月在林端霏霏細霧人初散拍拍新醅酒亦寒石塔影斜生夜氣畫船停處起微瀾分明一幅南宫景正好蓬窗倚檻看溪雲閣為歐陽子賦歐陽曽築醉翁亭白下雲孫寄一楹新水平添桃葉渡飛雲常繞石頭城沿流夕照堪垂釣隔浦涼生唱濯纓書卷茗薰消永晝秦淮原不讓蓬瀛春日書懷山園雨過徑如酥倚杖行遊不用扶載酒船停人問字賣花聲歇鳥提壺醉圍紅袖間揮灑懶畫青山有積逋鸂鶒一雙飛並浴滿池新水長新蒲玉蘭堂即事玉蘭堂坐靜無譁小盎閩蘭著數花載得寶華山上水試烹羅􅔩雨前茶手揮玉塵棋聲歇風動湘簾竹影斜投老身聞心亦靜喜無塵土是京華過石蓮莊拂衣歸卧虎丘居嘗憶吳淞江水湄不到石蓮經歲久重來岸桞緑隂垂眼前田畝皆新主村上人家異昔時獨有當年垂釣處至今橋畔有茆茨自適虛堂髙敞四垂簾散髮濡毫學素顚菰首作羹供午餉藤床支枕且安眠近於世味看來淡久悟玄機覺有緣一事不關心似水罏薰茗碗自年年雨過書懷一畨雨過樹扶踈湘簟生涼竹榻虛心靜不關身外事睡酣時墮手中書齋頭橫設天然几門外頻還長者車數載京華塵似海何如今日誦間居七夕抱病忽經三十日開簾驚見月垂鈎雙星又向河梁度獨卧遙聞笛韻悠雨過蕭齋涼思襲夢回虛枕簟紋流追思白首承歡處腸斷西風十五秋虞山桃花澗海虞山與白雲齊萬樹桃花古澗磎漫往慚非晨肇輩沿流疑入武陵溪前村小塢聞雞犬作伴隨身少鹿麛共領夕陽竒絶處青簾斜映畫橋西中秋夜見月華橫笛墻東三兩聲間庭獨坐晚涼生九秋今夜平分處圓月當空幾倍明風斂卿雲呈五色漏催銀箭已三更洗杯更酌登樓望撫景懷人無限情初冬讀趙文敏公詩可愛追次其韻雨歇雲輕漏日光庭前橙橘巳經霜故人逺寄新頒厯瓦鼎時焚內府香自覺心間身亦健何妨晷短夜偏長興來秉燭窗前坐隨意欣然榻硬黃附文敏詩平生詩句領流光絶愛初冬萬瓦霜楓葉欲殘看逾好梅花未動意先香暮年自適何妨退晚景無營亦是長况有小兒同此趣一窗相對弄朱黃借榻楞伽寺對上人房奔馳久不到楞伽來入山中日又斜淨室焚香僧入定雨窗間話燭生花百年心事三更夢十載江湖兩鬢華依舊鐘聲禪榻畔曉催新汲試烹茶次韻答張孟孺我歸林下歲將終君獨承恩出漢宫喜有高才同子建無心執戟侍揚雄豈難勳業凌煙上只欲精研書史中惠我驚人詩句好興懷長悒故人風春來久雨窗前石菖蒲忽開數花采供繡佛齋雨晴新緑上窗紗石上昌陽著九花靄靄輕浮雲欲動盈盈清淺水參差摘來服食依仙傳供向山齋閲歲華歸老心間無俗慮一燈相對禮毗耶除夕丁亥窮冬快雪喜時晴乞得歸間一老身繞膝孫曽娛晚景圍爐樽酒守庚申今宵歲次將更候明日年華是七旬秉燭酣歌須逹旦早裁詩句慶新春文氏五家集卷十三
