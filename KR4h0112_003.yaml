body:
  text: 文氏五家集卷三明文徴明撰太史詩集五言古詩飲子畏小樓今日解馳逐投閒傍高廬君家在臯橋喧闐井市區何以掩市聲充樓古今書左陳四五册右傾三兩壺我飲良有限伴子聊相娛與子故深密奔忙坐濶疏旬月一會面意勤情有餘蒼煙薄城首振袖復躊躇寂夜一首效子建中宵聞零雨撫枕起躇踟昏釭栖素壁流熖照重幃感此寂無語戚然興我思我思何鬱伊欲舉棼如絲少壯不待老功名須及時男兒不仗劍亦須建雲旗三十尚隨人奚以操筆為文章可腴道曾不療寒饑仰屋愧塵浮俯睞影依依人生良有命何獨令心悲心悲髮為白失腳令身危欲為絶世行道逺恐不支世情忌檢飭斂目俟其疲誰能七尺身受此千變機役役亦徒爾多憂得無癡惟應慎厥躬古人以為期題畫瑤溪涵素秋夜雨洗郊陌漁梁不通市悠然屏塵跡道人燕坐中平坡淨於席疏樹不遮山斜陽亂寒碧為陳子復畫扇戲題長松䕃高原虛亭寫清泚重重夕陽山忽墮清談裏吾生溪壑心苦受塵氛纍時從筆墨間塗抹聊爾耳亦知不療饑性僻殊事此有如魚吹沫不自知所以世人不相諒調笑呼畫史紛然各有須縑素盈案几襪材真足厭研吮良自恥經旬一執筆纍歲不盈紙交逰怪逋慢往往遭怒訾豈知書生為未可俗工擬五日畫一石十日畫一水雖無王宰能此例自可倚陳君乃何人亦自顧庸鄙一扇五更年此負真緩矣吾方懼獲怒君顧得之喜一笑題謝君賢於二三子秋日將至金陵舟泊慧山同諸友汲泉煮茗喜而有作少時閲茶經水品謂能記如何百里間慧泉曾未試空餘裹茗興十載勞夢寐秋風吹扁舟曉及山前寺始尋琴筑聲旋見珠顆泌龍唇雪濆薄月沼玉渟泗乳腹信坡言圎方亦隨地不論味如何清徹亦云異俯窺鑑須眉下掬走童稚高情殊未巳紛然各攜器昔聞李衛公千里曾驛致好竒雖自篤那可辨真僞吾來良已晚手致不煩使袖中有先春活火還手熾吾生不飲酒亦自得茗醉雖非古易牙其理可尋譬向來所曾嘗虎阜出其次行當酌中泠一驗逋翁智九月念八日夜夢中作碧桐已蕭蕭氷谷流决决獨行蒼莽間犬吠人跡絶旭日穿樹林青煙忽消滅時看殿巖風吹落松上雪除夕有感姁姁小兒語耿耿燈燭明空齊薄羞設言餞歲將行人行有歸期歲行無復程誰云無復程行與來歲迎不嫌去日逺端愁來歲併歲亦何去來送迎自人情人生良有限七十云已盈後此未可知今已半踐更詩書苦無驗冉冉白髮生富貴非不樂功業亦所榮少壯不相待老大徒心驚安得柔脆軀與此浮世爭聖賢豈常在古人崇令名感歎寧有益濁酒還自傾新正三日西齊對酒示陳淳乙丑西齊掩晴晝有客過我逰攬衣起肅客一笑散清愁新聲麗屋角碧草被高丘涉春始三辰巳覺氣變柔行看換朱白清隂覆牆頭青春來何易白日去何遒願言惜白日努力繼前修芳樽浮濁醪短案登嘉羞客情方眷眷我意亦綢繆綢繆何所為薄言氣相投顧兹一日長屈置門生儔淺薄晚無聞奚以應子求三年守殘經一舉不能謀豈曰屬時命要是業未優業至名自成德淵心日休勳猷貴乘時少壯靡遲留德荒學不講吾與子同憂題畫贈許國用窮巷十日雨泥深斷來客西齊午夢破跫然識高屐啓戶延故人一笑慰乖隔閒忩設香茗短榻散書册涉筆寫滄洲居然見泉石春山正沈沈春雨猶霢霢密竹曉低迷弱雲晚狼籍挾蓋緣高岡貌子獨行迹子迹良已竒吾意無乃劇吾生雅事此亦頗自珍惜願為識者畫不受俗子迫惟君鑒賞家心嗜口不索吾終不君靳不索翻自獲君能用君法吾自適吾適當得吾意時知否初未擇偶落好事手謬謂能入格餘人惟和聲遂使虛名赫雖得知已憐頗為遺者責誰云興致高正坐能事厄幾欲謝膠鉛就中有深癖我癖君更甚收此顧何益君言有妙理意自不能釋我畫惜如金君藏慎於璧好畫與好藏同是為物役聽竹虛齊坐深寂涼聲送清美雜佩搖天風孤琴瀉流水尋聲自何來蒼竿在庭圯泠然如有應聲耳相諾唯竹聲良已佳吾耳亦清矣誰云聽在竹要識聽由己人清比修竹竹瘦比君子聲入心自通一物聊彼此傍人漫求聲已在無聲裏不然吾自吾竹亦自竹爾雖日與竹居終然邈千里請看太始音豈入箏琶耳陳氏池亭納涼朱雲釁天漢金烏朗炎曦方夏苦埃鬱言遵芳園嬉息鞅偎南榭褰裳䕃北池微涼度鮮颷淺碧漾寒漪短藻翻鱗鬛閒渚集鳬鷖流目落翔泳逰心寓篇詞願言領幽意況復酬心知坐撫景光寂還憐車馬稀逍遙極曕諷旦晝不知疲疇能均涼燠無為居所移小齊盆蘭一幹數花山谷所謂蕙也初秋忽抽數幹芬馥可愛因與次明道復賞而賦之時雨祛殘暑涼颸集華軒春徂衆芳歇晚蕙抽璚根重兹蘭之屬不與几卉羣離離水蒼佩肅肅紫霞紳耿耿孤榻畔燕對如高人啓扉得良友列案羅清樽於焉撫靈植一笑滌塵煩微風南牖來濃馥散氤氲有時參鼻觀即之已無存譬彼孤潔士可望不可親如何庭階近有此幽谷芬相忘餘洌中漸久不復聞魯哲日已逺楚纍亦沈淪無能被雅操且復酹芳魂感興一首婉婉歲年謝霜雪凄以繁崇寒集枯條朝華不復存幽人眷遲暮靜息藏晏溫春風日夕至吹緑牆下根氣機無代謝焉知松檜尊歲暮雪晴山齊肆目偶閲謝臯羽詩窮冬疑有雨一雪却成晴喜其精妙因衍為韻賦小詩十章歲晏羣芳息枯條鳴北風層隂結黯霮朔雪飛長空𤣥冥肅景象物化歸終窮妍華肇伊始冉冉收春功其二積雪縞晴晝離離見高松眷兹歲寒枝不復知春冬旭光時明滅奄忽浮雲蹤塵心不能戢歲晏徒忡忡其三朝光射晴綺飛翼炫瑤姿微風吹竹藂文玉紛差差霜草行已繁氷谷流寒澌𤣥機抱終始逝矣夫何疑其四夜寒拂衾稠曉色明窗牖有客從叩門稚子方擁帚玉梅已敷英寒香在纎手一樽疇與同自入無何有其五空庭集饑烏景色入寒沍濃隂釀朔雪松石積縞素玉顔不堅好日出四簷雨薄晚北風微幽人啓朱戶其六朔吹號枯藤日暮殊未息居人事塞向鷙鳥厲高翼不知夜來雪庭户皓已積來麥端可期三白已兆一其七陽卉不復腓研沼氷初結雲日弄寒姿晶光互明滅雙扉風自掩陋巷人跡絶庭鳥忽自飛蒼松落殘雪其八初旭射茆簷枯藂戀寒雀睡起無餘聲風簾時自約展册娛道言樽酒獨斟酌無人不妨閒客至亦不却其九擁寒不出户焚香娛燕清朝日照盂盎浮光上虛楹修竹不受風時時蒼玉鳴閒情溢眉宇酒醒詩亦成其十殘雪不蔽瓦斷溜收寒聲晨威淒以嚴雲日麗新晴凌風振藂薄枯卉不復榮年光屬歸斂慘淡有餘清春興二首春陽轉芳序淑景麗清嘉晨風扇微和百鳥鳴周遮繁隂泫清露朱英耀朝華端居愧物化起擷崇蘭葩貞芬媚幽獨常恐委泥沙青青陌上草日夕遍天涯其二妍英弄芳意柳色含春姿物華浩無涘駘蕩東風吹東風日以熙草色日以滋青春萬里道逰子有所思浮雲漏白日宿露朝已晞攀條惜婉麗忽得瑛瓊枝芳悰未有托暮景已西馳菁華難復恃結皓聊自怡支硎山平巒疊蒼翠云是支硎山支公今何在白日空孱顔灌莽翳深壑有泉覆其間委流界中道足底聞潺湲悠悠遺世人曾此寄高閒芳蹤藐難屬古字蝕苔斑題畫贈皇甫太守斜陽帶回堰秋影落寒潭微風薄高樹巖花落毿毿何以消宴坐溪聲答高談虛闌寫空馥疏簾搖夕嵐君今有公事萬里䇿征驂還應燕寢地展卷憶江南古風贈鄭先生紫蘭生谷中英英茁瓊芽芳根抱幽獨不知桃李花桃李當春時明麗烘朝霞物化歸有盡穠艷無常華風雨日夕至零落空泥沙回看幽谷藂奕葉含芬葩旁滋百畝蕙留夷均揭車申椒雜蘅芷百馥紛交加終資扈紉收豈久在天涯胡猶困薋菉日暮令人嗟被服平生懷欲往道匪遐願言從明潔卒歲保貞嘉二月二月春尚早青泥沒蘭芽東風日夜急吹雨作瑤花玉龍壓層簷素月流寒沙香紅逐飛鞚令人憶東華題畫高澗落寒泉窮巖帶疏樹山深無車馬獨有幽人度幽人何所從白雲最深處出山不知遙顧見雲間路三月既望同吳次明蔡九逵陳道復湯子重王履約履仁泛舟石湖遂登治平以天朗氣清惠風和暢為韻分得朗字良期每多違佳節悵虛往薄言城西逰餘春遲幽賞日色漾漣漪天光發融朗清吹飄文裾瑤湍激蘭槳寄懷涉清川平目眺遐壤晴霏動遙岑青煙散修莽亞竹孤卉明隔木春禽響及此單夾成聊寄臨流想先友詩并序徴明生晚且賤弗獲承事海內先達然以先君之故竊嘗接識一二比來相次淪謝追思興慨各賦一詩命曰先友不敢自托於諸公也太僕李公應禎太僕在三舍抗言拒刑臣公在太學中官牛玉欲延教子公正言拒之平生強執志已究未達身十年更外制耿挺標清真矯矯孤飛鴻翹翹一角麟卿監晚回翔白髮已盈巾故國有佳山長岐多風塵終然絶俗姿逸去疇能馴參政陸公容陸公婁東鳯少小已翺翔公少與張滄洲泰陸靜逸鉞齊名時稱婁束三鳯耿耿文莊公識公在班行職方振風采抗疏扼羣璫章程在司馬至今有耿光名隆毁斯來讒搆伺其傍參藩亦晚達竟為讐者傷清風不終泯遺書滿緹緗定山莊公昶定山古通儒學道希聖賢古義與時違斂息賁園田黃花媚幽徑白鳥泳清川悠悠青山適一往三十年高羅弗為求欲致無由緣非無濟世心亦有清廟篇惜哉用違材零落成棄捐文定吳公寬有偉延陵公居然古明德道義周一身文章可華國悠悠明堂思允矣清廟瑟惜哉晚登庸位用時未極還能敦薄夫坐亦消讒慝德淵物為遷曾誰覩聲色聖賢不復生斯人重吾憶禮侍謝公鐸巖巖天台山下有幽貞士咀英擷芳鮮燦然散霞綺早歲登延閣回翔石渠裏璧雍育羣材金匱抽青史雖復恩眷殊不為纓組纍方巖有書堂歸來還秉耒屢召不終淹誰應會深㫖處士沈公周東南有一士蘭帶芙蓉裳璚珠雜瑤玦皎然明月光不隨鳴鳯下甘與黃鵠翔秋風自寥廓羅網漫高張采芳涉秋苑看雲撫層岡不為平生得白首聊徜徉悠悠天隨子千載永相望參議王公徽王公夫如何侃侃古遺直一命青瑣闈慷慨思效職此身朝闕廷暮已在絶域所期言職伸寧計一身抑丘樊樂優游天子思舊德陜郊甫旬宣遄歸一何亟松菊媚幽人鍾山有佳色太常吕公㦂太常名家子英英蒼玉玕文章足華煥秉志亦堅完禮曹肅供奉弱冠已鶱摶不愛䕃補郎自致青雲端滁山詠列錦銀臺達糾彈所至必宣秉云胡不終安只應千首詩終古無能刋宿任城次九逵韻北風吹古堰長河捲沙白昔聞謫仙人曾作任城客任城非故樓勝事今尚籍想見天人姿春風岸烏幘落月伴長庚何處尋醉魄我行後千年空見徂徠碧長笛起鄰舟夜靜聲裂石不見賀知章悲歌向中夕巨野次九逵韻黃河互回折青山時隱見行行次巨野古服猶漢縣空聞澤既豬非復禹初甸野色浩無垠忽復春風變春風不可稽客子行亦倦黃金日以銷轉覺青衫賤雨濁或膠舟時行眺回堰驚吹捲平沙河流激飛箭何處望神京天涯雲一片誰云千里遙去去南風便無錫道中遇雪夜泊望亭二首北風吹朔雪飛霙雜零雨孤舟暮不前收帆得沙渚天埀野隂合日暝江雲吐川原入蕭條林木積縞素寒厖噤不鳴饑鳥驚還聚舉酒不成歡挑燈時自語飄泊豈在逺出門即羈旅其二長林風怒號天低浦雲黑空村煙火微近渚漁舟集路暗行跡稀蒼然見寒色野泊不成眠羈魂還惻惻昏燈黯欲絶歸夢迷咫尺戍逺更漏沈川寒聲影息不知積雪深夜久孤篷仄九日遊雙塔院次淵明己酉九日韻時叙不容淹忽忽寒暑交矧余蒲柳姿望秋已先凋山林樂閒曠勢途利崇高人性各有適奚但壤與霄爰以一日歡酬此卒歲勞古來明哲士取材不遺焦銜觴輒忘世何似栗里陶得酒且復樂安能待來朝十日遊治平寺再疊前韻季秋氣未肅鳴禽尚交交澄空霜華薄木葉不盡凋撫輿陟前岡不覺身已高回視平湖東逸峯聳晴霄但欣雙目明寧辭一身勞物理會有窮何以心煩焦世情共擾擾吾樂方陶陶達人悟遷化千載猶一朝新晴積雨浮宿潤新晴人意適逍遙竹忩中啼禽破幽寂初陽動簷瓦殘溜時自滴曲巷行蹟稀苔花繡深壁五星硯并序余得古端硯鋭首豐下形如覆盆面鏤五星聚奎及蓬萊三島左右蟠雙螭刳其背令虛鐫東坡製銘一龜橫出作贔屭狀文鏤精緻不知何時物也因命為五星硯買市得古硯雅與時製别鋭首下微豐刳中面多纈盤盤覆雕盆斬斬截古鐵背銘龜巧負周飾螭雙揭層閣擬蓬居羣星象奎列聚觀驚特竒細玩有餘拙製豈由常徒材仍出下穴挹毫真有助受水復不竭何為塵市中簿算幾沒滅爰登文字場永厲清重節礲磨應不辭汙辱庶幾雪吾儕二三子無日不相接管城與𤣥楮固自有優劣得君稠人中應是諸子傑幽忩榻無時小圃吟不輟從今難復離坐置行復挈良充几格玩何但揮灑設便須襲錦囊勿與儔類䙝人日王氏東園小集晴颸泛叢條浮陽散修莽良時及初正涉七氣已爽厥日肇惟人探占喜融朗駕言求友生名園欣獨往折蔬充朱豆扶藜企高壤陟彼牆下岡寄此天際想被草晨風和隔竹春禽響新秋夜坐斜光暗層樓庭陰乍分暝閒門夕未掩月出虛廡靜明滅腐草暉參差碧梧影秋至涼風生蜩鳴夜初永撫景慨多違驚時每深省白髮不待年況此百憂并沈沈市喧息稍稍栖禽定不知更漏深坐覺衣裳冷仰睇北斗橫繁星麗光炯牛女寂不言銀河空耿耿不寐欹枕數寒更漫漫不能旦天寒雞再號燈昏鼠窺案藥罏火已微羣兒睡方鼾清風自何來泠然動虛幔病眼苦不眠循牀發遐歎人世百年短吾生已強半況此貧賤軀時為小兒玩一卧五經旬形消髮垂燦神情日以摧志業交凌亂豈不懷明時流光榻中換平生二三友雅志在霄漢下夀曾不滿半逐浮雲散感此念微明悠悠何足羡明月度孤音霜華滿庭院題畫二首稍稍涼颸集依依炎景流西風吹木葉秋色滿蘋洲伊人何所懷掇棹自夷猶青山在篷底白雲宿船頭滄波渺然去仰見天漢浮飛塵暗岐路回首正悠悠其二輕浪激回渚光風泛榮條青天渺何許中流見仙橈修眉落明鏡蘭帶矞雲飄含情采芙蓉無那美人遙文氏五家集卷三
