body:
  text: 文氏五家集巻十一明文肇祉撰録事詩集五言古詩宿山中出城入山寺黄葉滿林臯焚香坐髙榻静聽松聲號自憐失路人蹔從物外逃借此雲堂宿新寒欺布袍歘然作竒夢弄棹飛洪濤憑虛不知止萬里恣遊遨去去登海嶠天風吹鬢毛驚覺滿齋白開忩山月髙送幻上人還月輪寺南朝四百寺月輪古祗林幻公一出山薜羅三改隂爾以月為性我将雲作心浮雲與明月相送歸遥岑贈王郎王郎豪俠士意氣凌秋旻胸中富甲兵思為報主身少小耻閭里撫劍開青鱗不隨俗士偶寕交屠狗人大笑出門去奮身離風塵夜宿孤山月朝臨白馬津雲中多猛将瞑目從征輪一朝功成後黄閣圖麒麟寄友人相别一何乆再見何獨難忽忽歳復歳夢行山外山髙山與流水鳴琴為誰彈望望不可即書寄惟加飡嘲桃李花茂苑三春時桃李花盈枝争妍共含笑自謂東君私一朝顔色改片片隨風吹詎知喬松幹常挺歳寒姿松姿本孤直不同桃李萎登金陵謝公墩宿寺中追和李白韻登髙恣逺眺一望長江奔人世有代謝江流無朝昏緬懐謝公跡今已成郊原白雲隨日散明月浪中飜行行入古寺中壘石為門石門時静掩萬竹寒雲屯回視四山寂幽賞誰與論謝公不可起誰復為招魂興亡餘六代斯人安獨存風流日已逺秋草埋荒墩㳺人自來徃不聞車馬喧我來覽古勝懐古不成言借栖巖下石枕石移雲根夢破起黙坐便覺丹府暾幽情頗暢叙無勞絲竹繁有酒且斟酌摘蔬開寺園人生如過鳥何用尋仙源歸山寄金臺知已北走仍南圖所交非俗儒黄金不足重意氣凌天衢瞋目視王公不敢私㣲軀謂身可立致方希佐黄虞蹉跎不得遇五噫出京都歸来無産業東作誰相呼彈鋏徒激烈出門空踟蹰賔客不在眼吾亦自忘吾忍饑時誦經真不如屠酤魚目亦相笑空與明月俱他年倘相訪知我學潜夫擬古五首翩翩林間鳥悠悠嶺上雲雲出本無心鳥飛時念羣物亦欣有託矧余處世紛中腸慕遐舉濩落無所聞歳月去云疾荃蕙寕乆芬古道巳寂寞吾衰亦何云其二人生駒過隙一朝難再晨有酒且斟酌行樂須及辰胡為自結束不用常悲辛四海盡兄弟何獨骨肉親茍隨徃化滅同作陌上塵願言棣華接勿與衰草均其三庭前䨇桐樹四月始見華盛夏敷繁隂亭亭疊青霞禽鳥知所止吾亦爱清嘉大火忽西流敗葉随風斜空抱大雅材委棄若泥沙何用覔知音相與訪伯牙伯牙沒巳久行行浩無涯其四女美衆所憐士窮世所賤貴賤何足言世情從此見買臣未遇時愚婦心先離季子佩金印妻嫂迎恐遲自古巳如此何用空悲噫其五東方有美人逺在天之涯窈窕淑且婉意態殊閑佳春風借色艶色艶嬌如花珊瑚初出海未足比光華誰家白面郎金勒紫㳺韁欲渉不可即立馬遥相望何如化鸂鶒飛傍朱欄旁山中徐歩山中初雨過一雨樹如沐幽人獨徃來幽鳥哢成曲僧來薦新茗狎客事棊局斜日閣西嶺扶杖下山麓感遇我昔少壮時委懐在書史被褐欣自怡䇿駕辭鄉里一徃三十年無成復耒耜寢迹山南村真想只如此緬懐望前塗歳月去何駛寓言昔為凍餒驅投耒學干禄北寢與南圖燕趙日馳逐縱有遐舉心不及䨇黄鵠誤落在塵網歸來宿茅屋田父相徃來慰我素心曲俯視池中魚仰送飛鴻目荏苒星氣流壺觴聊自足卜築結廬山南村素心可與言鑿沼駕飛虹題為日渉園居室八九間環周水潺湲惟與鳥雀馴不聞城市喧去去百載外身名安用存仲夏夏日樹扶踈園亭敞中虚寄傲北忩下泛覽古人書仰無慚高鳥俯不愧㳺魚只此有餘趣吾真爱吾廬與友談昔昔我年少壮志逸㳺四海荏苒四十秋無成徒慷慨且復歸去來山中得君在晨夕相徃還芝蕨共攜采前塗知有幾無須問真宰園林秋夜獨坐聞秋聲秋聲來樹間燈影搖虚室悠然意自閒閒情付流水日夜猶潺潺人生誰滿百何獨徃不還雪飛雪滿園林號寒有負薪千樹梅花綴寒枝玉勒新呼童貰酒至竹爐温火親羡殺袁紹公僵臥不干人雨仲春時雨降草木俱欣欣水長新波澗風來水弄紋茅簷語𤣥鳥四山生白雲爱兹品類繁野色過橋分唐人曹鄴因舉不得第有四怨三愁五情詩余亦要作一怨二愁三情以望詩人救美人顔如花顔好誰人知無媒不得嫁終亦還自疑右一怨春來萬卉妍枯木新條發著意待東風難消頭上雪髮白終難變金燒亦不成人生誰滿百何以學長生右二愁桃李盛春風芙蓉媚秋渚開謝各有時天工豈無處獨鶴翔天表孤鴻下沅湘何如雙飛燕營壘棲雕梁有女適王孫或作黔婁媍羡殺嫁田夫白頭常相守右三情園亭園林敞南軒悠然與世隔早起看青山山青一如昔清風從東來吹我頭上幘眷彼松菊存品彚随動植隣叟有好懐徃來數晨夕雨過觀魚天時乆不雨池沼水皆涸夜來新雨過水漫復如昨㳺魚隊隊行悠然自泳躍莫道我非魚我自知魚樂五言排律鄔都尉招飲主家開綺席晴日敞華堂賜第連霄漢朱樓傍苑墻飛花沾燕壘垂桞囀鶯簧錦瑟當筵立銀筝列雁行舞娥攲翠䄂侍女伴宫妝法酒傳中使珍盤出上方畵屏圍玉斚澗水滌瑶觴詞客調鸚鵡彤庭儀鳳皇紅蓮分太液箓竹奏琳琅鶴馭羣仙駕鑪薫内賜香月高人未散斗轉露華凉虎丘劍池祓禊風光今日好閒歩劍池邊修禊千年事暮春三月天空中樓閣逈池上轆轤縣少長忽咸集嘯歌時劃然流觴環列坐煮茗汲三泉放浪形骸外登臨杖屨前巖花晴拂檻澗草暮含烟攜榼追歡賞沿流急管絃蘭亭蕪勝迹一記至今傳海上觀潮八月近中秋閒來海上㳺凝眸瞻貝闕俯檻聽龍湫踴躍乾坤浴空濛天地浮潮聲奔萬馬水氣動潜虯怒浪翻鮫室驚濤擁蜃樓此身空浪跡處世一浮漚慷慨心猶壯年光日夜流七言古詩桃花磵逢丈者虞山山髙髙入雲下有古磵烟氤氲萬樹桃花夾流水水邉雞犬聲相聞雞犬相聞茅屋底屋底老人坐不語豈是當時遺世民避秦虐政來居此笑而不荅意自欣觀之古貌亦古心我欲跪之問寳訣回頭不見深山深石湖行春橋歩月晚來雨過煙藏寺日閣沉沉萬山紫須臾湖光㶑灔廻驪龍弄珠出海底海底一躍千仞髙星光閃爍浮金鰲朱欄倚遍市喧息酣歌倒坐醉中豪當年此月今不改曽照吳王舊臺榭呉王臺榭蹟巳陳惟有此月今猶在古人今月已千秋今月古人今在否眼前烟月不堪數何如范蠡西施游寄羅逹夫石蓮洞歌文山蒼蒼文水碧中亘綿延連一脉石門閟道虛翠屏天削芙蓉秀絶壁絶壁危崖五色溶仰看菡萏排穹窿丹牀石竈隨所設竒花異卉青溟濛天降羅公美顔色即今海内文章伯詞源倒瀉三峽流珊瑚出海秋月白奪標曾擅少年場甲榜名題金字黄明堂法座列鏞磬石渠中秘聲琳瑯建儲一疏上天子萬言切直因忤㫖歸來重向洞中㳺長齋乞鉢常如此洞門倒掛蓮花巾手揮玉麈辭將迎名山或有異人遇跪受寳訣祈長生承惠石蓮洞歌調逸意古夐出塵外誦之再四雋永令人不能去手會當索喜鐫爲入石壁間當與此洞同流宇宙也倉卒未即賡和誠負髙情滯迹病踪歳增一歲不足道燈前夜色倍有懷人世講弟羅洪先頓首元夕篇長安今夕是元夕皇都佳麗無殊昔昔時曽到蓬莱宫龍膏鳳炬光千尺千尺光凝結綵樓鰲山重疊雲烟收烟收明月正當頭仙禦燃燈複道周遥瞻天子六龍馭五色雲車擁髙處髙處離宫别館開翠蓋鸞輿繡幃御出向天街紫陌長王侯第宅鬬新妝新妝初罷踏明月蕙火蘭烟滿路旁路旁許史金張宅銀燭髙燒邀上客上客調成鸚鵡篇鳴金伐鼓開華席歡歌未巳夜將闌星斗横斜禁漏殘傳呼行辟候朝者聮鑣玉珮聲珊珊避暑避暑來遊到虎丘虎丘南去林堂幽林堂幽静無人至修竹千竿碧欲流竹樹扶踈覆亭館浮瓜沉李調氷椀一觴一詠暢幽情不用銀筝并翠管翠管銀筝醉昔時昔曽沉醉習家池何如跣足科頭坐世事紛紜捴不知打魚山田犖角麥秋寒山雨欲來風激湍觀魚踞坐得真樂閉門新竹千琅玕千竿竹暎蒲桞緑隂符在匣羞更讀恵連池上冒雨來攜㓜呼朋慰羈􅍦獨有元龍興自豪命童打魚魚尾勞大魚掘强小魚棄饔子揮刀飛雪高欣然一飽意自足不羡鏡湖分一曲六畆魚租五畆竹曽看陶朱治生録不圖利倍有十千但願怡怡天樂全君不見田家以感荆冄合姜氏共被今猶傳况吾與爾樂便便十日一㳺期莫愆右子悱弟約余旬日一㳺山園偶愆期不來詩用招之即冒雨而至遂命童子打魚供餉既醉而還賦以長句兼示後期彈琴岡上梧桐髙十尋梧桐翠葉敷清隂主人獨自撫琴坐獨坐閒調太古音太古遺音久不作此道只今空寂寞鍾期巳矣伯牙亡千載知音巳寥廓悠然流水與高山山矗矗兮水潺潺方壺員嶠在眼底一笑推琴心自閒夜臥墓所不寐孤燈明滅茅簷深布衾單薄寒相侵月高山寺聞鐘聲耿耿不寐生憂心心摧膓斷身無倚春宵獨臥荒村裏少年一刻千黄金此時一刻愁萬縷愁思萬縷夢親幃驚覺惟聞烏夜啼起來試取春衫著猶道當年戲綵衣贈沈道人沈休别我非一日歸自南屏峴山隔峴山岧嶤霅水西碧浪湖連芳草色今來訪我白雲深雲深塔影空沉沉銅盤戲曲梅花衲駐顔不用燒黄金修髯玉立絶塵鞅竹籜為冠鳩作杖恍如洪景出山圖獨行徐歩紅橋上紅橋東來虎阜居分明諸葛南陽廬與君朝夕數來徃還讀人間未讀書錢學博青之七十與君同學二十秋復同追隨京國㳺兩都共賦獻宸旒當時人擬稱元劉天閒寥曠俱未收臯比君擁登莱州掖道宫墻環講求洧川再轉仍淹㽞何當伊洛多名流種成桃李滿谿頭忽憶吳山思乞休拂䄂歸來志已酬孫曽繞膝鸞鳳儔􅀈琅作賦輝皇猷我今花甲亦巳周費盡黄金一敝裘何時觧脱釣鰲鈎歸與君盟沙上鷗上元日兒軰集諸友㑹文至晚張燈小酌去歳有兒同客處一燈相向愁依倚我今歸來忽踰年兒獨淹留在京邸歸來兒軰仍紛紛大兒小兒皆属文盍簮㑹友集同志竒文賞析俱殷勤須臾雪霰滿庭宇飛花如掌隨風舞燃燭髙張四壁燈坐中上客調鸚鵡吾家老叔八十强牀頭酒熟呼我嘗東隣兄弟衣金紫尚憂不足心遑遑今日諸君各矢志致身早早少年事流行坎止順吾常鼎鼎百年真是戲贈楞伽南上人七十當年曾臥楞伽寺日有敲門問竒字忩明几净獨焚香燕雀猶懐鴻鵠志南郊上人方少年誦經趺坐佛堂前閉闗日夕修禪觀金磬時聞落逺天汲泉煮茗隨吾適時采於山美可茹上人真是逺公流媿我元非蘇晋侣誤落塵網三十年歸來重到湖山邊來叅雪竇一龕裏袈裟雲臥如金仙香燈歳晚無異昔小閲浮提已七十願結蓮社山之中自笑聲名何用足九日登吳山吳山山髙髙入空懸崖削壁青芙蓉登髙今日逄重九結伴同遊山上峯峯前山下人如蟻走馬乗輿並肩倚日暮行人尚未稀畵舩簫鼓中流起簫鼓聲悠湖上㳺湖光山色捴宜秋行歌雜沓逰人散明月滿山烟霧収閒居自述十年上書不得意歸來髙臥深山裏山深被褐掩柴扉環堵蕭閒少知己知己無人㫁徃來兀然獨坐茅簷底茅簷兀坐不記年無復馳心慕青紫一朝忽枉故人書問我何為不入仕幡然一出向長安萬言不敢干天子天子詔許為園官低頭授職聊居此此身踈嬾不受拘白首為郎還自耻飄飄掛冠神武門神武門前乞恩㫖䝉恩早賜拂衣歸拂衣依舊還桑梓桑梓山林日月長日上山忩呼不起羅列孫曽繞膝前膝前歡舞歌樂只七言排律石湖逰泛春來今日到湖濵湖邊村市人紛紜波光逺映蘪蕪没山色晴開錦繡文茶磨山頭茶正熟盟鷗亭外鷗成羣青帘隐樹酒家近翠帶牽風水荇芬錦瑟瑤筝湖上起朱簾畵舫鏡中分醉如白傅圍紅䄂嬾學羊欣寫練裠谿畔漁舟垂晚釣寺中樓閣帶斜曛舉頭月色當空照何處鐘聲滿座聞千古興亡已陳迹吳宫越壘空氤氲北京西山借榻碧雲寺入山蘿薜晝沉沉下馬行過古洞隂獨倚石橋看急澗坐觀庭宇俯喬林環墻山色浮烟靄繞砌泉聲和磬音虛榻借栖清夢醒閒忩臥抱白雲深梵鐘催落忩前月老衲時彈膝上琴棐几香殘閒睡鴨佛堂齋供有來禽蘋婆名梅花滿地飛紅雪菉竹千竿倚翠岑何日拂衣重過此常依清境洗塵心文氏五家集巻十一
