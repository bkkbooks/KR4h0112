茅屋日日靣溪流有時倚檻觀白鷗白鷗飛處青山秋不妨坐釣垂直鈎徜徉泉石忘吾憂送劉玉橋北上嵗晚江空岸草枯故人舟楫向皇都相逢不盡相違意寫得天寒欲雪圗送燕華山㑹試燕君䇿馬向燕山霄漢蓬萊咫尺間無奈春風催獻賦桃花一路照朱顔石橋别愛此白石梁况對橋上月攜手素心人而於此中别歸來明月還照我光濕瑶階露華墮疏鐘不鳴偶回顧嚴城層層巳深鎖暮相思暮歸月在庭庭花巳漸發不見月中人悵望花間月春雨憶孔加濛濛細雨集洗滌此幽林虛館絶塵想緬焉懷同音緑草巳盈砌芳醑聊自斟欲往限南北褰裳畏泥深人生豈有涯歡㑹當及今無由寫耿抱撫事獨沉吟虎丘月下送子任赴湖廣憲副奉使逺持三楚節乘春同作夜山行月浮皓彩天中見塔繞紅燈樹裏明山色溪聲終古在賞心樂事幾人并酒闌不盡相違意愁見江頭春水生陳氏園次韻再送子任風裊垂楊枝弄柔城闉偶集野堂幽巳過佳節愁芳㑹又續林燈作夜游杯色盈盈滿樽酒歌聲嚦嚦隔花喉武陵桃源花正好此去君應無别愁送人之金陵送子秣陵去風烟我舊遊青山雲外寺緑樹水邊樓塵榻家家下新詩處處留鳳凰臺尚在莫負酒如油送顧小川典籍使代還朝星槎八月回閶闔九天開暫弭吳門楫同銜江上杯滄洲吾尚困青瑣爾真陪自悵風塵侣還憐霄漢才清秋楓葉赤離思杳難裁既愁津樹逺復恨逝波催他時相憶處明月照疏梅送陸𤣥嶽安州别駕陸機詞賦擅東吳小試卑官鬱大儒易水風烟應似舊悲歌今有昔人無一官潦倒易河東簿領紛然嘆道窮聖世百年思禮樂豈無真識薦王通蠶葉圗柔桑春半葉離離采摘盈筐手自持頻視蠶稠愁葉盡肯從桃李問花枝五湖浪接五湖天澄波凝紫烟蒹葭明逺漵鷗鳥下平川吟玩天隨句虛無范蠡船一樽消日月倣佛御蓬仙送周公瑕之金陵次張伯起韻仲夏園林草木長花間把酒别周郎風塵早巳侵愁鬢琴劍行看上野航獻賦馬卿才未達校書劉向筆逾蒼只應後夜秦淮月兩地風烟照渺茫送人游襄陽東嶽清秋掛帆去汗漫采真遊古洞尋三秀仙壇散百憂風烟元冉冉雲物共悠悠疏豁憑誰寄應登黃鶴樓病不謂愁傷肺能令意少歡酒杯渾欲廢書卷厭頻看事數驚新變衰猶著舊冠壯心零落盡髙枕且加餐送凌道山應召之京文聲馳故國政譽靄宜春丞相知名舊銓衡得士新定逢調鼎鼐寧復久風塵不盡相違意臨岐一愴神送華補菴九江還朝九江欣報政虎阜悵維津績比清流潔情隨白髮新臨髙宜曠望撫石愛嶙峋莫訝難為别分襟迹易陳送門神次石田先生韻衡門執㦸兩閒兵澆酒逢除漫爾榮四序相隨如有戀一年同住豈無情幾因風雨銷金鎖不為馳驅損赤纓自古功成身合去肯將流落怨時明送江隂趙宰澄江三載嘆賢勞果見徴書起俊髦千里長江增保障百年吾道立髙標堂隂歷歷羣黎愛行色蕭蕭匹馬遙此去五雲知柄用好陳雕敝答清朝成化間海南進紅鸚鵡石田先生見而圗之近豫友顧君亦於海南得二翼朱衣翠裳觀者驚嘆惜不能置之上方耳昔昌黎感二鳥而作賦豫又嘆斯鳥之不遭也何處珍禽繫碧籠緑衣今巳換腥紅聖王方重禽荒戒零落朱衣野草中畢潭畢澤潭邊我屢過風烟近日復如何曽攜艇子狎鷗鷺每憶汀洲足芰荷主人况是陸魯望愛客能為漁父歌沙明水碧無由往羡爾全家住薜蘿贈陸虛臯住近伯通橋烟霞隔市朝齒臨三老近飲赴八公遙月白時聞笛風清或聽簫承家有賢嗣知不混漁樵送湖廣族人還吾宗有賢秀迢遞自衡來逺道兼程發孤舟隔嵗回江潭雙目送春渚亂雲開我亦思先德無由掃緑苔次錢叔寶韻題鳳山扇緑柳差差長夭桃故故飛燕翻波共掠鴛宿渚同依風外荻芽亂沙邊雲影稀吳娃莫蕩槳濺水濕紅衣舟雨日日舟中住兼旬雨勢狂夜篷驚滴滴曉溜厭浪浪直恐蛟龍起深愁鳥雀藏垂垂正未已何處覔驕陽蔣氏西園聞說西園勝風烟近若何蜀山連嶺秀罨畫引源多水竹饒魚鳥波塘足芰荷買田吾儻遂乘興數來過次張伯起韻偶向溪邊共繫舟風烟隨地得同遊雲開罨畫千山秀雨歇銅棺五月秋踪跡飄搖疑梗漫乾坤浩蕩與身浮莫言樽酒論文事煮茗焚香事更幽贈朱鎮山君有經綸志今為廊廟材風烟鎮山在竹樹野堂開隱几浮蒼靄攜書映紫苔蹊塗茅塞久煩與闢蒿萊寄吳半溪荆溪溪上碧烟虛最愛吳髯水竹居半畝清池堪引釣一窗疏影礙臨書每因月出常穿徑幾為花開小住車回首風煙秋欲暮題詩問訊近何如文氏五家集卷九
