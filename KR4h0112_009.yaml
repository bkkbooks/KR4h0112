body:
  text: 文氏五家集卷九明文嘉撰和州詩集天池天池之山今始到仰首忽見蓮花峯池水潺湲瀉琴筑石壁嶻嶪開芙蓉春疇連延麥初熟暮嶺回合烟巳重肩輿催豫下山去悔不此地巢雲松善權洞石室山人去不返亭亭一柱玉當門飛流實聽雷霆鬬怪石虛疑虎豹蹲梁帝斗壇荒草積十仙題字古苔昏聞道潛通三萬里幾時騎鹿看真源張公洞福地真傳霹靂開仰空虛竇看崔嵬千盤磴道穿深黑萬古仇池接往來頗怪洞中常見日翻從地底一登臺聳身忽自崖間出回首仙源悵草萊石湖八絶次王履吉范相祠前水接天越溪莊上柳如烟石湖盡是青油舫不數西湖有畫船行春橋影卧長虹落日波搖萬頃紅山似蓬萊人似玉杖藜徐步水晶宫拜郊臺逈插蒼天茶磨峯髙凌紫烟一線太湖雲外見萬家烟火望中懸補陀巗下石梁橫醉卧能令萬慮醒亦有蒼藤懸日月只無江峽鬬雷霆澄碧樓髙盡面湖草堂清寂坐虛無倚闌烟水皆鷗鷺拂檻松杉總畫圗鵁鶄鸂鶒滿晴沙紅杏夭桃亂著花十里湖山開畫障一雙小艇載琵琶村前村後幾家住家家桃杏花如蒸偶然來上岡頭望雞犬桑麻似武陵湖上羣山濕翠濛寺前楊柳緑烟濃越王臺榭千年恨估客帆檣萬里通寒山寺春尋古寺幽相與話前修名豈寒山得詩曽張繼留樓鐘虛夕照橋影急河流尚怪石龍柱拿雲勢未休蘭亭曲水蘭亭宴風光屬暮春豈惟酬勝賞聊用樂嘉賓酒罰杯無算書成筆有神翻憐金谷㑹回首跡俱陳泛長蕩孤舟穿葦去氷薄動寒沙水鳥時集樹饑羊晚到家浮游波上梗飄泊浪中花惟有青山色依然一道斜己酉冬夜同大姪宿夷亭舟中有懷幼于卧穩舟如屋更長夜似年懷人聞過雁燒燭檢新篇犬吠疏籬外潮生曲港前相攜阿咸在聽雨得同眠清湖洲清湖洲上草痕青沙水流成文字形萬古波濤終不改舟人指㸃說寒汀金牛寺金牛泉畔古招提常日來遊路不迷問斗尋源幾人到春風春雨鷓鴣啼梅林渡梅林渡口幾頻過水面曽看利涉多萬樹瑶華千尺浪隔江山水鬱嵳峩追和元雲林倪徴君江南春詞三月江南薦櫻筍鵁鶄鸂鶒回塘靜蛛絲縈空網落花雲母屏寒浸嬌影簾外沉沉春霧冷緑蘿欲覆花間井泥金小扇幛紗巾畫橋紫陌踏芳塵花開遲水流急江鴨對眠莎草濕吳姬如花花不及摘花笑映溪流碧楊柳烟籠萬家邑柳下王孫為誰立幽渚泥香生緑萍閒看梁燕壘經營婁江婁江流水渺蒼烟無限晴波滿目前冉冉時看鷗鷺下悠悠疑與海天連風濤隨處喧行客舟楫還能濟巨川我欲因君泛溟渤乘槎直到女牛邊虞山七檜虞山山下七株檜云是梁年天監栽落落離立老氏廟森森逺映昭明臺風生似聞豺虎鬬雲起直訝蛟龍來莫言委棄未得用巳見磊落俱竒材嶽陽樓突兀髙城俯碧流城頭縹眇接飛樓坐看汶泗雙波合隱見龜鳬疊嶂浮賀監清真應不泯謫仙詩律若為酬憑闌無限懷賢意目送孤鴻度逺洲白燕雙燕翩然下竹扉曉簷霜羽弄輝輝誰言白鳥非𤣥鳥肯信烏衣是雪衣小院風輕迷蝶去滄江日暮伴鷗歸也知自惜竒毛羽不向朱門汗漫飛與友人釣魚曠野煩襟豁青天素月流不因同二阮那復此竒遊磐石偶余契絲綸亦漫投平生釣竿興隨地可銷憂毗陵道中暫弭毗陵楫來尋隱者居門前一池水案上數函書畫就雲生壁詩成月在渠盤餐莫兼味聊為摘園蔬雪浪閣雪浪閣前明鏡開崇元觀裏一徘徊松風潭月依然在只缺仙人跨鶴來螺子山螺子山臨北渚湄吾家丞相有新祠停舟展拜斜陽裏一壑松風泠鬢絲快閣泰和快閣初登處極目江流樹外平記得涪翁當日語澄江一道月分明蕉石軒太湖石畔種芭蕉色映軒窗碧霧搖瘦骨主人清似水煮茶香透竹間橋桃源圗偶然避世住深山不道攜家便不還却怪漁郎太多事又傳圗畫到人間縹眇峯縹眇峯髙幾千丈太湖隔絶欲登難風烟每向詩中得秀色今從畫裏看石洞幽𤣥林屋杳巖嵐層疊莫釐寒杖藜何日捫蘿上萬頃平臨縱大觀小齊蘭花忽開並蒂幼于有詩漫爾次韻書去索笑非以角勝也久知無喜到貧齊底事幽蘭並蒂開豈有芳馨結良友端憐契分及凡材差差碧葉同心出冉冉清香兩鳳來回首湘江隔烟霧楚歌何事尚餘哀望廬山長夏艤舟謝子港正見廬山水面橫隱隱香罏浮紫翠茫茫彭蠡蕩虛明雲烟誰辨東西寺道路空懸去住情三日船頭看不厭兹遊真足冠平生鄱陽湖彭蠡茫茫欲渡愁趙家圍畔繫孤舟深林禽鳥春偏樂古岸黿鼉晚自遊形勝巳看吳楚接江湖空抱廟廊憂莫從道路嗟萍梗且進風前白玉甌峴山懷友暮春三月鳥關關乘興來登湖上山碧浪差差浮翠靄道場隱隱結蒼鬟巳無蓮宇荒筠外猶有窪樽蔓草間莫訝臨風倍惆悵故人何在獨躋攀月夜同友人登盤門城盤關自昔雄吳郡與客攜壺次第行孤塔岧嶤撑碧漢萬山回合繞秋城河流急映星初見雲樹依微月倍明取醉但酬今夕興升沉莫問古今情與子元長卿月下訪道園上人坐月白齊乘興叩禪關蕭然水竹閒路危應九折屋住只三間齊白月懸鏡花明菊破顔茶香解留客深夜不知還郭侍御子靜謫永安直疏干明主孤臣謫異方寸心元自赤逺道敢辭長雲皎武夷月風清閩嶠霜丈夫開萬里好去闢豺狼闕水逢故人萍逢得故友水宿感烟波笛起關山弄杯停子夜歌竹深防卧虎江近有鳴鼉興劇渾無寐翻嫌月色多題石田品泉圗唐子西云水無惡美以活為上故中冷第一惠泉次之茶鄉乃欲抑江扶惠宜其不能服石田諸公也幼于以此卷索題因次韻以復江水山泉偶並嘗新茶初試得清忙已欣陸子能題品更喜吳君為較量揚子江心真活潑惠山巖下有清香不須調水將符遞千古清風自不忘送蔣僉憲之楚中昔年離别豫章城今日吳門又送行顧我衰頽成潦倒憐君隨處有逢迎碧虛舊夢金陵月紫綬初垂楚甸纓蘭棹徘徊莫遄發故園楊柳正關情送顧從化赴荆溪書館次孔加韻早春江上看雲生顧况仙舟此日行聞道傳經諸子秀遙知孤坐一燈明山晴預蠟登烟屐茶熟先尋煮玉鐺世事近來君莫問一編西去好爭名贈幼于廬墓埋玉空山裏終天恨可知結廬墟墓側草木動深悲白日哀號地黃昏風雨時劬勞興念處忍誦蓼莪詩首夏寒玉亭有懷伯起春去緑隂成猶聞春鳥鳴雨滋庭草色風度壁琴聲靜裏流光轉愁中白髮生偶來成獨坐念爾若為情寺夜子庸有懷戲與聨句月明古寺巳黃昏孤笛聲傳自逺村休承憶得玉人籠翠袖秋城西畔倚閒門子庸奉次伯起有懷之作春山隱隱淡修睂綽約丰姿氷雪肌聲度曲中楊柳恨行移月下牡丹枝絶憐公子頻中酒况復蕭娘最愛詩别後驚魂殊不定可堪連夕雨絲絲至日子庸振伯小集木落曉霜涵鄉園日又南親朋欣偶集雲物麗相參飯煮西湖米香分閩嶠柑不須辭酩酊海國戰猶酣和唐子畏韻我昔曽過桃花菴菴中常遇桃花仙吟詩寫畫茅茨下留客時時費酒錢詩成每向壁間寫酒醉常來榻上眠春風回首今幾嵗屈指經過五十年人生萬事何足問但願有酒常花前世人妄想慕富貴不知富貴多前緣窮通得喪固有命貧富夀夭皆由天誰云富貴勞且忙貧賤驅馳亦不閒髙車駟馬衣服鮮奔走紅塵襪履穿若要心閒衣食足惟有歸耕百畝田初歸志喜歸來三徑未全荒拂拭重開舊草堂棐几淨揩明似鏡研池新浴燦生光客來親戚情多悅老去詩篇意未忘莫道歸遲遲亦好猶勝終老滯他鄉鄒進士吉甫謫廣西吉州喜見志完生危行危言世共驚千古髙名垂宇宙一時正論重簮纓投荒萬里誰還惜去國孤身念巳輕我忝相知自疇昔新詩欲賦愧難成雜題空江木落思悠悠閒傍蒹葭弄小舟一段清光君獨占底須回首羡輕鷗跨馬出郊春尚寒飛流千尺下清湍赤欄橋在垂楊外付與幽人盡日看品泉嗜水陸鴻漸墨妙筆精王右軍烹茶寫帖關幽興日暮看雲懷二君巖壑層層生紫烟飛泉曲曲下晴川孤琴獨抱何須鼓流水髙山在目前杜䳌花盛開友人攜酒賞之賦此歸來堂上爛霞明十尺杜䳌開午晴蜂蝶尋芳入朱户美人侵曉摘繁英使君已訝甌東種逸士空談閩嶠名喜見南鄰攜榼至圍花傾酒倍多情渡太湖九秋霜淨冷菰蒲落日扁舟渡太湖震澤波濤看底定三江風浪接虛無亂山㸃㸃浮蒼玉逺雁雙雙下緑蕪蝦菜幾時歸范蠡眼中披豁見雄圗虎丘待月為愛西丘郭外蒼春來三度到山堂看碑每憶顔刑部對酒難忘白侍郎石裂道傍誰試劍舟回溪上客鳴榔徘徊不是遲歸去要待中庭月一方七夕七夕年年乞巧同紛紛祈請走兒童中宵白氣誰能辨萬古牽牛肯向東樹外綵樓雲縹眇庭前瓜果月朦朧老儒不用蛛絲喜抱拙攜尊醉晚風羽客載茗路出華陽逺冠猶碧玉低輕舠載茶具送我過荆溪山齊二首山齊雨坐漫焚香几淨窗明竹樹涼午睡起來無一事自翻殘墨寫瀟湘掃地焚香閉閣眠簟紋如水漲浮烟客來夢覺知何處掛起西窗浪接天題陳道復畫襄陽墨瀋未曽乾十里瀟湘五尺寬樵斧不禁苔徑滑漁蓑常傍水雲寒澄澄僧眼連天碧淡淡蛾睂隔霧蟠恐為醉翁當日寫平山堂上雨中觀嚴子陵釣臺崔嵬絶壁映江開落日停舟上釣臺清節巳看垂萬古客星何意動三台林間冉冉青松滿烟際飛飛白鳥來莫向風前倍增感古今名跡幾蒼苔靈谷寺帝京雨過氛埃淨下馬來參第一禪松徑入門猶十里袈裟布地已千年諸公寶塔金身在吳偉長廊粉墨全雲氣常凝陵寢近閒看白鹿下蒼烟贈陶見塘邑宰望裏塘非逺悠然紫翠橫水禽飛不定春草夢中生苕霅溪流潤江臯峽浪平近聞消息好花滿錦官城贈承天理上人方池髙僧住畔有方池片片慈雲映碧漪長日誦經臨水坐鳥啼花落不曽知題桂花圗期基聖大姪吾家二祖舊為郎相繼登朝立廟堂老我巳無繩武志阿咸好去續天香彭思菴絶粒百餘日矣兹將登嶽陽樓過吳言别題此為贈羡君絶粒事清修袖拂紅塵隘九州東泛巳輕揚子渡南行期上嶽陽樓逍遙欲棄人間世浪跡真成汗漫遊我亦采真元有意相攜何日到瀛洲贈徐中洲徐市求神仙入海竟不返蓬瀛渺雲濤相望嵗華晚中洲海上來眉宇青天開手持白羽扇笑上黃金臺羊裘客燕冀出入侯王里長揖公卿間飄䬙紫雲起北渡黃河津洛陽多故人終然無所遇歸卧西湖濱西湖茅屋冷自汲丹砂井明月下青松照見蕭蕭影振策吳市遊相逢正清秋無人識梅福長嘯空悠悠何須魯連子世事皆如此生計五湖煙功名一杯水拂袖赤城虹相思何處逢儻騎雙白鹿招我五陵東尹陽草堂卜築尹陽下躬耕非所嗟風烟元水竹雞犬自桑麻波引太湖近橋橫寶帶斜扁舟吾數到不及爾為家後溪卜築清溪後依然水竹間臨流看泛泛隔屋聽潺潺村市小橋接危樓暮嶺環紅塵元不到不用掩柴關採蓮詞搖棹若邪津紅妝映水新歌聲何處起愁殺採香人共入荷花去隔花聞笑語擊槳濺紅裳同來采蓮女秋水灘灘碧荷花渚渚香蕩舟莫擊楫沙上有鴛鴦雙雙采蓮女各各有春心誰歌竹枝調春心應更深朝朝采蓮去暮暮采蓮歸朝暮空相守思郎心欲飛采蓮復采蓮花盡恐傷藕撥棹出花去女伴爭前後舟中采蓮女岸上遊冶子兩意暫相窺無由得雙美妾欲向花語花應對妾羞溪花與溪女相妬幾時休兩亭兩亭渺何許乃在西湖濱昔人雖巳逺亭名今尚新望湖莽烟水白鶴開嶙峋君能仰遺躅弔古披荆榛慷慨懷往士髙風薄秋旻躬為兩亭主揖讓烟霞身誰敢攀逸駕聊用追芳塵聞雷記事甲辰臘月月幾望雨卧滄江聞夜雷豈是潛陽從地復却疑行令自天乖烽烟西北憂方始飢饉東南力已摧白髮野人愁不寐起傾餘瀝盡深杯送吳海峯吏部服闋北上吳苑春風動征帆畫鷁催移忠孤念切許國壯懷