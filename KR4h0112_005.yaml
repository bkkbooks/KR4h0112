body:
  text: 文氏五家集卷五明文徴明撰太史詩集五言律詩春日閒詠時節燒燈近羇窮獨卧家餘寒春挾纊殘困晚煎茶土潤先滋草梅晴薄試花新年眠食好隨分足生涯故園屋舍小山村終然思故園雨晴秋倚閣月出夜開門好景亦無改逺人空目存梅花未消息行矣晚何言東葛城夜發蕭蕭東葛路馬上聽嚴更月出高山黑天空逺水明年光秋漸索客子夜猶行村落知何處時聞犬吠聲北郭夜歸北郭鍾初絶還家人倚舟縱橫燈映市突兀霧沈樓月落羣星出天垂一水浮不知寒色重霜在木棉裘十月十月蹉跎盡嚴風忽滿城積寒裘失重綿雨榻生情人事莽無際歲功垂又成凋零餘短菊殢眼得時明暮春齊居即事三首經旬寡人事蹤跡小窗前暝色連殘雨春寒宿野烟茗杯眠起味書卷靜中緣零落梅枝瘦風吹更可憐其二閒庭青草積春半思蒼茫小雨作寒食微風泛海棠芳情經病減白日廢書長何物供欹枕縈簾一炷香其三翠箔晝重重寒深雨更濃碧鮮浮草色淺淡斂雲容未遣愁欺病還資靜養慵蹉跎裘褐在強半負春穠江船對月效樂天何處難忘酒何處難忘酒江船對月時風聲傳語笑波影散須眉逺火山浮動明河天倒垂此時無一􅊦水月負佳期逰治平寺落日淹遊艇循山小徑迂避喧欣得寺擇勝旋開厨偃樹斜侵磴橫岡逺帶湖過春才十日碧䕃已扶疏次韻陳以可觀蒔秧妻孥空舍出秧稻及時明匝岸清歌動分畦翠浪生田家自村樂歲事卜蛙聲慚愧城中客長腰飯玉粳次韻喜雨睡起風吹靣高樓急雨來新涼花竹喜殘病鬱蒸開隔水荒烟合長空獨鳥回佳人應按曲白苧是初裁獨坐獨坐茅簷靜澄懷道味長年光付書卷幽事續罏香日出鳥烏樂雨收花竹涼蕭閒習成懶不是寡迎將夜坐溽暑夜不寐涼風初解圍起看星漢動坐久語音稀殘月耿猶在流螢忽自飛一聲何處鶴露下欲沾衣不寐展枕不得寐沈沈玉漏淹一燈寒照壁半夜雨鳴簷有味留貧在多愁與病兼鬢邊新白髮應為小詩添新寒木落見清真端居物自春窗虛蠅擊紙院靜鳥窺人白日經簷短青衫卒歲貧新寒滿城郭欲出畏風塵新年擾擾復闐闐雞聲妨晏眠江城收宿雨衰髮受新年寒盡梅花後春生草閣前郊原芳事近早問石湖船對雨獨吟池上雨拍拍水平堤暝色千峯合涼聲萬葉齊翠承深竹重寒壓晚簷低怪得經過斷街頭一尺泥題秋江圖湖平失洲渚日落見帆檣雁影天隨逺漁歌水自長孤雲開浩蕩高興落滄浪欲采芙蓉去烟波正渺茫次韻孫太初秋夜泛月之作烟斂依依樹鷗飛漠漠田短簫吹夜月高興落江天逺火搖輕浪跳魚驚過船良辰不易得吾敢卜明年秋晚白日銷殘篆西風薄繐幃文園無奈病衣帶不勝圍墮葉兼零雨斜光暗夕扉天涯鴻雁疾誰念稻粱微九日不出早衰憐暮景時序每侵尋秋色籬花瘦柴門落葉深索居成病懶勝日負登臨樽酒正愁絶南樓急暮砧重葺先廬履仁有詩奉答一首基構百年謀依然四壁秋庭隂分柳色簷影帶雲流客到從題鳯余生本類鳩稍令供燕祭此外復何求再答一首未遂入山居聊營背郭廬編茅䕃衡宇垂柳帶清渠陋襲先人志慙淹長者車北窗有涼吹卧展架頭書立春日遲陳淳不至東風吹綵燕曉色動簾旌遲子不時至南樓春自生裁詩供帖子閣酒聽啼鶯白日流雲暖梅花初雪晴西虹橋晚眺同九逵賦從來佳麗地閶闔更雄華大舶浮江下飛樓帶郭斜春旗搖落日暮堞倚晴霞天外疏烟合蘭橋入望賖夏日簡履約王子清虛甚蕭閒味道腴焚香供燕寢閉閣讀殘書適俗無塵韻還山有竹居遙應苦喧雜伏日興何如王婆墩次楊儀部韻遙看塢一聚到只屋三間嫗姓隨墩在僧廊得蘚殷秋濃山照閣雨足水侵關依舊刺船去回瞻樹杪欄過孫文貴不在對庭中新竹一室才容膝居然不受埃恍如城郭外時有野人來簷緑搖新竹階紋蝕古苔未妨酬對寡撫景自徘徊東禪寺古寺謝車馬清臨緑玉灣雙禽啼竹徑獨犬護松關落葉秋滿地夕陽僧自聞偶來還自去回首碧天間石湖作落日淡烟消平湖碧玉搖秋生茶磨嶼人在越城橋樹色晴洲斷鐘聲古寺遙西風吹短鬢還上木蘭橈寒夜茆屋寒初重無眠對燭光疏砧何處月殘葉滿庭霜攬物驚時改供愁有夜長空餘強學志撫卷視茫茫張明逺索畫久而未成歲暮隂寒雪霰將集齊居無聊為寫溪山欲雪圖并賦短句歲暮天欲雪郊原風色饒山寒增突兀樹暝入蕭條野水照茅屋歸人爭斷橋窗前有新句欲覔已寥寥承天寺中隱堂古徑無車馬閒門帶蔦蘿秋風吹宿雨日暮眄庭柯世味逢僧盡新涼入寺多居山未有計此地數來過雨中雜述四首春歸楊柳暗四月雨垂垂紅洗花無迹青沾草有私倚樓迷曉望出郭滯幽期客去茶甌歇閒愁總上眉其二凝情不自得看雨獨登樓緑樹千門晚涼雲五月秋暗梁栖濕燕高壁上枯牛有待新波長南湖弄小舟其三雨從四月晦數日尚愆晴潤與黃梅併寒侵白苧生斷烟迷竹色懸溜雜雞鳴莫自嫌行潦東郊久待耕其四十月江城雨霖淫勢已滔簷端宿雲霧屋腳卷波濤已掃蘇端迹仍深仲蔚蒿無錢供晚醉行擬質春袍歲暮齊居陋巷還車馬高齊漫簡編塵埃銷短日雨雪入殘年攬照空雙鬢探囊有一錢西風灑修竹吾意已蕭然南樓二首南樓冰雪盡江郭歲年窮暮嶺延西日枯條振北風孤雲天一握萬事鬢雙蓬徙倚青烟滅蕭條在眼中其二西山開晚霽返照落窗中歲事收殘雪生涯入斷鴻寒多裘失重愁劇酒無功零落雙桐樹蕭蕭不受風登上方春風吹白髮醉上碧岧嶤帆落天邊雨人行樹裏橋舞臺青草合霸氣白烟消吳越橫分地登臨不自聊陳以可近歲築室陳湖專理農業時以詩見寄誇其所得比來秋成當益樂輒賦秋晚田家樂事十首寄之築室姚江上陳湖東復東舊諳風俗厚近喜歲年豐晚醉茅柴酒朝羮踏地菘村居今已習那復念城中其二甲第城中好何如小隱家翦茅苫屋角引蔓束籬笆社動喧村鼓場乾響稻枷誰言田舍苦隨分有年華其三艇子新浮水移來傍釣磯新晴觀穫去薄暮泛湖歸斜日牛眠隴秋風犬護扉行邊衝鴨陳時掠野田飛其四秋雨初晴後秋風滿稻畦笑歌村逺近烟火舍東西紫擘輸芒蟹黃烹啄黍雞相過有田父日日醉如泥其五秋事相將盡農勤亦告終風高陂水涸霜落稻畦空說尹遭田父穰年賽社公不妨多釀秫今歲頗豐融其六散步蒲為屩端居衲御風觀儺逐鄰里築圃課兒童誰識佳公子真成田舍翁只應吟興在時復走詩筒其七早畢婚嫁纍便為田舍謀水租魚十頃園戶竹千頭省事官無擾勤身歲有秋有時攜短䇿尋壑更經丘其八日落山圍屋霜清水映門魚蝦時作市雞犬自成村新味香粳飯常情老瓦盆渾家得醉飽時事更休論其九廩充官稅足歲晏樂何如自和田園詠閒修種樹書清溪照茆屋寒雨暗村墟時有東鄰叟攜壺慰索居其十湖田半栽秫秋至釀先成早辦兼旬醉聊償一歲耕淵明無俗韻子幼善秦聲莫怪疏狂甚相歡答太平虎丘千頃雲閣閣外雲千頃風前首重搔倚闌雙鳥下落日亂山高積水連橫浦疏松帶逺臯冷然發清嘯吾意欲凌囂賦瓶梅斷枝黏碧蘚殘蕊疊冰紈未乏溪山韻尤宜几格看移燈傳壁影垂箔護春寒應斷西湖夢東風在席端賦盆蘭清真寒谷秀幽獨野人心結意清霞佩傳情緑綺琴德馨堪自近道味許誰深一笑歌璚樹春風雪滿襟關川八詠關川幽居有美神明後關川古世家人情隨里善第宅帶山斜高木雨添䕃清流月映沙莫憐城市好車馬正紛華唐關清隱空巖帶流水回合自成關有客居盤谷何時賦小山編籬護修竹引釣俯蒼灣見說遺塵纍春來事事閒墓山牧笛何處聞悲調隴頭孤笛鳴月明人跨犢風細谷傳聲鬱鬱佳城思漫漫長夜情孤兒正愁絶原樹答淒清梘山漁歌短棹白蘋渚清歌黃帽郎隔雲傳欵乃背雨入滄浪日落暮山碧天空烟水長西風吹不散秋色滿江鄉隔峰嵐氣隔峰當户牖嵐氣掃晴空短笏迎蕭爽疏簾捲鬱葱晚烟明滅外秋色有無中莫道渾如畫還應畫未工屏阜書聲吾伊聲不惡宛轉出崇岡茆屋四簷靜短檠中夜涼能來問字客雅稱育賢鄉清韻松篁外悠然道味長雙溪明月見說雙溪好秋來更渺然漫流寒漾月夜色逺浮天斗酒黃泥坂宫袍采石船謫仙今寂寞勝事屬誰傳萬貫晴川江上春潮落晴洲帶渺茫中流分樹色斜日送蘋香斷雁迷千里荒雞自一鄉晚雲歸别浦依約見帆檣追和錢舜舉山居韻翠深山帶屋緑淨水通門泉石情還重丘園道自尊種莎添野色留竹護籬根樂事惟心會休逢俗子論雨宿武城追和先溫州夜宿武城二首長河風雨送盡日傍滄洲白浪灘都沒青楓葉亂流百憂雙短鬢千里一孤舟日暮墟烟合荒寒滿舵樓其二經過言偃邑非復昔時城里俗無從問絃歌空有名江湖孤燕斷風雨亂雞鳴酒醒青燈暗春寒一夜生紫氣紫氣龍顔穆彤墀虎衛森萬年占帝運一念格天心日月何虧食華夷仰照臨誰應知有喜白首忝詞林頒厯鳯厯從天下千官列陛前青陽壺史奏黃帕侍中傳周禮存頒朔堯書重紀年白頭供奉裏慚愧得春先旅懷隂凝冰未泮雪盡歲還窮世事浮榮外生涯久病中心旌搖落日天影度冥鴻短髮垂垂白那堪犯朔風野行因過廢寺久客念搖落行行還寂寥餘寒棲短褐斜日帶荒寮歲事行將盡羇魂黯欲銷雲房才咫尺便覺逺塵囂才伯過訪落日生愁地窮隂欲雪天歸心聞斷雁衰鬢逼殘年光景陳編裏情懷薄酒邊平生黃叔度相見即欣然對酒晚得酒中趣三杯時暢然難忘是花下何物勝樽前世事有千變人生無百年還應騎馬客輸我北窗眠觀書老眼視茫然時時手一編未能忘習氣聊復遣餘年欹枕山窗下篝燈細雨邊誰應知此味自結靜中緣煮茶絹封陽羡月瓦缶惠山泉至味心難忘間情手自煎地罏殘雪後禪榻晚風前為問貧陶穀何如病玉川晏起林下將迎寡頽然萬事捐老知間有益病與懶相便殘夢荒雞外輕寒繐帳前從教貧到骨不負日高眠梁溪道中夜行雨餘新水漫風外一帆輕山繞湖南去人從畫裏行天空雲樹渺月出暮潮平煙靄知何處漁歌時一聲石湖春逰湖光披素練野色漲青烟一雨樹如沐千林花欲然疏鐘白蓮社新水木蘭船行樂須春早山頭有杜鵑四月二首風雨將春去清和四月天桐隂搖白日草色散青烟興寄琴樽外筋骸杖履前若為消永晝窗下有殘編其二春雨緑隂肥雨晴春亦歸花殘鶯獨囀草長燕交飛香篋青繒扇筠窗白葛衣拋書尋午枕新暖夢依微五月徑草侵衫色庭梧生晝隂時光臨角黍穡事望梅霖習靜罏熏細醒煩茗碗深草堂賓客散欹枕聽幽禽夜坐涼聲傳漏㸃夜色轉樓隂遙漢三星度空庭萬籟沉草輝螢箇箇樹影月林林稍覺塵氛逺閒愁不上心夏日境寂晝偏永心清暑氣微老兼疏筆研性復懶裳衣隱几雙桐轉褰簾獨鳥飛茗薰聊自適不怪客來稀待月夜色動虛楹南樓遲月生碧烟消欲盡銀漢寂無聲㶑灔金波湧參差玉樹明隔溪人未卧把酒坐吹笙和陳魯南二色菊秋色一籬雨寒英百翦霜宫粧嬌映額后服淡生香燦爛裊蹄重䙰褷鵠羽長西風不相負歲歲有重陽右黃菊閒淡歲寒姿金行自及時月明霜翦翦秋淨玉差差短翅蝶迷粉修翎鶴有儀瑤華誰與賦寂寞自東籬右白菊射瀆早行二首夜色載扁舟滄江帶月流櫓聲撩吠犬燈影觸眠鷗星漢疑搖動煙林逺欲浮不知霜併下寒重木棉裘其二長林風䇿䇿孤棹夜暝暝天濶水烟白月寒漁火青素衣沾墜露短髮戴疏星彼美誰家子吹簫下逺汀石湖泛月愛此陂塘靜扁舟夜不歸水兼天一色秋與月爭輝浦近青山隱沙明白鷺飛坐來風滿鬢不覺露沾衣迎春日風雨齊居漫述二首迎春春欲至風雨暮交加未說迷牛馬真成濕歲華林無霜後葉梅有臘前花客散虛齊寂風簷自煮茶其二風雨餞殘臘梅花迎早春病淹愁緒在鬢與物華新短褐栖餘冷重簾細暗塵不嫌門寂寞時有問竒人文氏五家集卷五
