body:
  text: 文氏五家集巻八明文彭撰博士詩集下廷試述懐少小習章句朝夕親筆研詞塲十度游終迷五色線行行預計偕迢迢入畿甸皇畿本佳麗瑞靄鬱蔥蒨五城十二樓紫陌韶華徧披褐朝至尊複道隨羣彦步趨白玉堦日射黄金殿螭頭繞爐煙雉尾開宫扇操筆陳蕪詞來上宸旒獻雖非仲舒䇿不待常何薦但願納芻蕘自忘草茆賤徐李二相公枉駕見過失迓以詩謝之曲巷幽居蹔借棲漫勞方駕駐柴扉驚留折簡題凡鳥敢謂虚名動少㣲忘勢一心期牧仲好賢同志詠緇衣歸來獨倚衡門望彷彿猶疑見羽旂嚴相公招飲西城寓直直廬清切傍西垣退食委蛇赤舄安迂性自慚疎禮法中㕑先巳出盤飡虛勞吐哺延東閣實媿侏儒飽大官既醉歸來心獨醒猶思彈鋏學馮驩邢太史夜坐以雜花挿瓶作供雜花初上映燈光露濕羅襟夜氣涼笑殺風流貧學士瓶花亂揷當紅籹銀箭頻將玉漏催花枝月色共徘徊蕋宫仙子初回駕無數清香入酒杯邢太史田錦衣集神樂觀琳官秋浄擁樓臺仙侣同游院院開白晝漫憑棋局遣清風時送酒杯来髙槐承日敷清䕃老柏飡霜蝕紫苔回首又隨車馬足始知靈境少塵埃送朱子价辭家是三月楊柳正依依忽爾嵗云暮燕山朔雪飛巳驚物候改况復故人歸獨坐不成寐時時歌式微再承李閣老見過相國髙名山斗如若為優禮及庸疎衡門更辱髙軒過陋巷頻看長者車櫪下長鳴悲志業河東有賦待吹噓江湖潦倒空雙鬢一任風雲自巻舒送周子籲入蜀偶干㣲禄到長安忽漫相逢蹔解鞍萬里驅馳吾道在三年離别酒杯乾趨朝始脫滇南路逺宦寜辭蜀道難使節重迎餘澤潤錦江春色㡬廻看登報國寺佛閣送客出都門闐闐車馬喧言尋静者室因得給孤園蹔與塵囂逺閒將貝葉翻偶従髙閣望寒色滿平原次韻馬内翰燕山朔雪未全消銀燭淋漓吐絳綃壯志未酬顔駟老華筵喜預孟公招厭厭不醉歸何夜小小歌聲聽轉嬌一刻鄉心雙鬢改㡬回搔首望層霄至日雪晴謁徐相公䝉以内賜珍珠紅酒留酌賦此謝之金鑾退食綺筵張積雪真成白玉堂陽至雲霞占有象清時鐘鼓樂無疆珍珠酒賜天恩重綵縷絲添日影長吐握未能歌盛徳草茆何幸被餘光除夕答顧汝所今夕是除夕他鄉憶故鄉懷親千里近清話一杯長老去心猶壯更深燭有光平生多感慨相對自難忘元旦朝賀淑氣廻春滿帝城元辰獻嵗泰階平蓬莱宫闕千門曉閶闔雲霞五色成大地河山開景運中天日月麗文明一人獨坐逢佳節擊壤康衢繼頌聲人日雪晴答徐相公人日雪初晴朝暾映雪明已占吾道泰更喜物華清霽景融金殿陽和布王京共知調燮在四海荷昇平雪晴同吕舎人顧汝所南郊閒步京華春色好最好雪晴時樹凍初含潤溝氷欲動澌風生塵冉冉日下景遲遲攜手南郊去仙家有酒巵清明大雪清明何事雪漫漫始識燕山春更寒遂使鶬鶊鳴較晚只疑鳷鵲尚留殘風回柳絮綏綏下簾綴珠璣細細看學得風流陶學士呼童旋掃試龍團是日約往南郊不果南國清明花事稀燕山雨雪尚霏霏長安九陌春何處旅食經年客未歸兩地風光闗念切平生事業寸心違也知空負城南約不是袁安不啟扉次彭孔加見懐韻逺書初至日正是憶君時况復經年别何堪兩地思石湖乘雪興南郭看花期頻有還家夢知君知不知次張伯起見懐韻别君銷盡黯然魂老我終慚櫪下轅三禮未陳猶有恨一杯獨酌更何言春風巳動江南柳歸棹行辭薊北門莫向京華問消息到家應共洗清樽次張幼于見懐韻黄金臺下草霏霏日日臺前送落暉覽勝有時趨禁苑夢歸長夜到親闈故鄉風景心常在帝里春光雪又飛看鏡倚樓天萬里浩歌時一詠緇衣上巳不出祓禊當年在石湖緑油畫舫映青蒲逸情逺興形骸外水曲山隈少長俱竹裏桃花山鳥喚水邊楊柳麗人扶皇州春色来何晚獨坐空齋一事無出京承徐相公贈詩次韻酬謝五雲樓閣九重城瞻望何殊萬里程調化共知歌盛徳好賢端不為修名平生雅度真難値此日新詩更有情潦倒窮途甘棄擲獨慚虚譽動公卿夢還家示肇兒離京纔二日已有夢還家親戚多情話風塵感嵗華共憐鬚鬢改不覺道途賒月落雞聲早依然天一涯鷗一官辭帝輦南去客途分孤棹迎新漲歸程檢舊文細流縈落日疎柳拂髙雲白鳥沙邊立飄飄自不羣蟬髙柳咽新蟬初聞思惘然可堪新别處况復早秋天響逐輕風度心隨餘韻懸故鄉行未至愁劇不成眠旅泊旅泊頻驚夢孤村獨繫舟雨餘新漲滿日落晚風柔為客經年久歸程計日酬一杯聊自遣沙上有眠鷗夜讌朱子价園池清讌開池上輕風吹樹枝已憐秋氣好正是月明時玉露沾衣重金尊送酒遲平生好客興為我更忘疲中秋遇雨宿江中本擬中秋夜家庭待月圎蹉跎霪雨裏猶自滯江邊海氣隨潮上江聲入枕懸夢回天未曙起坐不成眠哭李冢宰丹旐飛飛江水濱失聲知已喪元臣誰將消骨陳張禄終履危機禍長民才擬干將偏易折魂銷犴狴竟難伸山丘華屋尋常理獨有羊曇淚滿巾官舍敝漏朝来雪霰盈案賦此遣興官衙清冷思寥寥屋破風髙雪不消三瓦未陳珠的厯四圍多隙紙飄揺寒燈無著愁書濕布被多情怯夜迢安得杜陵文藻筆秋風茆屋賦長謡人日立春佳辰愛人日况復立春時節喜三陽至羮傳七菜宜未歌髙適句且賦道衡詩莫謂家鄉近終成兩地思過精嚴僧舍人日過禪寺言修浄業縁鳥鳴簷樹近雲䕶佛燈圎佳節尋僧遣新詩洗研傳蹔来還蹔去不必悟真詮借得張子昆崙詩抄不見昆崙三十年偶従僧寺拾遺編歸來細向窓前讀宿草芊芊淚黯然曹娥祠江上濤聲接大荒祠前雙檜鬱蒼蒼孤墳何必山川麗一死能將姓字揚妙迹已無王逸少題辭空問蔡中郎真魂不逐寒煙散月落潮廻思𣺌茫雨中同李舍人宿靈隠寺西湖春水拍天浮日日春隂繫我愁沾濕莫辭花下過空濛自得雨中遊有無轉憶王維句潦倒先􅂸金谷籌夜静不知雲卧冷朝來白雪滿山頭宿雲堂山樓舊日西湖路梅花㡬度開蹔抛塵外事乘興雨中來山逕團青嶂禪房鎖綠苔一宵清浄業浩刼自輪廻至山隂山隂城中花欲舒山隂城南錦不如秦碑禹穴猶在望蘭亭剡曲成丘墟春光雖巳足游賞勝地無柰空躊躇等閒世事竟陳迹千載悠悠北伐書登蕺山夙慕山隂勝千峯羅翠屛探竒窺禹穴讀記想蘭亭俯仰悲今昔煙霞本性靈空餘蕺山廟誰寫換鵞經龍泉山曉色姚江上青山逐霧開輕風吹竹樹初日照樓臺春到花争發潮平水自廻莫言行役苦勝境且徘徊鏡湖鏡湖湖水如鏡平峯巒罨畫揺空明浮雲靉靆自来往輕舟迅邁勞相迎白鷗雙雙暎山逺青蒲曲曲隨舟生風流賀老已千載轉憶悠悠身後名暮春嘉禾項子長園亭讌集九十韶華今日晴名園喜見緑隂成雲光暎水黄鶯囀草色侵衣白鷺驚刻竹又重題姓字舉杯還與說平生山窮路轉孤花􅆺猶見餘春一種情庭中一竹生意蕭然春來忽生數筍喜而賦之亭亭一竹挺髙寒正對先生苜蓿盤造化不私深雨露春風還自長琅玕五月新晴簡裔同僚五月官衙樂事多緑隂清晝午風和茶烹雪乳新羅􅔩硯洗青花舊斧柯翠竹露梢舒嫰葉文魚依藻泳清波一枰棊了人初散小小宣罏爇水磨糴米喜得儒官少簿書清閒真足􅇺慵疎年衰久已知安分命薄常令意不如有禄代耕還糴米無園種菜敢思魚閉門日暮㕑煙起黙坐空思嘆索居午門朝見時大内新成九重宫闕倚天翔不日功成拱萬方三殿昭回還舊觀五雲縹緲麗晴光分明周室營豐洛不數闗中治未央自媿微臣何幸㑹也隨鵷鷺侍班行長安逢郭山人漫聞東岱覔竒踪忽向長安道上逢大笑仰天無一語只言日觀最髙峰羨爾身如不繫舟飄然五嶽恣竒遊長安市上一杯酒此日相逢空白頭題溪南别業西溪溪水深不流溪南更築林堂幽㑹心自有濠濮想乘興不數山隂舟一簾暮雨足吟眺萬疊春山供卧游主人方有蒼生寄惟餘清夢狎輕鷗黎内翰惟敬梁中翰思伯攜酒見過未遂幽栖願聊為帝里游微官常自足髙士每相求抗志雙蓬鬢端居一敝裘無文驚海内徒自仰前修喜徐太守子與至席上得陽字五馬朱輪入帝鄉曽將九折嘆王陽久知恵政同吳漢更喜文章似子長世事何如杯酒在風塵不見嵗時忙倚闌獨立詩成處萬里青天鴈一行一麾閩海出明光曽是含香粉署郎行見望之還少府不妨汲黯卧淮陽天涯媿我空奔走嵗暮逢君倍感傷今日一杯須盡醉相逢莫笑屈為邦連日奔走塵冗懐抱欠佳偶過顧舍人汝由研山齋見其窓明几浄折松枝梅花作供鑿玉河氷烹茗啜之又新得鳬鼎竒古目所未見灸内府龍涎香恍然如在世外不復知有京華塵土賦此紀興偶入髙人室恍然塵夢醒香生金鴨火茶剖玉河氷簷際鳴幽鳥窓間出凍蠅春光遽如許萬慮一時増除夕與肇兒守嵗莫將除夕感浮生且喜明朝嵗又更日月將遷抛舊厯風塵時逐媿虛名膝前賦就椒花獻盞内香浮柏葉傾灸手朱門何處是一燈相對候雞鳴元旦早朝殷殷仙樂半空聞斗轉河斜曙色分輯瑞羣侯瞻肅穆履端萬象荷氤氲霏煙彷彿凝三殿霽景招揺麗五雲四十一年端拱化願歌周頌繼思文冒雪訪吳侍御時廵警方歸寓善果寺忽報故人至禪房蹔解鞍攬衣頻促駕衝雪不知寒直指霜威肅風塵行路難歸來報明主春色滿長安出徳勝門見杏花獨坐空齋感嵗華春風日日捲黄沙閉門無意窺楊柳出郭驚心見杏花西望居庸開錦障北來天夀隠晴霞驅馳莫問昌平道野寺含煙落日斜送韓子游嵩嶽名山誰最勝嵩嶽正中天石室有竒趣天池多列仙雲霞時萬變日月晚雙縣曽讀盧鴻志因君更惘然贈沈山人一見出世人澹然忘物累閒談山水勝真得煙霞趣蕭然隨去住所至興自寓嗟我濁世姿何由悟三昧寒夜梁思伯小酌新寒抱膝掩衡門上客開筵禮意敦最喜晤言消永夜獨憐白髮照清樽羣賢並集風流暎列坐歡歌笑語温醉後不嫌歸路晚天街塵静已黄昏上巳韋園送徐子與得松字韋園三日宴黯黯惜離踪攀柳心先折看花興亦慵臨流羨清水坐石䕃髙松不是無言贈無言意更濃㑹臺鄄城故墟齊魯㑹盟處有子建讀書臺齊魯多竒跡鄄城㑹有臺當年空戰伐此日已蒿莱子建不可作齊桓安在哉悠然㑹心處選勝草堂開玉河橋見白燕和顧舍人汝和玉河橋下水生苔玉河橋邊白燕來梨花柳絮亂飜舞浴鷗飛鷺空驚猜金殿雪殘麗鳷鵲瑶臺月冷歸蓬萊摠道緇塵暗京洛緇塵不染不凡材四月七日顧汝和明日四十誦杜詩馬上足成之四十明朝是清樽今日開煖風吹白晝庭草長蒼苔玉殿裁書竣金鑾捧詔廻年光容易過羨爾接三台和姚太史雪中竹飛雪洒蒼筠分明白鳳翎風廻飜舞袖映月淡疎欞掃去茶初熟看来酒易醒更憐人似玉清氣滿虛亭九月十七日與肇兒夜過吕公祠浦漵縈廻菰蒲掩映月色如晝真一片江南也適張氏兄弟攜琴阮至酒酣鳴琴撥阮命童子奏笙簫以和之恍然如在世外三酌而起朗詠成篇吕公祠下水盈盈秋月無如此夜明爽氣直従銀闕冷彩雲時向玉杯傾笙簫並奏餘音轉琴阮和鳴雅調成晤賞未能聊自適不妨明日事還生是夜令人速王明佐不至至橋上更酌時沈山人寓張園咫尺閉户却寄二君帝京車馬日駢闐此夜清游更可憐月色水光相盪射簫聲琴韻兩悠然王猷興盡乘舟返沈約愁多閉户眠勝景慚余能獨占為君還賦紫雲篇送張月鹿浙江憲幕獨抱竒文入帝京風流江左舊知名百年作賦追平子四海何人薦長卿但有聲華垂宇宙豈須爵位盛簪纓錢塘江上秋風早閒看寒潮日夜生送友人游五嶽五嶽名山天下竒擬従遐覽寄深思幼輿丘壑真成癖宗炳神游意已移對月時從僧寺飲看花何必主人期慚余未脫樊籠累羨爾飄飄任所之文逺閣小閣静沉沉虚明生道心端居同李泌清閟擬雲林問字頻攜酒談𤣥時鼓琴夢回應有得千載有知音雪晴望居庸山熹微霽色麗朝暾北望居庸雪正飜聳處只如瞻華嶽光迷猶似接崑崙晶瑩奚訝銀山近擁䕶方知玉闕尊三白年豐占可兆不妨髙卧掩衡門送秦叅議之任憶昔當年借榻時蕭條風雨繫深思吳門别後心常念帝里相逢喜可知王事有程多逺役旬宣無地不宜詩攜樽未得時相遇况又匆匆重别離寄嚴相公昔宰黄扉日常懐緑野游邇來泉石性翻繫廟廊憂樂事林園勝新詩花鳥愁懸車明晝錦漢廣莫能儔獨坐閒齋獨坐晝遲遲花落花開摠不知偶傍宫墻騎馬過鶯聲飛出最髙枝雨過空庭白晝明虚齋獨坐聽流鶯春風不道官衙冷依舊青青蔓草生春興帝里逢春春可憐五雲樓閣麗中天御溝花落流澌盡璚島雲飛海日懸風度漢宫銀刻箭香生南陌翠花鈿無由蹔醉金錢㑹零落東風又一年綺陌塵香輦路斜東風早晚遍天涯建章曉色千門柳上苑鶯聲萬樹花細草生煙消積雪新波浮玉麗晴沙五陵年少争馳逐獨是羇人轉憶家送華憲副南歸憲副公與其兄皆以少年知名余與嘉弟亦以是時獲交二公自正徳壬申五十年餘猶復奔走道路而憲副公既登進士歸老林間其仲子又舉進士余得以儒官為僚友適憲副公自錫山至而嘉弟亦以計偕至相與秉燭夜話感念疇昔雖升沉顯晦不同而白首愉愉邂逅于數千里外亦竒矣哉因賦小詩識别而嘉弟作圗於前以見一時㑹晤之勝憶昔追隨丱角童于今衰老盡成翁青燈小坐傾杯細白首相逢笑語同顧我弟兄猶骯髒羨君父子盡登崇一時邂逅真良㑹莫謂飄飄雪上鴻七月二十一日集南郊鄭尚書園亭得城字十畝芳園倚帝城初秋選勝集羣英柳條未墜霜前葉池水新添雨後萍濠濮㑹心真不逺風塵飛夢此時清振衣更有髙臺望無限江南萬里情廿三日同黎惟敬姚元白許殿卿沈懋學歐楨伯嘉弟集吳侍御明卿宅得竿字新秋風日麗長安偶集髙齋興末闌縦酒狂歌留勝賞投壺散帙罄交歡久知燕市多竒骨莫向磻溪問釣竿陳迹易遷時易改五湖煙水正漫漫緑水園詩為陳夀卿賦名園緑水自先賢繼繼繩繩世永延臺榭由來従簡樸篇章喜得尚流傳平泉有誓成陳迹獨樂無求得自全試問辟疆何處所寒煙衰草巳茫然嘉弟久不見至出門聞說是新春寄得書來又未真消息參差無可問夢魂顛倒有時親老年兄弟情偏重薄命功名晚未伸忽爾秋風將又至時時翹首潞河津林駙馬園亭賞紅蓮主家留客敞華筵一朶紅蓮倚檻鮮太液分来知不逺蕋宫開處自天然秋風入座生隂細曉日窺簾拂露圎醉後不聞香滿坐銀筝翠管沸遥天宿通州靖嘉寺古寺荒煙合巍然三殿存廻廊餘磴石曲逕滿苔痕嵗久罘罳暗庭閒鳥雀喧獨憐車馬客一宿戀空門平谷公署古槐僻縣人稀早閉闗庭槐合抱挺蒼顔秋深巳覺寒蟬盡日落徐㸔倦鳥還久厯嵗華宜老大不藏丘壑亦蕭閒有懐欲就東陽賦文藻誰如康子山平谷道中捧檄趨平谷西風送馬蹄秋深衰柳變日落晚山低荒草平原合黄雲入望迷邊城烽火息野老自提攜又雞聲催曉發露重木棉裘白塔逺先見青山濕未收小橋看過雨野渡有横舟處處頽垣在令人生隠憂遊興善寺峨睂山外即長城斥堠無驚秋氣清黄葉擁山飛殿角青煙出樹隠鐘聲偃松岌嶪雙蛟舞流水􅌑瓏萬玉鳴莫道遐荒多寂寞五雲咫尺是神京嵗暮承歐楨伯梁柱臣過有詩見贈因各次韻京華臘月動風沙獨掩衡門坐日斜驚見髙賢朝枉駕因知短炬夜先花旋沽燕市過墻酒閒數昭陽帶影鴉自是𤣥亭甘寂寞一輪春色在誰家羣英並轡訪清幽苜蓿堆盤一笑留南望宫墻飛殿宇北来黌舍似林丘劇談世事空無據閒看浮雲静不流陶謝詩篇公等在慚余潦倒獲同游至日不出有懐王申二太史虚齋獨坐静焚香綵線初添日影長世事驚心催物候家山入夢惜流光風廻晝漏傳蓬闕雲麗晴空繞建章遥憶故人天禄閣閒吟襪頌殿東廊簡黎惟敬直閣兼懐梁柱臣中翰抱病經旬獨卧家故人咫尺似天涯愁添鬢改霜生鏡嵗暮心驚雪作花白日看雲飛桂海青藜然火直金華清宵只隔宫城月悵望西南五色霞不出漫說為官好常憂室罄懸近承秦御史贈我寫碑錢飯飽衰年肉薪生冷竈煙従来慵應接且復枕書眠再過寳塔寺禁城西畔舊禪房松檜隂隂日轉廊隔院静聞棋子落垂簾深護菊花香秪縁帝里紅塵擾始覺空門白日長兩度經過留不得買山猶自媿支郎黑山遣祭帝遣微臣禮國殤荒原衰草黑山陽朝廷大事惟戎祀邊塞游魂懾虎狼當日捐軀真勇烈百年報徳有輝光慚余蹇拙才情減無復竒文弔戰塲初轉成均學録呈同寮諸公偶轉官階向辟雍横經分講日愉容彞章品節羣英聚禮樂陶鎔六館同久傍宫墻沾聖化喜看桃李盛春風董韓千載聲華重俯仰前修憶二公人日集顧氏桃花館同集者黎惟敬休承弟顧汝和諸昆季也喜逢人日轉青陽燕賞桃花舊草堂七菜漫隨時令設一杯聊與故人嘗東風早巳回明庶柳色行將繞建章但得弟兄常聚首不妨京國是他鄉送休承弟之任吉水東風吹水柳青青送爾遥従吉水行薄禄驅馳南北路老年離别弟兄情歸鴻巳逐春先去駑馬猶餘櫪下鳴别後相思何處是五雲應接鳳凰城頒厯龍樓候曉報雞人玉殿千官氣象新改嵗自慚虛過日授時喜得又逢春熹微曙色開黄道彷彿罏煙散紫宸頒朔従来傳盛事覃恩何幸及微臣送姚元白考績還金陵去年送爾出燕京隔嵗相逢更有情白鷺洲前秋欲老黄金臺下草還生往來不異隨陽鴈身世何如逐浪萍苦憶舊游行樂處因君時夢石頭城送吳侍御出守太平一麾出守向江南黯黯離情望去驂念我獨居空有淚知君顧影本無慚英風久已聞當宁奏疏従來滿石圅今日循良二千石臺端才力更誰堪至夜書懐静掩衡門晝不開陽生冬至又飛灰雪深太液氷初合柳傍宫墻煖未回弱線自添愁處影孤燈難盡醉中杯不禁千里還家夢長樂鐘聲故故催玉河春色春半京華盛綺羅氷消太液長新波燕巢香壘依金殿柳拂流澌出玉河細草生煙晴日麗煖雲吹雨落花多風光流轉須㬰事且向尊前一浩歌清明大雪因憶十年前亦是日下雪葢北方常事而南人則未之見也清明大雪亂紛披十載曽逢合更竒㸃綴杏花紅艶色宻封楊柳壓新枝寒侵繡幄氷重見月冷瑶臺露下遲說與南人應不信區區莫怪夏蟲疑袁魯仲改官南部詩以送之子向留京非避世余慚北闕尚貪名兩行新柳誰為折千里歸人已有程心逐去旌隨夢逺酒傾離恨共愁生還家正是春三月一路看花到石城贈范職方文正公孫也范相風流百代殊諸孫奕奕振三吳承家節操真無忝復始公侯定不虛自有聲名垂宇宙何妨憂樂異江湖只今義澤雖猶在願爾重増萬斛租寄顧克承何有齋陋室人皆棄惟君興不窮石蒲圎滴露水竹細含風建盞乳花白沙罏煎甲紅未能分半席時夢到城東次韻答寄黄淳父寄我瑶華如見面何時風月得平分案陳紫璞依金鼎障列青山鎖白雲永日和風閒鬬茗孤燈夜雨細論文窓明几净心如洗此樂應知獨有君讀白雪樓詩却寄李于鱗余與徐子與王元美見所謂五子詩者既而游京師見宗子相雖不久亦䝉知愛蘭汀已矣惟不得見于鱗偶讀白雪樓集悵然有懐賦此寄之何處仙人白雪樓山東李白最風流煙霞此日成髙舉丘壑于今屬卧游麗藻時傳驚海内聲華久矣遍遐陬江湖潦倒空相憶何日相逢解我愁薛子熙以修史至青州登東山入京將歸四明纔到青州又帝京東山竒觀鳳凰城山川壯麗開胸臆文采風流熟令名喜得持杯論故舊不妨倒屣下公卿羨君歸興應難阻又送知章返四明閒齋即事帝里豪家競賞春香車寳馬鬬鮮新幽居閒看雲來往草色鶯聲故惱人清隂寂寂草菲菲此日方知春已歸摠是無花有蜂蜨翾翾來往繞庭飛清虚山即兎園青霞片片玉玲瓏員嶠方壺指顧中喜見平林游白鹿静看激水噴蒼龍香生别殿𤣥都近雲護髙臺碧落通春盡飛花猶滿地分明身在蕋珠宫冦至朔兵十萬穴秦城擁騎長驅薄漢京備禦可能無上䇿去來何事少先聲中原將帥空推轂此日書生願請纓弓矢不勞干羽在廟堂應有荅蒼生徐子與席上分韻大火欲西流朝来已立秋老年何易改去客苦難留别酒翻添恨新詩不解愁音書如可達咫尺是皇州得秋字溽暑無由避芳筵此日開故人來舊雨天際殷輕雷傲世空雙鬢浮生且一杯浩歌聊自適隨處可徘徊得雷字槐隂團北牖六月自生寒老愛逢迎嬾狂貪禮數寛不因前日别那得此回歡俛仰成陳迹従知行路難得歡字驟雨袪煩暑新涼接素秋清尊閒北海佳客得南州知已真難遇𤣥言未易酬不須論去住且復此淹留得州字韋園秋集贈劉君帝京塵土滿征裘此日城南得勝游昨夜微霜初墜葉芳原爽氣肅清秋輕風吹酒開涼宇落葉催寒出御溝直儗韋園作韋曲况逢禹錫最風流黎惟敬小集得霜字衡陽轉參畢玉露將為霜涼風起天末肅肅吹衣裳欣此良宴㑹蹲舞羅酒漿感時懐隠憂仰睇雪飛揚又辭條葉初委柰何草木黄飄飄隨所之萬里天風翔翩翩送飛鴻唧唧啼寒螿𤣥言不可悉逺心希皇唐送友人送爾飄然返四明孤雲野鶴一身輕不須更乞千秋觀自和滄浪唱濯纓送沈君叅政河南當年夕拜瑣闈郎此日承恩出建章敷奏久知承宻勿撫旬今復見循良風塵去去辭燕薊旌節翩翩指洛陽行見望之還少府徴書早晚下明光恭遇聖駕幸太學聖主臨雍慶禮成千年文物覩昇平五雲馭日來三殿百辟承恩下九城象輦乍回清蹕逈鸞旌前導翠華明小臣何幸躬逢盛豈謂儒冠誤此生聽講璧水羣英集盛時橋門觀聽萬人隨乞言已覩臨雍禮啟沃先尊坐講儀際㑹明良真喜起周旋品節自逶迤天顔悅豫親瞻望莫道惟容近侍知䝉恩賜襲衣朝罷鑾輿下玉墀臨門駢錫自天垂唱名頒給依金水叩首親承出鳳池未媿桓榮稽古力獨憐顔駟遇時遲歸來雲錦生茅屋黙坐時歌湛露詩仲中翰處賦蓬萊閣上仙得長字木天清切久徊翔麗藻承恩侍建章常自含香歸第晚毎因退食綺筵張春風拂檻花枝繞燕子窺簾柳浪長要識仙凡原不隔瀛洲不逺帝城傍春雨書懐十日春隂不褁巾喜看庭際緑苔新山齋聽雨惟髙卧忘却門前問字人考滿書事考績趨隨鵷鷺班天官引奏陛中間三年虚起趨朝謁此日方親識聖顔咫尺天威真穆穆威儀禮數自閒閒傳宣復職綸音下縹緲徐看扇影還有感年来踪蹟任西東萬事都歸一笑中薊北紅塵虚日月江南白晝又春風悠悠莫問湟中鹿落落空懐塞上翁安得髙情同叔夜時將雙目送飛鴻王敬美入京補選過金陵言别同袁魯仲髙座寺餞之仗劍辭家及暮春相逢白下柳條新擬從北闕霑新命先向南都别故人細雨蹔停僧寺酒煖風輕拂馬頭塵古來名士多年少看爾飛騰切禁宸南雍齋宿夜坐呈諸公永夜沉沉刻漏長碧天如洗露華涼風生竹樹人聲静月擁樓臺露靄香方澤巳崇新典禮致齋猶習舊彞章南都莫謂無禋祀一體君臣肅禘嘗浴芳亭永夜池塘暑氣清緑隂圍合午風輕新篁弄影知魚樂疎柳飛花聽鳥鳴日轉空庭茶正熟涼生虚枕夢初成致齋三日全無事夜夜清言坐月明雨花臺岧嶤雙闕隠蓬萊更有長江天際來無限江山無限好就中尤愛雨花臺桃花春晴緩轡太平堤萬樹桃花暎水齊不是六朝行樂處直須認作武陵溪乞休致喜青衫白髮賦歸歟六館横經九載餘承乏獨慚縻廩禄引年三上乞休書聖恩浩蕩容投老茂苑荒蕪有敝廬待得春風開凍後扁舟南下樂何如文氏五家集巻八
