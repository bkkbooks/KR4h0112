body:
  text: 文氏五家集巻十四明文肇祉撰録事詩集五言絶句春日雨餘春水漲岸岸溪流平𤣥鳥今朝至倉庚樹㡳鳴舟中曉望夜泊葑溪上朝過黄石橋波光浮㶑灔紅日起層霄新燕燕來營舊壘簷底雙雙語桞絮舞閒庭杏花三月雨江樓聞笛閒居人事少獨坐小樓中五月江深處梅花落晚風晚眺一望江天濶風生蘆荻洲平沙羣鴈落天際有歸舟十月昨夜朔風寒今朝雪花舞起來盥櫛餘倐忽日過午楞伽寺楞伽湖上寺修竹萬竿斜禪誦方初定空中散雨花石湖荘卜築越來溪問是王猷室黙黙娱道言墻頭露山色袁氏列岫樓袁安結層樓庭植千竿竹逺岫列窻中人占丈人屋西荘西荘鄰古寺紅杏出墻頭驕馬嘶金勒成羣作冶㳺雞鳴山獨倚慿虛閣紅樓暎日開忘機雙白鶴閒歩啄蒼苔秣陵秋色水深桃葉渡溪上晚潮生岸幘樓頭望蒹葭落日明漂母祠淮隂古驛西溪上有荒祠一飯王孫後芳名千古垂分水龍王廟廟貌神龍古徂徠據上㳺泉源七十二南北水分流黄金臺追想燕昭意懸金結士心當時四至士豈盡為黄金盧溝曉月盧溝缺月升野店早雞鳴不見人行蹟惟聞車馬聲金臺夕照落日閣西山晚霞呈五色倒影入廟中樓臺燦金碧西山玉泉亭湖暎玉泉西泉亭傍石磎吕公祠洞古耶律楚材題署中自遣老作宦遊人荒村寄一身鳥啼花亂落又是一年春致政貪位懐百憂何如歸去好莫嫌得官遲但願休官早山荘歸卧虎丘荘無縈日自長雪深人蹟少温火煑茶香春雨遣懐細雨又春分魚吹水靣紋一般啼鴂烏不是上林聞雨中登虎丘春隂連一月啼鳥怨東風一望劍池上樓臺煙雨中曉山缺月已流西登臺入翠㣲四山空翠滴露下濕人衣中秋夜虎丘翫月歌聲合簫管明月正當頭醉倚千人石山僧供茗甌雪霽登山雪晴山寺寂攜酒一凭闌悟石軒前望瓊樓玉宇寒林居自述歸老意安閒暮年聊自適静坐竹窻中一日如兩日六言絶句十二月端月上元将近髙燒銀燭傳巵酒醒滿庭明月雪殘寒勒梅枝隂雨春分時候柳塘水緑如油燕子歸尋舊壘杏花開滿墻頭今日正逢穀雨呼童試焙新茶池上數株垂柳水邉開遍桃花雨過清和時節牀頭蠶已三眠柳絮漫空作雪沼中荷葉田田夏五葵榴滿目昨朝已過端陽雨歇一畨凉思家家挿遍新秧炎暑蒸人如甑荷亭拂拭桃笙門外寂無車馬卧聽高柳蟬鳴昨日金風乍起今宵大火西流卧看牽牛織女歡娛又一年秋雨霽中秋氣􅐩今宵明月當頭山上㳺人如蟻畫船簫鼓中流去嵗賜糕闕下今宵歸卧山荘記得潘邠詩句滿城風雨重陽霜落溪邉蘆葦初冬紫蟹輸芒新醸牀頭酒熟山荘稻已登塲忽報仲冬時令喜逢至日陽生回視車塵馬足何如几淨窻明臘月午門賜讌歸來高卧䋲牀又是一年將盡茅簷竹几焚香七言絶句雪晴茅簷晴旭減寒威乾雪隨風上竹扉漏泄春光占桞色争枝啄雀墜驚飛白頭鳥争枝落日西風竹樹幽閉門閒坐自悠悠一雙小鳥争飛墜老不相知媿白頭罨畫溪短棹輕舟罨畫中春深花片滿溪紅眼前只少漁郎引疑有桃源路可通又陽羡羣山紫翠重山廻路轉一溪通沿流㸃筆翻成畫不道身先在畫中鳳凰臺懐古鳳去臺空玉樹殘登臺一望俯長干秦人誰識千年後終古皇畿奠石磐春日煖茅簷燕影翻墻頭一樹杏花繁盡垂簾幙裁新句何處鞦韆笑語喧新夏自掃松枝試煑茶四簷新緑暎窻紗剛思無計留春住又見飜堦紅藥花綠牡丹姚黄魏紫鬬鮮新獨此名花占晚春若使移從金谷裏倚䦨疑是墮樓人過金山獻賦留都四度虛扁舟空又載琴書舉頭媿望江天閣只恐名山亦笑余江上小亭雨坐吳淞江上雨霏㣲雨過江邊隐隐雷爱得逺天雙白鶴青山掩映却飛回丹陽道中上書無路逹承明又向丹陽郭裏行買得小舟風又逆蹔依村野待潮生與杜與言談秣陵秋意夕花開向晚風前花近黄昏晚更妍記得長干行樂處紗㡡月伴玉人眠江頭晚眺十月江南鱸鱖肥新舂晚稻帶香炊欣然一飽江頭望楓落前村露酒旗親友送别東風拂拂柳千條客路三千去更迢再把一杯行色酒片㠶風雨過楓橋杜𤣥慶齋供盆蘭缾梅可爱各圖一幅貽之幽蘭空谷萬千叢何似新栽小盎中一蕋二花三四葉分明一幅所南翁折得梅枝蝕蘚斑古缾瓊蕋勒春寒夜來無限相思發㸃筆翻成畫裏看春晝柳花飛舞上簾旌春煖池塘魚子生獨坐小窻無客至桑間戴勝兩三聲玉河春色東風御柳萬株斜白玉河邉暎曉霞報道今年春色早日邉紅杏巳開花十五夜出場棘闈十度鎻重門擊柝聲中欲斷魂文字五千初寫就冷風吹月又黄昏舟中望太白樓昔年曽此醉中豪太白危樓百尺高今夜扁舟空悵望依然月色照宫袍舟中望曉霞熈㣲曉色碧天澄㠶帶青山樹裏行好是楞伽湖畔寺上方茶磨列蒼屛鷺水田漠漠鷺成羣風裊寒絲静不驚何事衝烟忽飛去青山時見白雲生舟過桃源夢故妻伯鸞時憶孟光賢夢裏重逢淚自潸二十四年長别後誰知又是布衣還清河口昔年河口水横下百丈難牽上水舟今日歸來非舊路布㠶無恙自安流舟次儀真有感歸㠶數幅又真州記得隨親送北㳺回首秋光逾七載傷心滿把淚交流京口北固山圍鐵甕城又攜書劍度江濆寄言闗吏無須問不是棄繻終子雲雪夜不寐雨雪霏霏卧擁裯篝燈獨自數更籌樊川詩句闗吾意未見功名巳白頭自嘆劉向傳經苦自知南圖北走媿奔馳塲中三十餘三日博得星星两鬢絲得官有感辛苦奔馳四十年今朝一命拜園官可憐薄禄縻人得從此紅塵撲馬鞍趙邑博仁甫㑹試瘦馬西風古道斜送君囘首各天涯種成桃李門墻盛又向長安看杏花釣鰲處秋風吹雨晝隂隂畫舫青簾暎逺林俛仰舊㳺興感慨百年空負釣鰲心歸山荘有感歸來重卧虎丘莊浩蕩君恩不敢忘坐享餘年娛晚景答天惟有淨焚香聞蛙年來卜築虎丘莊日夜笙歌到耳傍莫道貧家無鼓吹蛙聲也自閙池塘貰酒虎阜山前屋數椽赤欄橋下塔斜懸偶思小飲沽村醸晚市魚蝦正泊船過元上人山房禪房寂寂長苔紋蘿薜隂隂鎻白雲試剪芭蕉如貝葉研朱㸃露寫經文歸來歸老重修塔影園花能含笑鳥能言只求身静心安好不羡門前車馬喧洗硯池邉桞色淡鵞黄雨過雲行漏日光睡起呼童頻洗硯一泓春水墨花香沈道人索書千古鵞羣說右軍山隂道士爱黄庭沈休亦欲籠鵞至為寫淮南相鶴經索字几淨窻明照繭光日臨閣帖晉諸王今朝博得門如市也勝傭書日幾行送友人緑樹溪邉日暮雲片㠶無繫帶斜曛明朝三月逢三十未送春歸先送君鵞羣閣鵞羣閣下水泠泠坐見青山上畫屏午睡起來無客至自臨南牖榻黄庭朱汝脩送貝葉貝葉經文一巻餘故人惠我供齋居芭蕉試剪畨新様滴露研朱手自書反舌年來月令也無憑五月枝頭反舌鳴萬語千言為誰訴攪余殘夢不分明林堂獨坐山中九月下霜華楓葉紅於二月花坐爱林堂幽趣好焚香拂几讀楞伽張伯起畜鴛鴦數十於池客來呼之即至自昔羲之與魯望羣鵞鬬鴨滿春江清河公子無他好池上鴛鴦三十雙新栁陌上東風嘶紫騮淡鵞黄色弄輕柔去年此日長安道萬縷煙條拂御溝二月二月園林雨乍晴茅簷初旭映窻明東風吹緑溪邉草桑柘葉青蠶子生泊問潮館舟泊溪頭夢不成忽聞雲裏度鐘聲起來自倚篷窻看夜半月明潮未平讀南華開遍桃花柳拂煙鴛鴦日煖傍沙眠焚香静坐心如洗細看莊周齊物萹對奕水閣新鋪枕簟凉煖風吹送芰荷香客來觧帶簾前坐棋局閒消白晝長新秋聞蛩昨夜秋聲起樹間早看梧葉滿庭前一畨細雨生凉思繞砌蛩聲到枕邉題卧雪圖袁安僵卧畏干人車馬臨門慰問情當日史官何忘事洛陽令尹不書名文氏五家集巻十四
