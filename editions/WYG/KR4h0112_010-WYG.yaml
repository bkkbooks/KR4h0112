body:
  text: 文氏五家集卷十明文肇祉撰録事詩集四言古詩悠悠厥初萹述祖徳也悠悠厥初爰自西伯以諡為氏系用以翼漢有蜀守聲名洋溢學校聿修民沐其澤若晉儒林文學藉藉有唐節義光于史冊維指使後歴世徴庸宋至寳祐篤生信公義盡仁至大顯貞忠迨我始祖宋咸淳中宣教衡州是為衡宗衡岳廬陵譜牒寔通衡山之麓廼世其族金紫大夫猶食宋祿載世元季廼易武服佩金虎符武昌振肅國兵既下鎮逺繫獄赦長千夫戎勲備録長子驍健入侍髙皇剪平偽漢特被寵光賜名錫服厥族用彰時八世祖從兄平揚職充散騎徙居蘇杭蘇之有文寔自衡陽我祖存心占籍長洲皇矣淶水敷教優柔甲科繼起㤙渥寵褒牧伯中丞世濟其休顯顯祖考作徳好修薦修國史翰苑名流我父是承世徳克存南北二雍桃李盈門嗟予寡陋宿好是敦述此祖徳貽我子孫悠悠厥初五章章十二句巍巍岱山登泰山觀日出也巍巍岱山五岳之宗蟠九百里上有秦封巍巍岱宗元君有宫俯視下邑鳬繹龜䝉載登天門層巒蔽空秦觀在西日觀其東梁父左控石閭右通載登髙峯憇于石室卧聽松濤夜觀日出蓬瀛海島周覧惟悉瞻彼同巖羣仙並列叩彼金童授我寳訣金泥玉簡終莫能詰載登載曕身若羽化骨異𤣥丘思旋其駕廻觀其巔誠小天下巍巍六章二章四句四章六句壬戌之秋㳺西山也適符蘇公㳺赤壁之期壬戌之秋七月既望薄言西山于邁以徃我懐蘇公寔可景仰嵗月日時適值其當有酒有肴以詠以唱載遨載嬉幽情思暢卧聽泉流枕看月上四山寥寥形骸放浪赤壁之㳺曷足多譲今之視昔不無慨悵壬戌一章章二十句神禹篇頌大中丞南充王師督漕也神禹治水天地平成覩河思績功莫與争維我王公邦國之楨漕河之命厥任匪輕决之排之以經以營䟽之鑿之由地中行國脉以宣國計其盈惟我中丞赫赫厥聲粒我蒸民民咸用情惟予小子頌徳維誠神禹一章章二十句晨風篇送虞部楊汝大奉詔南征也晨風飄飄王事于適子之徃矣我心􅀈矣将子何徂王事敦我中心搖搖孰念其癉莫非王事母為忉忉既曰仕矣遑恤其勞子謂何求王事靡執余諒子心子亦何憂晨風四章章四句肅肅篇送侍御吳明卿印馬于齊魯地也肅肅王命吉日于征左右陳行我馬其騯有馬駉駉在齊之坰維騂維黄有驪有青有馬駉駉在魯之林如騅如雲蹻蹻駸駸有駜其駽夙夜在公我職斯稱我馬既同駜彼乗駽夙夜于外式遄其歸載言載㑹肅肅五章章四句樂府賡有明鐃歌鼔吹曲六篇鐃歌作于黄帝岐伯以揚徳建威風敵勸士也漢魏吳晉諸臣代有作者而唐柳宗元凖漢曲篇數用魏晉義為唐鐃歌十二篇一皆揄揚其祖宗之功能亦雅頌之流亞也至於我朝陶學士安作大明鐃歌三闋嘉靖初袁督學袠亦倣為皇明鐃歌十三篇皆以稱頌髙皇放勲宏德之盛蔑以加矣愚生也賤敢效唐臣合紀髙祖太宗之美而賡歌之援舊題以成新曲共成六章擬之雅頌非曰能之而施之後日歌以為容不亦幸歟聖人出漢古辭也我髙皇帝起自臨濠而奄有天下誠不世出之聖謹用其題以賡歌之聖人出六龍飛天眷徳起濠西撥亂反正天與人歸掃前元正綱維都建業式九圍復自古帝王之區奠萬古帝王之基定武功魏繆襲國初破鄴而作謂武功之定始於此也髙皇渡江取太平諸路武功亦定于是定武功始渡江江水茫茫鼔聲鋒鋒下采石平淮揚東收吳越西定湖湘中原河洛恢其疆秦晉燕趙咸歸降鎮南粤來越裳武功定兮殺伐張廣輪撫兮歌元良伐烏林吳韋昭頌魏武克敵也我皇祖驅殘敵而元君自烏林奔于漠北亦用舊題而歌焉我師驅故元直扺漠北境王旅奮義威宵奔絶形影太白㝠天狼淨戰壘無復存烽烟竟全屏全師奏凱旋踴躍踰燕領萬載慶昇平中土永寜靖宣輔政晉傅𤣥以其主網羅文武之才定二儀之序也髙皇之命將出師盡得死力其一時人才如徐常輩豈晉魏諸臣所能及其萬一哉輔政資多賢俊乂在官使我皇善任才文武咸願仕多士起濠城四方亦戾止功成歌皇風萬國皆遵軌自古得士心誰復能如此應帝期繆襲言文帝以聖德受命應運期也成祖文皇帝順天撫運而繼志述事之大殆有光於先烈者歟於昭文皇光承洪緒宻運神機奠鼎燕冀天縱文武一怒安民兩京並峙内撫輿圖外扼闗塞以握要幾以據全勢攄武師韋昭言大烈之震天下我文皇之天縱神威廓清華夏武師之震不有甚于吳哉攄武師威加四海奮雄圖大畏小懐民廼蘇廓清中土功不可踰風聲丕冒如唐虞季犁已討古刺羣趨明明天子頌徃古疇與俱燕歌行燕山九月肅寒威處處邉陲思授衣一觧愁聽砧杵守空幃鬱陶思君君不歸二觧賤妾淚下如珠璣君知不知何暌違三觧𠂻腸摧傷撫琴徽歌聲何短吟何㣲四觧推窻月隨留餘輝簷前星宿寒芒稀五觧手擲金錢暗自祈歸無定期情無依六觧朱門炙手𤨏重闈滹沱凍合雪霏霏鴈無書寄空南飛七觧豫章行人生自有命今日何可移富貴不足慕貧賤安能辭商宗無夢寐版築疇能知西伯不出獵羊裘終釣垂自古賢哲人所遇皆如斯若不委窮逹貿貿将安之短歌行有酒盈觴有歌盈章人夀幾何靡皆延長再觴再詠其樂未央樂不及時空用悲傷况也分定妄求奚遑聽我短歌短歌勿忘長歌行百川每東注奔晷時西馳人生草頭露夀命安可期􅅨綺不復在喬松何所之古來誰滿百此理不待推延年果有藥焜黄胡復衰矧兹功名薄竹帛無由垂及時不為樂老大悲何為我今歌長歌長歌以自怡鰕䱉篇神龍忽下謫混同鰕䱉泥黄鵠志千里不及鷦鷯栖周公居攝後三叔流言懠尼父道莫宗楚狂歌鳳兮毁譽何足慿謗議空相擠荘周齊物化萬物安能齊從軍行遼陽烽燒飛狼烟牧馬羣兒荒草邉請聽從軍五更轉城烏起堞天蒼然羽林行朔風吹太行白日沙飛黄溪谷少行蹟邊馬嘶欲僵行見交河下羽林兒獨强臂鷹挾匕首金勒紫絲韁公子行寳馬珊瑚鞭争看美少年蹀躞長安道買醉青樓邊盈盈樓上女邀語杏花前歡歌猶未巳竟日那知旋女耕田行布谷聲催笋觧籜誰家女子事東作自言母老兄出門出門從軍未及婚有妹同胞巳先嫁獨自服田力耕稼以刀斫地可代牛䟽犁畦隴開澮溝時雨不來禾盡槁修圃築塲愁有秋南隣北舍莫相笑有淚空流向誰告白苧歌二首中庭良夜張華筵美人如花嬌且妍趙瑟秦筝調蜀絃回眸轉䄂銀燭前為君起唱白苧篇金壺半瀉漏濺濺今君安坐聽我鼓願為䨇燕簾前舞新裁羅䄂長且輕明妝皦皦纎塵生舞向君前進玉罌流目暗盼嬌盈盈百年如戲莫蹉跎請君試看東流波東流不回西日逝我今不樂将如何鞠歌行雲出岫龍起谼乗風升雲騰碧空歌鐘歇曷自工還思相和旋為宫薄責人厚責躬人莫巳知吾道窮嗟揚雄賦河東猶待吹嘘送上穹子期沒伯牙終千載無門繼古風出門行河流滚滚逝不轉年光迅速一如巻美人遥隔天之涯欲渉難将水清淺少年何事輕出門别離易兮車無輪我身似轍遺漸逺佇立望之多荆榛君今得意誰復顧棄我何異車後塵長安狹斜行長安狹斜路方軌殊難容彼羙兩少年行行適相逢相逢問君家君家盛華宗品服盡朱紫鼎食多黄封錫爵列羣侯出入躋九重我本倦游子莫敢當其鋒歸守畎畆間飡不繼朝饔規行仍矩歩險僻安能從江南春追和倪元鎮韻輕雷一夜抽新筍寳鴨香消山館静行厨竹裏起茶烟禪榻風㣲撩鬢影杏花開殘春尚冷轆轤聲㫁花間井水清照我頭上巾酒染青衫巾染塵春來遲春去急殘紅數㸃蒼苔濕韶華去去追何及王孫不歸草空碧傷春轉覺情於邑誰家紅袖髙樓立陌頭桞花飛作萍鳲鳩乳燕方營營漁父詞四首年來生計住呉淞舴艋斜穿錦浪中溪柳綠野桃紅煑魚沽酒醉東風輕雷送雨過横塘菱葉荷花掠岸香新水漲晩風凉卧吹蘆管和滄浪輕舟短棹自夷猶開遍芙蓉古渡頭紅蓼渚白蘋洲鯉魚風動是深秋江天冬日淡無暉江上漁人夜未歸風急急雪霏霏綠蓑青笠棹如飛文氏五家集巻十
