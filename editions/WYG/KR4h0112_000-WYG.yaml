body:
  text: 文氏五家集總集類提要臣等謹案文氏五家集十四巻明長洲文氏四世五人之詩也文洪字功大成化乙酉舉人官淶水教諭著括囊稿詩一巻文一巻其孫徵明著甫田集詩四巻徵明長子彭字夀承官南京國子監博士著博士詩二巻次子嘉字休承官和州學正著和州詩一巻彭之子肇祉字基聖官上林苑録事亦著詩五巻中惟徵明名最盛其家學之淵源則自洪始之如静志居詩話所稱野猿窺落果林蝶戀殘花自得翻書趣渾忘對客言諸句饒有恬澹之致徵明詩格不髙而意境自能拔俗至彭嘉肇祉亦能于耳濡目染之餘力承先緒所謂謝家子弟雖復不端正者亦奕奕有一種風氣也徵明甫田集已著録然巻帙相連無容割裂且除此一集與五家之目亦不合尤無容改其舊名以五為四故仍並録之而附著其互見之故焉乾隆四十五年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:2df3aff6d37dec1c390f7bcace2fba5ee0078622db5b61aff6baf08a13e8f8d6
