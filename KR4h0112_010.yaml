body:
  text: 文氏五家集卷十明文肇祉撰録事詩集四言古詩悠悠厥初萹述祖德也悠悠厥初爰自西伯以諡為氏系用以翼漢有蜀守聲名洋溢學校聿修民沐其澤若晉儒林文學藉藉有唐節義光于史冊維指使後歷世徴庸宋至寶祐篤生信公義盡仁至大顯貞忠逮我始祖宋咸淳中宣教衡州是為衡宗衡嶽廬陵譜牒實通衡山之麓乃世其族金紫大夫猶食宋祿載世元季乃易武服佩金虎符武昌振肅國兵既下鎮逺繫獄赦長千夫戎勳備録長子驍健入侍髙皇剪平僞漢特被寵光賜名錫服厥族用彰時八世祖從兄平揚職充散騎徙居蘇杭蘇之有文實自衡陽我祖存心占籍長洲皇矣淶水敷教優柔甲科繼起恩渥寵褒牧伯中丞世濟其休顯顯祖考作德好修薦修國史翰苑名流我父是承世德克存南北二雍桃李盈門嗟豫寡陋宿好是敦述此祖德貽我子孫悠悠厥初五章章十二句巍巍岱山登泰山觀日出也巍巍岱山五嶽之宗蟠九百里上有秦封巍巍岱宗元君有宫俯視下邑鳬繹龜䝉載登天門層巒蔽空秦觀在西日觀其東梁父左控石閭右通載登髙峯憩于石室卧聽松濤夜觀日出蓬瀛海島周覽惟悉瞻彼同巖羣仙並列叩彼金童授我寶訣金泥玉簡終莫能詰載登載曕身若羽化骨異𤣥丘思旋其駕回觀其巔誠小天下巍巍六章二章四句四章六句壬戌之秋遊西山也適符蘇公遊赤壁之期壬戌之秋七月既望薄言西山于邁以往我懷蘇公實可景仰嵗月日時適值其當有酒有肴以詠以唱載遨載嬉幽情思暢卧聽泉流枕看月上四山寥寥形骸放浪赤壁之遊曷足多讓今之視昔不無慨悵壬戌一章章二十句神禹篇頌大中丞南充王師督漕也神禹治水天地平成覩河思績功莫與爭維我王公邦國之楨漕河之命厥任匪輕决之排之以經以營疏之鑿之由地中行國脉以宣國計其盈惟我中丞赫赫厥聲粒我蒸民民咸用情惟豫小子頌德維誠神禹一章章二十句晨風篇送虞部楊汝大奉詔南征也晨風飄飄王事于適子之往矣我心􅀈矣將子何徂王事敦我中心搖搖孰念其疸莫非王事母為忉忉既曰仕矣遑恤其勞子謂何求王事靡執余諒子心子亦何憂晨風四章章四句肅肅篇送侍御吳明卿印馬于齊魯地也肅肅王命吉日于征左右陳行我馬其騯有馬駉駉在齊之坰維騂維黃有驪有青有馬駉駉在魯之林如騅如雲蹻蹻駸駸有駜其駽夙夜在公我職斯稱我馬既同駜彼乘駽夙夜于外式遄其歸載言載㑹肅肅五章章四句樂府賡有明鐃歌鼓吹曲六篇鐃歌作于黃帝岐伯以揚德建威風敵勸士也漢魏吳晉諸臣代有作者而唐柳宗元凖漢曲篇數用魏晉義為唐鐃歌十二篇一皆揄揚其祖宗之功能亦雅頌之流亞也至於我朝陶學士安作大明鐃歌三闋嘉靖初袁督學袠亦倣為皇明鐃歌十三篇皆以稱頌髙皇放勳宏德之盛蔑以加矣愚生也賤敢效唐臣合紀髙祖太宗之美而賡歌之援舊題以成新曲共成六章擬之雅頌非曰能之而施之後日歌以為容不亦幸歟聖人出漢古辭也我髙皇帝起自臨濠而奄有天下誠不世出之聖謹用其題以賡歌之聖人出六龍飛天眷德起濠西撥亂反正天與人歸掃前元正綱維都建業式九圍復自古帝王之區奠萬古帝王之基定武功魏繆襲國初破鄴而作謂武功之定始於此也髙皇渡江取太平諸路武功亦定于是定武功始渡江江水茫茫鼓聲鋒鋒下采石平淮揚東收吳越西定湖湘中原河洛恢其疆秦晉燕趙咸歸降鎮南粵來越裳武功定兮殺伐張廣輪撫兮歌元良伐烏林吳韋昭頌魏武克敵也我皇祖驅殘敵而元君自烏林奔于漠北亦用舊題而歌焉我師驅故元直扺漠北境王旅奮義威宵奔絶形影太白冥天狼淨戰壘無復存烽烟竟全屏全師奏凱旋踴躍踰燕領萬載慶升平中土永寧靖宣輔政晉傅𤣥以其主網羅文武之才定二儀之序也髙皇之命將出師盡得死力其一時人才如徐常輩豈晉魏諸臣所能及其萬一哉輔政資多賢俊乂在官使我皇善任才文武咸願仕多士起濠城四方亦戾止功成歌皇風萬國皆遵軌自古得士心誰復能如此應帝期繆襲言文帝以聖德受命應運期也成祖文皇帝順天撫運而繼志述事之大殆有光於先烈者歟於昭文皇光承洪緒密運神機奠鼎燕冀天縱文武一怒安民兩京並峙內撫輿圖外扼關塞以握要幾以據全勢攄武師韋昭言大烈之震天下我文皇之天縱神威廓清華夏武師之震不有甚于吳哉攄武師威加四海奮雄圖大畏小懷民乃蘇廓清中土功不可踰風聲丕冒如唐虞季犁已討古刺羣趨明明天子頌往古疇與俱燕歌行燕山九月肅寒威處處邉陲思授衣一解愁聽砧杵守空幃鬱陶思君君不歸二解賤妾淚下如珠璣君知不知何暌違三解𠂻腸摧傷撫琴徽歌聲何短吟何微四解推窗月隨留餘輝簷前星宿寒芒稀五解手擲金錢暗自祈歸無定期情無依六解朱門炙手瑣重闈滹沱凍合雪霏霏鴈無書寄空南飛七解豫章行人生自有命今日何可移富貴不足慕貧賤安能辭商宗無夢寐版築疇能知西伯不出獵羊裘終釣垂自古賢哲人所遇皆如斯若不委窮逹貿貿將安之短歌行有酒盈觴有歌盈章人夀幾何靡皆延長再觴再詠其樂未央樂不及時空用悲傷况也分定妄求奚遑聽我短歌短歌勿忘長歌行百川每東注奔晷時西馳人生草頭露夀命安可期𣆀綺不復在喬松何所之古來誰滿百此理不待推延年果有藥焜黃胡復衰矧兹功名薄竹帛無由垂及時不為樂老大悲何為我今歌長歌長歌以自怡蝦䱉篇神龍忽下謫混同蝦䱉泥黃鵠志千里不及鷦鷯栖周公居攝後三叔流言懠尼父道莫宗楚狂歌鳳兮毁譽何足慿謗議空相擠莊周齊物化萬物安能齊從軍行遼陽烽燒飛狼烟牧馬羣兒荒草邉請聽從軍五更轉城烏起堞天蒼然羽林行朔風吹太行白日沙飛黃溪谷少行蹟邊馬嘶欲僵行見交河下羽林兒獨强臂鷹挾匕首金勒紫絲韁公子行寶馬珊瑚鞭爭看美少年蹀躞長安道買醉青樓邊盈盈樓上女邀語杏花前歡歌猶未巳竟日那知旋女耕田行布谷聲催笋解籜誰家女子事東作自言母老兄出門出門從軍未及婚有妹同胞巳先嫁獨自服田力耕稼以刀斫地可代牛疏犁畦隴開澮溝時雨不來禾盡槁修圃築場愁有秋南鄰北舍莫相笑有淚空流向誰告白苧歌二首中庭良夜張華筵美人如花嬌且妍趙瑟秦筝調蜀絃回眸轉䄂銀燭前為君起唱白苧篇金壺半瀉漏濺濺今君安坐聽我鼓願為雙燕簾前舞新裁羅䄂長且輕明妝皎皎纎塵生舞向君前進玉罌流目暗盼嬌盈盈百年如戲莫蹉跎請君試看東流波東流不回西日逝我今不樂將如何鞠歌行雲出岫龍起谼乘風升雲騰碧空歌鐘歇曷自工還思相和旋為宫薄責人厚責躬人莫巳知吾道窮嗟揚雄賦河東猶待吹噓送上穹子期沒伯牙終千載無門繼古風出門行河流滚滚逝不轉年光迅速一如卷美人遙隔天之涯欲涉難將水清淺少年何事輕出門别離易兮車無輪我身似轍遺漸逺佇立望之多荆榛君今得意誰復顧棄我何異車後塵長安狹斜行長安狹斜路方軌殊難容彼美兩少年行行適相逢相逢問君家君家盛華宗品服盡朱紫鼎食多黃封錫爵列羣侯出入躋九重我本倦游子莫敢當其鋒歸守畎畝間餐不繼朝饔規行仍矩步險僻安能從江南春追和倪元鎮韻輕雷一夜抽新筍寶鴨香消山館靜行厨竹裏起茶烟禪榻風微撩鬢影杏花開殘春尚冷轆轤聲斷花間井水清照我頭上巾酒染青衫巾染塵春來遲春去急殘紅數㸃蒼苔濕韶華去去追何及王孫不歸草空碧傷春轉覺情於邑誰家紅袖髙樓立陌頭桞花飛作萍鳲鳩乳燕方營營漁父詞四首年來生計住吳淞舴艋斜穿錦浪中溪柳緑野桃紅煮魚沽酒醉東風輕雷送雨過橫塘菱葉荷花掠岸香新水漲晚風凉卧吹蘆管和滄浪輕舟短棹自夷猶開遍芙蓉古渡頭紅蓼渚白蘋洲鯉魚風動是深秋江天冬日淡無暉江上漁人夜未歸風急急雪霏霏緑蓑青笠棹如飛文氏五家集卷十
