body:
  text: 文氏五家集卷四明文徴明撰太史詩集七言古詩題友壻王世寶鈎勒竹湘竿淚歇斑不留縞衣玉立清而虬蕭蕭寒月照空影冉冉白雲生素秋誰家美人誇雪面中庭搖佩清霜愁飛來白鳯何所有玉宇瑟瑟風颼颼古來畫竹誰最優先宋彭城元薊丘誰翻新格作鈎勒王君一𣲖真其儔稍從筆底超變相遂能意外資窮搜應以虛心本性在不使粉節緇塵浮清隂雖改風骨是意足宜於形色求竒蹤豈出漢飛白古意尚有唐雙鈎昔人論書謂心畫看君畫筆知清修我方有愧文與可君已真如王子猷高堂對此心悠悠聊書數語遙相投殷勤報我無多謀雙竹不讓雙璚球余畫金焦落照圖吳水部德徴先生寄示二詩題謝長句憶昨浮船下揚子平翻渺渺波千里何來雙島挾飛樓璀璨彤煌截濤起夕峰倒墮滿江隂霜樹高浮半空紫舟人指點落日處凌亂煙光射金綺平生快覩無此竒却恨歸帆北風駛至今偉迹在胸中回首登臨心不已偶然興落尺紙間便欲平吞大江水固知心手不相能塗抹聊當卧逰爾晴窗舒卷日數回不敢示人聊自喜水部先生詩有名忽枉瑶篇重稱美漫云家法自湖州自愧區區何足齒由來題品係名聲何況先生是詩史君不見當年畫馬曹將軍附名甫集猶不死又不見閻公自謂起文儒池上俄蒙畫師恥人生固有幸不幸拙劣何堪古人擬江山千載等陳迹一笑寧須論非是新荔篇常熟顧氏自閩中移荔枝數本經歲遂活石田使折枝驗之翠葉芄芄然不敢信也以示閩人良是因作新荔篇命璧同賦錦苞紫膜白雪膚海南生荔天下無鹽蒸密漬失真性平生所見唯萎枯相傳尤物不離土畏冷那得來三吳顧家傳來三數株桂身翠幄森森殊逺人無慿未敢信持問閩士咸驚呼還聞纍然生數子絳綃裹玉分明是未論香色果如何只説形模已珍美千載空流北客涎一朝忽落饞夫齒白圖蔡譜漫誇張文飾寧如親目視飽啖只於鄉里足鮮嘗漸去京師邇不須更作嶺南人只恐又無天下痏疑朝來自訝還自疑事出非常有如此雖云逺附商船達不謂滋培遂生活始知生物無近逺故應好事能回斡卉物聊占地氣遷造化竟為人事奪仙人本是海山姿從此江鄉亦萌蘖由來沃衍説吾鄉異品珍嘗曾不乏不緣此物便增重無乃人心貴希濶福山楊梅洞庭柑佳名久已擅東南風情氣味不相下稱絶今兼荔子三次韻題子畏所畫黃茆小景斜日翻波山倒浸晚晴鈎出西南勝絶島雙螺樹色浮遙天一線鷗飛剩誰剪吳淞尺紙間唐君胸有洞庭山古藤危磴黃茆渚細草荒宫消夏灣我生無緣空夢墮三十年來蟻旋磨睡起窗前展畫看慌然垂手磯頭坐湖山宜雨亦宜晴春色蘢蔥秋月明知君作畫不是畫分明詩境但無聲古稱詩畫無彼此以口傳心還應指從君欲下一轉語何人會吸西江水遊慧山憶得新秋慧山路小艦歸來及秋暮東行不負酌泉盟一笑再理登山屨山中草木漸衰歇依舊靈泉雪流乳腸胃聊煎肉食腥鬚眉淨洗京塵汚雅致仍攜小筧茶舊逰愧讀南牆句墨痕凌亂猶昨日老衲依稀説前度三旬才到一何稽一月兩番無乃屢人情嗜好信有偏至理自知非可諭我生自謂萬緣輕泉石娛人却成痼那能過此但空歸縱不可留須一戽小奚解事走相從瓶罌預潔提泉具斜陽一抹滯奔程好竒正得舟人怒回視舟人笑不言就中有理無相苦寄題瑞州清風亭亭為夏太常仲昭守郡時作黃應龍追記其事乞詩瑞州山色照江青瑞州太守風泠泠時移事換太守去清風自蔭山間亭山亭無塵石齒齒百歲風流人仰止同鄉博士悵來遲撫景懷賢託文字寫心狀物記當時我不識亭心已至清規寺左萬松長倣佛與客登崇岡松聲激耳溪流駛月色灑面梧桐涼清風濯人固自爽景物快意還相當須知物盡風有歇惟有德在人難忘瑞人緣德護斯亭我復因亭見典刑亭前千挺琅玕清亭中之人能寫生此君本無食肉相老守況負清饞名祗今墨君滿天下清風何獨瑞州城題石田先生畫細泉汩汩落澗平蒼煙不動沙州橫湖亭欲上山滿目新水浮空春雨晴江南此景誰貌得石田先生最神逸輕風淡日總詩情疏樹平臯俱畫筆由來畫品屬詩人何況王維發興新胸中爛漫富丘壑信手塗抹皆天真墨䀶慘淡發古意筆力簡逺無纎塵古人論畫貴氣骨先生老筆開嶙峋近來俗手工摹擬一圖朝出暮百紙先生不辨亦不嗔自謂適情聊復爾豈知中有三昧在可以意傳非色取庸工惡札競投集鳯凰一出山雞靡高堂拂曉見滄洲恍然置我重巖裏定應奪却造化工不然剪取吳淞水神完意到輕千年題作古人誰不然題廬山圖余為林師寫丘壑高間用謝幼輿事也而石田丈以廬山高賦之輒亦賦此壯哉廬山天下竒瀑流千丈江瀰瀰何人巨筆寫竒秀歐公昔贈劉君詞搜玄抉怪轢萬象萬古直與山爭馳莆田先生山澤姿壯節五老同崔嵬名通仕版偶服吏癖在泉石終難醫高堂東絹風披披令我掃筆為嶔﨑飛橋細路緣翠壁偃松絶壑臨蒼坻已擬先生謝幼輿故著逸士泉之湄就中有理未可説却被石翁加品題惟翁自有王維筆謂我解畫歐公詩由來絶唱不可和況此粉墨那容追秪應披霧見突兀庶此峻拔如吾師吾師真是劉凝之我視六一無能為凝之不作六一逺此詩此畫誰當知天池碧雲十里山重重舉首忽見蓮花峯晴嵐霏空展蒼壁午隂匝地搖長松逰人著腳萬松頂蜿蜒細路凌飛笻不知去地幾千丈乃有寒瀨流琤琮微波吹魚動石腳倒影落鏡浮雲容臨流弄玉搖明空水中照見青芙蓉穹崖擘鐵迸雪乳定出天造非人庸下方春來萬井渴安得此澤常溶溶我疑高源隱天漢或是隂壑蟠虬龍又疑造物喜變幻顛倒景象潛其蹤不然水濕本就下一泓上出夫何從嘗聞此山可度難靈區信是千年鍾枕中祕記誰復悉異人有在何當逢題畫二首東風吹春著幽谷宿雨浮煙樹新沐斜橋曲徑帶流水白日疏籬蔭濃緑晴江隔世不隔山百疊蒼螺墮茆屋輸却長吟抱膝人鎮日臨磯弄晴渌其二千巖拔地排青蒼古松稷稷連重岡岡回嶺復得竒絶瀑流千丈垂銀潢盤盤細路入雲長兩崖對起懸飛梁雲重路僻不知處應有仙家在深塢夕陽變滅晚山寒無限風煙屬倚闌醉仙圖長松拔地生晝寒玉泉汩汨鳴高灘世間萬事日不足山中百年才轉轂試看騎馬傍朱門何似餐芝友麋鹿有時高嘯度長風白雲扶醉蓬萊宿蓬萊之宫渺何許中有儒仙自霞舉寧知城市有間人只與仙家隔一塵為吳心逺補石田未完小畫并次遺韻石翁已賦白玉樓畫圖猶記荆溪逰殘縑未了人事改百年生世真如浮補亡到我愧貂尾絶筆從前推虎頭坐中見畫誰最愁吳翁昨日共經丘故人何處山在眼歲月不待江空流東來無限西州感不妨十日為遲留題黃應龍所藏巨然廬山圖筠陽文學倦官職十年歸來四壁立探囊大笑得片紙不啻瓊球加什襲攜來示我俾品評謂是名僧巨然筆渙迹漓蹤那辨真白間雙印還堪識古篆依稀贑州字先宋流傳非一日要知源委出珍藏未論誰何定名迹墨渝紙敝神自存老筆嶙皺況超逸岡巒迤邐蒙密樹浦溆縈紆帶村室盤盤細路繞山椒斜引魚梁更東出途窮山盡得幽居穹宫傑搆臨清渠仙邪佛邪定何處倣佛勝境如匡廬還從文學問何如大笑謂我言非虛自言逺逰真不俗曾見廬山真面目五老之峰披白花晴巚萬丈時飛瀑某丘某壑皆舊逰展卷晴窗眼猶熟祗今老倦到無由對此時時作卧逰慚余褁足不出户聞君此語心悠悠高懷咫尺已千里眼中殊覺欠扁舟早起殘更斷續天蒼蒼開門汲井夜欲央雞聲人語杳無際落月曙色相為光臨風短髮不受握泫露碧葉微生涼屋頭日出萬事集惜取靜境聊徜徉蕉池積雪次張伯雨韻空山白石漢洗不與時世俱凋零天星墮地更皎皎土花蝕雨何青青千年物色本同幻前輩畫格能遺形懷賢弔古意無極一笑醉倒雙銀瓶謝錢孔周送蟹窮隂欲雪天瀰瀰塞戶僵眠對書几故人知我有高懷緘書為致佳公子淞江水涸稻畦空掃簾竭澤那求此吾生於此頗關情況對一尊清更旨老妻大笑異尋常我自適情君勿止輪囷犖確類高人對此若醒真俗矣霜螯厯落久垂涎紫瀡淋漓先染指誅求既已極脂膏搜剔還應窮爪跪莫言支解本無罪正坐尊前風味美淮隂慷慨以功烹傅奕風流緣酒死一笑題詩謝故人坐上江山已千里題虢國夫人夜逰圖紫塵拂轡春融融參嵳飛鞚驕如龍錦韉繡帶簇妖麗絳紗玳燭圍香風春風交花光屬路後騎雍容前郤顧中間一騎來逡巡秀眉玉頰真天人翠微垂鬢衱稱身倣佛當年虢與秦佳人絶代真難得安得君王不為惑豈知尤物禍之階不獨傾城竟傾國一時喪亂已足憐後世方誇好顔色晴窗展卷漫多情百年青史自分明莫言畫史都無意尺素還堪鑒興廢次韻題王山農墨梅西湖老樹凌風霜敷英奕奕先羣芳貞姿不作兒女態炯然冰玉生寒芒窮寒襲人膚欲裂幽人自咏孤山雪至今秀句落人間暗香浮動黃昏月却恨無人續高韻墨䀶聊寄江南信不關素質暗緇塵剛愛鉛煤點新鬢慌疑寒影照昏釭刻畫無鹽誰濫觴逃禪已逺嗣者寡倣佛尚記山農王山農何處骨已冷展卷令人雙目醒何因為喚玉妃魂極目晴波湖萬頃臘月十八日冒雨過湯子重草堂適王履吉亦在燕談竟日因賦長句奉贈二君窮隂約雨風淒淒短靴犖確沾豐泥草堂舊路行不迷依然碧鳯坊之西荒庭無聊野煙合暮雲欲壓寒簷低平生故人忽在眼升階一笑欣相攜湯君秀潤擬文犀王郎清才飣坐梨二君真是後來秀風儀濯濯情依依文章奕煜煥星斗意度坦蕩和天倪祥麟一角世所稀乃肯下友同山麛顧余骯髒何所有當年豪氣騰虹霓世間萬事不比數欲起古人相與齊區區薄劣不自知力小負重成顛擠空然虛譽動州里漸久亦盡行如澌邇來推與愧諸彥大似野鶴容山雞我真老大曳尾龜公等駭躍凌雲騠已窺正的寧有失坐躡高峻何煩梯百年文運端有屬萬里修程方發蹄還聞問學貴忠信非德有受終無稽彌文曼采祗自困如屋不棟車無輗深言贈君君勿疑由來丹鳯無卑棲前賢風躅去未逺我不足道君當躋蘭房曲戲贈王履吉效李賀彤雲旖旎霏祥光蘭椒沃壁含璚芳流蘇嫋嫋開洞房晚波繡燭搖鴛鴦鴛鴦雙飛情宛轉紫帶垂螭覺螭緩緑膏照粉玉釭斜瑤鴨融春翠雲暖海綃落枕夜何如美人笑擲雙明珠巫雲朝斂金叉溜不恨巫雲恨花漏春曉曲翠塵沃日煙霏霏彤光飛上千罘罳誰家高樓鎖春色金鋪約户蟠雙螭東風掠幌鸞綃動瑤鴨蘭溫睡初重起來臨鏡悄無言含情自理雙鶯夢夢回生怕守宫殘捲袖移鞲獨自看燕子銜春欲飛去海棠猶自勒輕寒簾幕垂寒朝不捲綺疏結香春較淺欲裁羅段作春衫自爇薰爐尉金剪春夜曲璚雲貫月溶金波碧煙羃樹春婆娑海珠泣紅花露重蜃脂流絳蘭逶迤越羅復幕交流蘇繡襦結帶明青蛾金壺轉刻銅龍濕漏水濺濺轆轤澀轆轤沈沈軋銀井畫轂難淹夜愁永起看青漢不成眠不見雙星見河影河明月淡斗橫斜通宵春思匝天涯眉端心事説不得自調新譜按琵琶采蓮圖橫塘西頭春水生荷花落日照人明花深葉暗不辨人有時葉底聞歌聲歌聲宛轉誰家女自把雙橈擊蘭渚不愁擊渚濺紅裳水中驚起雙鴛鴦采桑圖茜裙青袂誰家女結伴牆東采桑去采桑日暮怕歸遲室中箔寒蠶苦飢只愁牆下桑葉稀不知牆頭花亂飛一春辛苦只自知百年能著幾羅衣題沈氏所藏石田臨小米大姚江圖長洲沈氏舊藏小米真迹成化間有假中官之勢取之石田為追摹此圖春雲沈空山有無眼明見此姚江圖圖窮爛漫得題字照人百顆驪龍珠平生雅識敷文書紹興歲月仍不誣豈知尤物能媒禍繭紙蘭亭已非故石翁信事學行人能使邯鄲還故步憶昔憸人賄為囿黷財更假狂閹手千里珍竒歸檢括故家舊物那容守沈氏藏兹二百年一朝掣去心茫然誰言物聚必有散手澤相關常纍歎未能一笑付亡弓且喜百年還舊觀豈余鈍眼錯顔標抵掌真成孫叔敖區區不獨形模似更存風骨驪黃外一時點筆逈通神得非小米是前身從來藝事關人品敢謂今人非古人五月十三夜與子重履約履仁石湖行春橋看月夕光沈山蒼靄橫行春橋東江月生長風吹波天鏡濶白波渺渺菰蒲聲微瀾壓玉搖空明扁舟忽動江湖情罾頭魚蝦夜可買得酒試與諸君傾山空夜久人竟醉高歌互答漁舟驚漁舟天上來棹入滄溟去似聞漁歌縹眇不斷出煙蘿水逺天長不知處一髮青山落鏡中萬里橫河碧空曙人生行樂不易得賞心況有尊前客江山如畫酒如澠相看不飲空頭白不見橋東千尺臺吳王曾此夜銜杯歡燕不堪芳漏促西施舞罷越兵來越兵已成功越王安在哉鴟夷竟去不復回吳宫越壘空復生蒼苔千古興亡總湮滅只有湖山未消歇吳王去來今幾時幾人能醉湖中月題高房山橫軸春雲離離浮紙膚翠攢百疊山糢糊山空雲斷得流水咫尺萬里開江湖依然灌莽帶茅屋亦復斷渚迷菰蒲岡巒出沒互隱見明晦隂晴日千變平生未省識匡廬玉削芙蓉正當靣宛轉香罏霏紫煙依稀夢澤分秋練未遂扁舟夢裏逰酒醒獨展燈前卷問誰能事奪天工前元畫史推高公已應氣槩吞北苑未合胸次饒南宫南宫已矣北苑死百年惟有房山耳祗今遺墨已無多窗前把卷重摩娑世間吮筆爭么麼掃滅畦徑奈爾高公何明妃曲漢廷議和親佳人使絶域明妃隨例行祗謂掖庭職一朝臨遣動天子始信深宫未曾識當日丹青亦等間今知不得黃金力正緣平日懷貞素非敢從前恃顔色由來顔色不自知愛惜自是君王私君王顧妾恩何厚竟按臣工戮延夀佳人自有命畫工何能為長信宫中長别離當時豈亦有人欺悠悠青冢沙塵裏千載終為漢家死紅顔命薄古云然不恨臣工況天子題漁隱圖四首江南雨收春柳緑碧煙斂盡春江曲十里蒲芽斷渚香千尺桃花春水足溪翁鎮日臨清渠坐弄長竿不為魚太平物色不到此安知不是嚴光徒其二江頭夏雨十尺強晚波搖日空江涼逰魚瀺灂樂深藪不謂人間有漁笱網得江魚不稅官自食自漁終歲歡輸租轉賦世途惡漁家自得江湖樂其三漁翁老去頭如雪短笠輕蓑舟一葉百頃魚蝦足歲租十隻鸕鷀是家業橫笛朝衝柳外風浩歌夜弄波心月不嫌湖上有風波世路風波今更多其四煙沈風緊鳴蕭蓼江湖歲晚玄冥肅寒塘日出曉光浮村甕茅柴酒初熟網得冰鱗不入城自灑瓦盆招近局欵乃一聲煙水長葦深江靜燃湘竹和楊鐵崖石湖花遊曲石湖雨歇山空濛美人却扇歌回風歌聲宛轉菱花裏鴛鴦飛來天拍水當時仙伯醉雲門酒䀶翻汙石榴裙遺蹤無復芳塵步湖上空餘昔人墓昔人既去今人來千載風流付一杯雪藕縈絲薦冰碗蛺蝶穿花逐歌板夕陽剛去畫橋西一段春光屬品題傷心不見催花使只有黃鸝啼再四無限春愁誰與箋玉奴會唱紫霞篇新燕篇杏花飛飛春燕來主人花下新堂開花間相見驚相識緑樹東風捲簾入漠漠疏煙碧草齊斑斑小雨春泥濕城中甲第連雲起畫棟朱甍春旖旎故壘能無繡幕思多情却向茅簷底茅簷日暖繡幕寒去來只作尋常看乃知物性無新故世人自爾分貧富我家舊宅經幾遷僅有此屋三年前一朝差池忽在眼便覺華煥生榱椽不嫌香土汚書帙時有飛花落舞筵人言禽鳥得氣先主人貧病何當痊人生未怕常貧賤但願年年見新燕夜坐幽人被酒夜不眠攬衣起坐垂堂前參差花影忽滿地仰見明月流青天微風吹空星漠漠時有羈鴻度寥廓美人不來更漏沈天南縹眇銀河落題三城王畫桃花過牆枝彤宫雨晴春婉婉妍華不隔深庭院試拈丹粉弄春韶淡痕已破東風面醉肌暈碧曉生光脈脈間情眉斂黃不從畫史爭新格自有湛然宫樣粧世謂滕王元嬰善畫蛺蝶花鳥而董遁獨以為滕王湛然未知孰是文氏五家集卷四
