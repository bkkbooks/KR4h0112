body:
  text: 文氏五家集巻七明文彭撰博士詩集上九日遊石湖次白二貞夫韻重陽誰泛石湖船秋水平吞萬里天翠管銀笙空外沸牙檣錦䌫鏡中牽西風著意吹烏帽紅葉如花落舞筵痛飲狂歌非慢世江山佳節自年年宴徐太傅園亭分得才字髙㑹追金谷諸公總上才名山當户列細雨拂簾廻把酒巖花落彈棊水閣開馬蹄歸獨緩知是習池来碧峰寺分得襟字地勝牽幽興僧閒澄道心昔年曽寄跡今日復登臨杉檜丹青古雲霞殿閣森慚余羇旅客乘醉一披襟和王二履吉湖上八絶履吉讀書治平忽枉八絶恍然興故山之想書云壽承故山侣也或能嗣響乎因而和之春到江南何處好石湖山水畫圗開新蒲嫰栁一時緑鸂鶒鸕鶿無數来三月暮春湖水平拖藍潑緑映空明青天倒映芙蓉障畫鷁徐飛錦繡城白鷺羣飛天倒開波揺山動水縈廻峭帆羡殺乘風舸何啻張騫槎上来茶磨楞伽疊翠屛汀州蘆筍立鵁鶄白雲輕薄揺波净黄鳥丁寜喚酒醒山壓晴湖水映山游人日暮不知還行春橋上好風景緑樹紅花滿目斑膓㫁春湖新水流傾城兒女踏青遊郊臺不識吳王事指㸃楞伽最上頭一簇桃花紅欲然數株楊栁緑生烟柰可春光留不住桃花零落絮漫天山西緋桃太含胡竹裏班鳩逐隊呼形勝有餘心獨苦王符閉户草潛夫别徐允升次段子辛韻君昔毗陵别余今白下歸帆飛大江月塵拂帝京衣心逐冥鴻杳愁添落葉稀百年渾去住何必更依依江中曉望萬壑争趨勢獨尊金焦東下海為門朝霞浴日霧欲滅秋氣横空天倒吞荆楚仲宣頻作客沅湘正則㡬招魂聖朝自媿獨貧賤滿目江山總淚痕丹陽道中同嘉弟昨夜乘潮發建康今朝潮落又丹陽天南星斗隨沙鳥江上風烟憶故鄉去住此身元不定飄零吾道孰行藏同舟爾亦同淪落對酒無言淚兩行送華従龍㑹試萬里闗河雪霰侵送君北上意何深風雲巳奮驊騮道霄漢猶縣鴻鵠心京國飛騰誰得似天涯流落獨難禁曲江見說花如錦此日春風滿上林陸原大書舫清游巻不繫身如汗漫仙左圗右史米家船白鷗飛盡青天杳讀到南華秋水篇立春日同彭孔加過袁與之桃花别墅愛爾桃花塢臨溪新草堂烟籠寒篠翠風轉野梅香積雪留殘白垂楊試淺黄山公行樂地時許野人狂春日尋幽賞行行路轉迷忽驚髙柳變似聽早鶯啼翠桁依危峙紅橋度淺堤即㸔新水滿疑入武陵谿新鶯霏霏拂地栁千條烟鎖紅欄十二橋最愛新鶯初出谷緑絲叢裏一聲嬌雨中懐段户部兄弟久雨惟饒睡髙樓苦憶君遥憐前夜月只隔一溪雲碧映船窓水香焚綺幙芸有懐吟不就空自惜離羣九日同王履約履吉過吕氏竹園不作龍山㑹同游吕氏園流雲度秋水修竹隠週垣棊局隨幽磵茱萸照酒罇琵琶彈一曲一聽一消魂華従龍邀遊石湖不赴次韻不到石湖今㡬時故人有約竟愆期非縁心亂辭蓮社却羨山公醉習池卧雲室白雲罨層簷空濛浩無極一卧三十年去来本無迹仰睇見飛揚㑹心自有得欲往従之游雲深不可測贈徐子仁金陵帝王居佳氣鬱以蒼幽人無外慕遯迹含其章結廬城之南謝喧聊尚羊鳥鳴青松下揮麈白門傍芳蘭轉光風蕙帳霏芸香纎鱗時泳躍翠羽恣翺翔對此忘利達日澹心彌良身逢明盛時雅志羞巖廊黙坐草太𤣥髙卧同羲皇朗咏太冲篇逺慕淮南王至理巳云得壽考日以強逍遥塵寰中此樂殊未央虎丘納涼六月不堪城市暑避喧聊復虎丘行珠宫錯落涼飈轉金磬玲瓏午氣清阮籍竹林非傲世幼輿丘壑自多情莫嫌歸棹遲遲發悟石軒前月巳生王繩武同游長干寺寳刹長干外登登紫蔓長曲池縣玉澗幽逕落天香旭日揺金塔纎雲擁畫廊偶同王子敬㸔竹到山房金陵雜歌十絶鍾山屹立羣山趨虎踞龍蟠天下無一代輿圗占厯服萬年形勝屬皇都臺城宫闕鬱相望金釭璧帶生輝光可憐侯景稱兵日尚講空門滅性章段岡三日紀吳功皇象竒書後代崇雨蝕苔侵荒草合何人移置大成宫沈約才華擅一時郊居作賦儉為師野人指㸃東田宅猶說梁王受禪詞遁跡鍾山事隠棲𤣥猿白鶴草堂低一朝出處違初志千載移文憶穉圭南朝諸寺石南門四百八十今誰存可憐惟有長干殿金碧參差勢獨尊陶公掛冠神武門華陽自築貞居室逃名那復論世事笑殺尚平婚嫁畢樂遊苑裏夜啼烏習家池邊春草枯何人得似山公醉試問髙陽舊酒徒蔣山松柏鬱蒼蒼昭明讀書臺巳荒芟煩畧穢見刪述金輝玉映垂琳琅桓伊一日聲輝赫騎従聨翩將逺適青谿橋畔逢王郎下馬停車三弄笛人日竹堂看梅今年春色早人日見梅花香入禪房静影隨初月斜折来烏几亂看去白雲賖東閣無由到詩成恵逺家仲春履吉與之永之小集得草字二月集嘉賓駘蕩春光早白日墮游絲黄鳥鳴聲好𤣥言互剖析至理窮探討觥籌雜笑歡髙懐自傾倒落霞尚遲留初月出杲杲雖無陳遵投亦有魏公掃相期終南山去拾金光草賦得簡寂觀送盧師陳兵部九江秀色結匡廬終静誅苑此卜居苦竹只今遺往蹟斗壇無復拜荒墟揮毫定接宣城筆梳羽咸看司馬車王事有程留不得却將佳麗付圗書聽鄰舟吹簫風急船難進春寒酒易消他鄉頻作客何處忽吹簫近水聲偏細凌虛興自豪可憐嬴女思飄泊在江臯舟中與顧貞叔夜話燭短光猶白茶傾火尚紅論心聽夜雨把袂怯春風浩浩江湖濶茫茫宇宙空茆山明日上羨殺葛仙翁雨中過紫陽橋狂風驟雨濕征袍據蹇微吟興亦髙只恐前身同鄭五灞橋何似紫陽橋道中望上宫䇿蹇行行路轉深上宫臺殿鬱森森朱旛縹𣺌雲中影玉磬玲瓏空外音丹竈有時窺白鶴砂牀何日試黄金我来欲訪茆君跡古洞雲封不可尋題折枝桃花折得桃花拂袖香美人含笑立東墻無言亦自成蹊逕解語争教不㫁腸題芭蕉士女雲鬢氷肌態横生釦階璚砌照人明午窓夢醒渾無事閒看芭蕉獨自行予既和履吉八絶因思湖上四時之景有不減於春者摘其可愛更賦六首朝霞明滅起来遲爽氣氤氲獨立時紅日未昇湖水浄五雲飜映碧琉璃飛霞散綺日欲落須㬰星斗生光芒鳴榔何處漁歌起欸乃先聞餘韻長月色湖光相盪射好風吹送水香來金鱗翠鬛漁人事擊鼓澄波似可哀五月山頭梅子肥絲絲細雨隨風飛衝泥蓑笠橋頭望得意漁舟先自歸久雨初晴花滿烟水清沙白静涵天雙飛燕子歡相語對浴鳬鷖喜並眠飛雪堆山山失翠動揺湖水白争光虛疑柳絮春風惡却喜梅花吹暗香舟中望靈岩方舟下横塘並駕趨𤣥墓出郭未十里而與靈岩遇江山信有靈塵囂巳殊路𤣥雲接琴臺朱藤縁狡兎吳王昔全盛離宫矗無數宸遊無定居鑾輿此恒駐飛甍臨絶巘曲水蒼龍渡凝雲遏清響繁花映華輅廊餘響屧名洞遶西施步一旦市朝變荒烟滿山樹繁華不須臾倐忽譬朝露彼美五湖人終為脫塵霧擬古大明覯暘谷納照稱物情商飈起天末而有巨細聲造化靡所私物我自不平至道無端倪六合隨虧盈一有不足者中心勞逢迎卓哉仲尼徒千秋誰與京䝉莊與李耳終令後世輕彈琴虛窓下悠悠太古心吾意有所感孰審少原簮蚩蚩市中兒知聲不知音鍾生伯子感荷蕢孔所欽此道久寂寞千載和氏琛鼓希黙然坐泪落沾羅襟仰睇浮雲征俯觀江漢流浮雲飛不定川流去不休俯仰既如此吾亦何所求人生在世間倐忽譬蜉蝣雖非金石堅百年寜悠悠往者不可及來者猶可修石頭城鍾山開帝宅天塹控神州夾道朱樓擁摩空貝闕浮興亡餘六代形勝屬三秋書劍十年夢蹉跎亦壯遊雙林里幽人樂大隠卜築雙林里翠樾落重隂清風散虛几誰能受拘纏吾道任張弛考槃磵之阿于以忘青紫侍顧華玉丈上方玩月晨䇿入石湖落景憇上方上方連巘崿疊障通河梁窈窕入深谷﨑嶔陟崇岡秋深氣蕭瑟雲薄天蒼涼萬木振長風羣卉彫嚴霜遐觀諧夙心周覽窮八荒徑仄步逶迤崕傾身低昂縁葛采石筆捫蘿拾蘭芳矯首睇飛鴻俯視空茫茫皇皇殿閣森霏霏靄霧黄望望皓首白耿耿銀河光坐久涼颸集泫露沾衣裳佳㑹合章縫友朋亦孔良緑醑何淋漓各舉浮白觴自憐骯髒骨零落同髙陽邂逅山公醉容我禰衡狂山水能娛人為樂殊未央夜静心益閒天籟雜鳴螿安得孫登徒長嘯和鸞皇何如王子晉緱山吹笙簧懐哉鴟夷子功成謝岩廊眷言仰前修千載永相望懐石湖不到石湖三十日猿驚鶴怨草堂隂竹林酒伴虛佳㑹野寺鶯花廢短吟自是窮途多慟哭非闗在坐少知音平生性癖耽山水未脫樊籠違素心訪雪次施侍御韻為袁邦正賦雪發山隂興須烹掃雪茶𤣥談消世慮淑氣動春華玉漏香沉燼青燈夜吐花孤吟成底事句穏足生涯徽州吳君得妙法製墨賦詩贈之新安松枝燒不絶紅霞碧焰相糾結收烟調搗三萬杵練作𤣥霜烏玉玦設来几案對端侯雲浮烟散光澄澈落紙三年不昏暗一㸃霜紈漆無别廷珪巳矣潘谷死此道只今誰得比水晶宮客汪廷器吳郎繼之真二美時時贈我兩三丸光黒異常心獨喜日日用之無間㫁經嵗方能半寸毁黄金可得柰墨無莫輕目前惟重耳嗟余不欲磨世人願得一笑臨池水訪顧子諫龍石山居愛爾村居好幽栖興不窮晚烟凝樹白霜葉映山紅飯煮香秔稻茶烹顧渚封明朝向城市不必念泥鴻夜宴子諫書齋啟窓見月喜而再賦徑僻無人到柴門夜不闗清樽開緑醑白月掛青山室静心逾妙香銷意亦閒無論去與往且復破愁顔送陸幼靈宰攸縣丱角即相知老大傷離别離别未足惜所悲在嵗月嵗月不我待種種巳白髮憶昨少小時所志在功業悠悠卒無成興言忽心熱送子雖云逺長沙亦宦轍親民惟令尹吾道在用拙能寛一分益定有近者悅貧賤吾常事衣食不茍缺富貴自有時榮華易消歇世人徒碌碌吾言非漫說執手無他言相期堅晚節新秋樓居難避暑一雨掃煩蒸蹔喜干戈洗欣看黎庻寜涼風期白苧爽氣薄青燈筆硯雖堪近悲愁賦未能湖上開嵗常懐湖上遊干戈阻絶未能酬水光山色依然好紅葉青松無柰秋驅㓂曽聞當日喜漁歌猶有昔時愁獨憐鷗鳥汀洲上來往飜飛得自由鷃林八景詩為趙都諫賦鳳皇山髙挿天青鳳皇山下雲冥冥雲消雨歇總無迹叠叠烟嵐虛翠屛右鳳山雨雲皚皚白雪擁龍峯萬壑千岩在畫中貰得新醅開小閣褰幃正對玉芙蓉右龍峯霽雪傍郭青帘入望髙酒香春煖思陶陶杖頭攜得青錢在更拉隣翁過小橋右南郭酒旗車輪馬足擁飛塵來往闐闐實要津莫問王陽廻九折崆峒散髮是何人右東岡使節銀河飛下九天寒濺玉飛珠映石欄盡日迎風看不足不須竒勝慕王官右石澗水簾望中燈火燦斑斕獨有髙人静掩闗世事不須論感慨都來只隔一溪間右市橋燈火春來雨足漲桐溪片片飛花落岸低自啟柴門閒倚杖静看新水浴鳬鷖右桐溪春漲荻花飛盡晚蒼蒼月照陂塘秋露涼碧霧漸消光漸滿悠然一曲和滄浪右柳塘秋月胡總制受王直降有詩志喜因次其韻出師本意戮鯤鯨擬掃妖氛繼頌聲心服巳看頻稽首威加咸各荷餘生便宜總得中權重處置深知妙筭成不用拊髀思衛霍海濱原自有長城初夏遊烟雨樓郭外空濛烟雨樓飛甍岌嶫峙中流三江形勝風濤轉萬井鶯花雉堞浮此日雲中見鄉國何時天際有歸舟停杯莫惜斜陽下新月纎纎暎逺洲遊鴛鴦湖示項君秀水亭前水荇香鴛鴦湖上浴鴛鴦逺天簫鼓迎歌扇倒影樓臺浸女牆華槳夷猶衝菡萏竹枝欸乃和滄浪莫言煩暑無由避月照波光玉露涼獅子林古石棱棱古寺西竒形怪狀類狻猊虗疑苔館深深見實有雲生冉冉低白石燈明禪課了青蓮花放梵音齊只愁三宿還生戀恵逺何妨一指迷樾徑入門百本循墻樹六月曽教落翠隂乍到只疑天竺國坐来元是比丘林森森古殿丹青剥細細苔花錦繡侵讀罷楞嚴