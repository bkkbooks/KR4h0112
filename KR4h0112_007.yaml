可憐水清沙白净姢姢瑶杯停手風生渚翠管迎船月在天静裏懐人黄鳥渡醉中開巻白雲篇落霞一片漁歌起却憶鴟夷思惘然余有别業在笠澤之上嘗課耕於此因閱黄太史漁父詞喜而繼作聊以述其自得之樂也槲葉新罾舴艋船衝風逐浪去如烟無姓字少牽纏儂住吳淞不記年春煖融融雪乍消江頭潑潑長春潮風漸起浪初髙網得江鮮破寂寥無利無名一老翁筆牀茶竈任西東陸魯望米南宫除却先生便是儂山逺江深無四鄰烟波惟有一漁綸鳬鴈侣鷺鷗親自是人間快活人吳淞江上是儂家每到秋來愛荻花眠未足日初斜妻喚船頭看落霞釣得鱸魚不賣錢船頭吹火趂新鮮樽有酒月將圎落得今宵一醉眠八月斑魚逐曉風家家方出釣魚䂬鰕作餌竹為弓睡起朝來日影紅夜深結網一燈紅吹笛鄰舟攪睡濃雪夜月雨晴風都是漁家一醉中臘月捱氷上白魚衝風冒雪欲何如膚欲裂手仍拘免得求人樂有餘人日訪沈氏兄弟新年多雨雪人日尚隂氛世事已如此勞生何足云草堂誰寄語故友惜離羣他日相思處吳淞江上雲穀日迎春見雪雪霰集崇朝紛紛墜復飄春從明日至臘向此時消不恨遲梅蕋行將變柳條豐年應足兆隨意老漁樵春日東郊訪盧文厚春日東郊外風光事事新杏梢紅欲破柳色緑初勻野水侵溪岸輕風起陌塵數椽茅屋底愛爾獨安貧伯起入山有懐草草還山去應嫌城市喧避人修静業散帙愛空門嵐翠迎窓潤鶯聲入耳繁石湖春色好羨爾獨傾尊題孫氏清䕃閣次孔加韻孫侯賜第吳邑東華堂虚敞生清風朱欄繡幙看不足别開小閣居其中一逕逶迤曲曲通窓前一樹青梧桐覧輝威鳳下髙幹窺人紫燕穿簾櫳清樽坐上客常滿主人霏雪呈雕龍豈無勲業繩祖武自愛大雅多舂容豈無韜略同儔軰所志不在敵與戎平生巳有清秘癖昂藏獨立羞雷同眼前萬事不如意欲移王屋追愚公世人嗤君迂且庸胡為不為横與縦君言世人知而通胡為碌碌徒書空横琴在膝月在牖何必執㦸隨揚雄相如逸才命運窮著書不得從東封焚香獨坐對髹几聊當燕然勒石功題畫馬閒來快讀馬蹄章任性全身樂正長内廏豈無尋丈地令人伏櫪憶孫陽王希堯自𤓰州過訪忽爾辭京口飜然訪敝廬寒雲殘臘盡落月夜窓虚世事惟看鏡生涯好著書扁舟揚子渡悵望獨愁余春城閒眺閶闔城頭春草長緑楊早巳滿横塘桃如解語垂垂發燕亦多情故故忙雲白天青山疊翠日髙風煖水生香無端盡日溪邊坐典却春衣醉夕陽壽郡伯胡公乃翁八袠君不見西華之山凌碧虚鍾靈毓秀神仙居盤礴日月枕扶輿廣平方成委丹廬黄苓紫芝無處無青鳥白鶴時相呼金燈交錯如珊瑚懸崕窈窕通蓬壺我聞維嶽降甫申山靈集聚多竒珍異人往往乘時出飄颻不縛寰中塵道髙徳卲常轗軻媿殺腐䑕羞鵷雛豈無勲業動當世不勞政事躭文儒歸來自理山中屋整頓松筠友麋鹿有時長嘯學蘇門一似陶潛愛籬菊三十年餘變鬒髮閉門不問黄金闕讀書養性還灌園山中四時知嵗月閬風𤣥圃不可居閒来學得飡霞法洞中僊侣時相逢八十優游樂無窮上友安期浮丘公下揖子晉葛仙翁璚裾玉舄氣瀟洒手揮如意談𤣥空百年去去即常生服食不須毛骨輕南極耿耿垂明星西望佳氣雍州城綵衣迢迢阻江麓養志至今食君禄髙堂不得試兒啼霞觴遥進杯中醁吳門有士卧空谷為君髙歌鶴南曲題蹴踘圗莫問三郎沉醉無毬塲握手笑相呼繁華消歇須臾事傳得當年蹴踘圗秦淮閒泛秦淮秋净水生紋看見鍾山起白雲但得畫船常載酒不妨疊鼓散鷗羣雨華臺石頭城裏㡬廻遊萬里孤鴻下逺洲落日雨華臺上望山青雲白正宜秋走筆和張伯起郊園感懐澤國風光何處好伍胥祠下百花洲相看只隔盈盈水悵望還生𣺌𣺌愁正是湖山凝逺眺可堪雲日麗清秋何當獨買扁舟去茶磨山前爛漫游海棠山鵲萬里春光蕩冶情海棠晴晝太憨生捲簾不覺游絲墮忽聽一聲山鳥鳴滄浪亭昔日蘇公遊衍地于今清勝屬髙僧虛亭獨坐渾無事惟有楞嚴一巻經對月有懐胡季孚呈孔加伯起放棹辭城市虛堂早見招停杯新雨歇對月故人遥愁裏睂頻蹙風前首重搔翻思前夜别魂向一時消空侯春風衆樂奏空侯怨抑多為君彈一曲公今無渡河上巳石湖祓禊風光日漸遲川原淑景移逢兹少長集攬此湖山竒上侍白髮親正乃芳春時禊事聊爾修觴詠隨所之心曠神亦怡豈惜滯還期楞伽同曲水三日恣游嬉新正六日山行見梅花開嵗隂隂今日晴梅花的的照人明入山早巳饒春色對景寜忘感物情海外烽烟無上䇿天涯勲業媿浮名明朝人日尤難遣貰得新醅且自傾二月三日大雪因憶往嵗石湖看雪亦是日也倭寇未寜城中戒嚴不得出遊有懐却寄季孚憶昔楞伽看雪時梅花萬樹玉叅差頻年蹤跡空魂夢此日湖山阻亂離俛仰嵗時如信宿蹉跎事業媿相知春風爛漫原無限只恐時清未及期玉陽仙選壽史恭甫玉陽之山雲英英玉女祠前春水浤仙人騎鹿過東海相邀服食修長生嘈嘈笙鶴來雲軿蔡經初見王方平有時月底聞歌聲分明馭氣遊蓬瀛人生此樂真自得百年去去隨虛盈富貴囂然直可輕有才不用空浮名即今甲子巳一週巗壑放浪無逢迎君扳玉樹肯相待我欲從君禮太清次韻荅李太史曽試山中茗無如雨後泉浮花凝白乳然竹散青烟禪榻論文細虛堂晤語𤣥何當謝塵鞅來結碧山縁雨後山行次華學士子潛韻夙有登臨癖新涼豁素襟羣公皆建業髙㑹儗山隂覽物知時改談𤣥悟道深水流看不息隨處洗塵心夢中題朱竹淇園一雨洗塵埃忽變朱顔破緑苔春夜珊瑚暎燈火丹山赤鳳下瑶臺題南橋范子潤園亭仲夏園林好薄隂碧樹重孤花猶灼灼一鳥鳴嗈嗈幽逕抽新竹清風奏古松新茶煮初熟有客忽過從二月一日大雪同孔加魯仲公瑕嘉弟遊虎丘曲逕深埋短簿祠行行如失白蓮池髙臺層叠銀成砌古木横斜玉壓枝弭害已占盈尺瑞陽春難和郢中詩梅花不是違時候只待東風次第吹暮春遊虎丘悟石軒前草似茵劍池水滿碧粼粼浮圗麗日諸天逈新緑敷隂萬樹勻不到一年如隔世尚餘三日是殘春艱難莫問烽烟事濁酒隨時且慰人虎丘别諸親友風日虎丘好諸親送我時殷勤一杯酒巳作隔年期身為浮名累心猶故國思他鄉見花柳折得寄憑誰蓮花寺㸔桃花貧賤出門難那知花事闌已愁連日雨更怯一春寒野寺雖牢落夭桃猶未殘偶然乘興過隨喜一回看四飛山莊示肇兒創業誠非易躬耕也自便儉勤知有益辛苦自無愆巳喜通阡陌還宜近簡編㑹深耕讀理應自有豐年訪唐應徳荆川别業久負論文約相違頻夢君碧山開别墅白社鎖閒雲㑹晤偏難値懐思空未聞王猷興盡返鼓楫動鷗羣期遊平山堂不果春盡揚州水拍堤堤邊楊柳緑絲絲髙懐儗向平山盡勝日難將樂事期山色有無空秀句心情感慨惜多岐明朝又逐紅塵去回首烟霞繫我思和楊𢎞之大叅遊金山見懐金山三月暮春遊麗日澄江銷客愁自愛廻瀾臨砥柱非闗望海上髙丘叅差臺殿中天起浩蕩乾坤日夜浮勝賞巳知君獨擅郢中佳句自難酬早發揚州至邵伯湖早發揚州路行行邵伯湖輕舟隨社鳥落日下平蕪汨沒漁舟杳蕭條旅思孤憑將一樽酒隨意宿前途漂母祠漂絮淮濱知㡬人當時誰復念王孫莫言此日千金報自是難忘一飯恩泊舟八里灣久旱苦無水泊舟八里灣風生沙撲面霞起日沉山深夜聞愁語侵晨候啟闗従来知世路羨殺白鷗閒師家閘水澀舟膠春晝明振衣隨步得閒行萬株楊柳縁堤古一帶清泉觸石鳴無數青山圍秀色有時黄鳥度新聲不堪沛北風塵路翻動江南行樂情連日無水日行五六里十二日自魯橋至石佛一日過五閘喜而有作日日問前途還應有水無傳言半疑信欲進且躊躇忽爾河流駛全消旅思孤一朝行五閘世事若為虞南旺輕風獵獵薄新蒲喜得闗河春未徂白鳥衝波隨舴艋緑楊隔岸喚醍醐千金汶上空遺跡一片江南錯自呼辛苦驅馳縁底事令人對酒媿漁夫將至京作神京縹𣺌接三台驛路春光景物催魚躍驚濤迎浪轉燕巢髙岸逐風廻射時商賈争先後候閘舟航滯去来一自隗生身顯後有誰把酒酹荒臺潞河道中聞東倭猖獗滄州去去是天津又逐鷄聲潞水濱世路艱難青眼盡浮名奔走白頭新柳枝標淺依依近燕子迎船故故親漸近神京方自慰不堪鄉國有風塵舟中見白燕擊鼔開船遡上流行行日巳近皇州㸃波白燕驚人眼出樹青帘動客愁千里音書空入夢中宵月色又當頭久拚世事蠅蝸外他日終師馬少游見月去去通州道紅塵撲馬鞍行將趨象魏夢巳入邯鄲未問隗生里先彈貢禹冠舉頭明月在不覺是長安初至京旅食到京華春深何處花感時空老大獨坐每興嗟素乏資身䇿新添罩眼紗出門三閱月無日不思家文氏五家集巻七
