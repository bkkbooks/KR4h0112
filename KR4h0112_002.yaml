body:
  text: 文氏五家集卷二明文洪撰淶水文集易水弔荆軻賦先生執教於淶惟古是懷于遊于觀城郭之隈實惟易水經之遂放舟而徘徊嗚呼星移物換遺事不消蒼波激寒北風蕭蕭古人之悲今人之嘲也嗟祖龍之雄驁兮將六邦而一噬今夕納此城兮旦已屠彼之地雖縱橫之異䇿兮咸坐盡於一弊何子丹之狂兮又佐以卿之昧將科頭而編須兮刃虓虎於一試胡為其智之剽兮乃謀人之太易於是白氣貫霓太陽不輝圖斂七縮壯士遂西至於負劒一拔身膏異庭豈燕秦之德殊致而其力之異形哉譬之兩獸相值雖必鬭於卒然之頃然其最輕而勞者必先殞稍重以逸者猶且生也徒使見者膽喪聞者氣折弔卿九原千霜未歇而況素耳其所由今目其所涉者乎彼如責以大義譏其小諒固理之當豫亦同狀靜而思之死非可嗜命豈再捐卿則失矣而豈無加於人焉者乎曷不觀諸無才無德癡頑老子彼安知此邪又不觀諸賣國賊璨死其宜矣彼豈求是邪若為友以死者亦禮經之所許也但死而得其所者斯太山之重而至難耳弔罷情豁命駕歸只涼飈四起落照在水逰黃金臺故址記余少讀書見古賢君哲士之遇合有遺迹在天下未嘗不思得以即其地而慰吾懷也成化乙未以乙榜授易州淶水教諭淶水古燕趙之衝燕昭求士黃金臺在焉思一登而弔之未暇也戊戌之夏海虞桑民懌授泰和訓導將自京師赴潁上乃紆道訪余於淶留數日因談邑中古迹謂斯臺之遊不可負也於是戒僕馬載酒肴偕民懌往臺距城若干里有浮圖為識而臺之故址莫考焉訪於里人指土壠以為是乃相與披榛莽循蹊徑登而覽之但見喬林茂草荒煙落日而已因慨念當時之事雖出戰國縱橫之習而有戾於聖賢出處之義然而昭王下士之誠足以訓天下之君而郭隗之言亦足以激天下之士去今數千載人境俱泯而其名不與俱亡豈幸而致哉酒酣民懌援筆為賦鏗訇瀚漫與兹地稱余欲繼而未能乃記其事而系之歌歌曰國求士兮無金與臺士逺千里兮其誰能來燕王郭子兮今何在吾與子兮空銜杯以徘徊龍遊從學記景泰某年舅氏張宗德先生以乙榜教諭衢之龍遊於時洪方以家庭子執經授業而先生駕言于邁洪念不能往從垂成之業無所於卒將遂棄而他圖先生不可言於家君曰若子猶吾子也其學之成與否吾均責焉比行遂持以去至止於兹三十有幾月矣披摘吟誦弗敢自佚而遊道日廣從朋去來不能無所適而中心有不釋然者則以大人垂白而弱弟稚未更練傍無強近親戚仰給無所他時榮顯不可逆計而一時旨甘之奉或缺焉則洪不能辭罪矣深居歎恨或中宵淚零不能已已友人胡彥超知余所嬰每加慰洪曰子之志善矣而不必以是自歉也聞之先師曰父母在不逺逰豈不以定省不可缺而滫瀡之奉非可假人邪然在當時四方之士違其親學者豈少哉言遊吳人至輕千里而學於魯當其時其親在與否雖不可知而諸子之近而非魯人者豈皆無親哉未聞夫子之拒之也使士當學而不當從師逺逰則夫子當拒其來矣子遊子之鄉人也固子之所當法也龍遊視吳與吳之視魯何如哉子惟自奮以取功名求所謂孝之大者可也定省之業昔人所重然固小之為道也子亦求其大矣乎余聞之躍然曰命我矣因筆而為之記送别駕鄒君之任杭州序成化某年月詔以淶水令安福鄒君某同知杭州府事於是君辭淶赴杭行有日矣淶之士民不忍其去也謀所以致其情於别離繾綣之間乃相率播之聲詩誦君之勳德而推敘於余余典教於兹得於表率之餘知君為深而以文字為職有不得辭而又有樂為君道者君始以高科起家尹劇邑績最升朝拜監察御史激揚振肅譽籍籍起班行中俄以注誤左遷淶陽淶陽鄙小邑而近臨邊徼民貧而悍冦盜衝斥又當輦轂之衝近習中貴與夫將校往返徴索無虛日前政視如束濕君至以禮自律以法繩下而深惻民隱未嘗以謫宦自佚於是政平訟理道化大行民方賴之而君以遷去不得終惠乎淶淶之民有遺望焉豈不以不能久任乎君為宰銓衡者責也而不知其間有不可已者君之才非可以一邑淹也蓋君為邑而邑理在諫而諫行今兹佐郡亦推行而已又當無不治者吾知自佐而守由守而藩臬進而台司皆將自此而升也一郡一邑果足以淹君乎哉是為敘送顧彥昌北還敘余雅性喜交遊方鼓篋庠校弗克求友於天下或時聞人道天下之士有類君子者未嘗不識於心比歲獻藝春闈識顧君彥昌焉入吾意著吾耳目有足信其為君子也既而余辭乙榜歸吳不得與之遊從方竊念之乃明年冬彥昌自京師來吳省其舅氏王時勉先生先生吾姻家也因得周旋其間接其論言挹其容儀端直清修卓然君子也自冬徂春凡數閲月其間良辰勝敘必偕二三佳友厯吳中諸山而遊焉或宴歌遨遊或徘徊弔古豪談博辨意氣慨然初不計功名之得喪身世之窮達也余乃益信其所存所養有非目前流輩所及而區區亦益自慶其取友之不妄未幾將去吳而歸而吳之人士與之遊者不忍其暌而去也謀所以贈處之義而時勉徴言於余余告之曰古之君子誦詩讀書而上交千古尊賢好善而下交一世蓋欲萃天下之善會天下之理其理會於心而用無不周善萃於身而體無不具體具用周而才德之出衆者吾見亦罕矣若彥昌往還湖海而半交天下之士則亦有以就其德不讓乎古之君子矣豈易得哉以不易得之人而處於易得用之時吾見其飛騰而去不終於此棲遲也彥昌行矣余亦有事進取明當遲余於青雲之逵斯言其左契乎明故昭信校尉蘇州衛百戶夏宗源墓志銘昭信校尉蘇州衛百户夏君宗源以成化丁亥八月七日卒於家鄉之大夫士暨衛所府邑官僚相繼往弔巷隘不能容車馬行道之人咸惜之曰非是人曷克臻此君之先府君與余家君同娶於張余於君為從母弟君少孤與余同學於外氏時外大父升逺翁撫愛特至恆朂余二人曰汝輩當交勉期並樹立母為有先後也既而君以父蔭補官大植門户名聞赫然而余在困厄者幾二十載甫及領薦而君又已奄忽棄去其情有足悲者及葬君之子禮持狀踵門泣且請曰知先人者無踰叔父藉不朽之言以重先人幸莫大焉嗚呼吾忍銘吾兄之墓耶又忍不有言以慰吾兄耶按狀君諱源字宗源姓夏氏世為光州巨族曾大父福仕勝國為參政入國朝從太祖高皇帝戰纍有功授百戶大父瑀襲其職遂官於蘇父鐸早卒君生九年而孤甫十有六而官咸以少而易之而君卓卓自立有所區畫偉然如老成人及長益更練有識衛有難重事率君處分君刃迎節解無絲髮壅滯遇事不可為衆束手無措君至莫不釋然性至孝以父早亡母氏厲節撫已而養皆弗逮言及輒垂泣不已而事祖母極謹尤謹於祭祀其治家嚴而不苛與人交和而重義又能赴人緩急平生藥疾槥死飯飢燠寒常若不及景泰間歲儉有租數百斛悉捐弗取雅喜接賢士大夫雖急遽未嘗厭怠而嘉儀令辭有足動人者故一時名臣碩德往往樂與之交嘗遣禮從余遊所以望之者甚至禮亦修謹嗜學學成而君逝矣惜哉君生永樂壬寅二月十日享年四十有六娶阮氏蘇州衛千戶武略將軍讓之女生禮及禎禮襲其官娶喻氏禎娶某氏女二長適左所千戶唐𢎞次適右所千戶闔某子謹卒之又明年己丑十二月庚申葬吳縣支硎山新塋銘曰孰不有生維立則成孰不有官維克之榮吁嗟夏侯德音孔宏既操之貞亦志之行弗隤厥聲胡弗永其齡方壯而傾有鬱支硎是維佳城尚安于兹以永無驚趙公世本墓志銘余姻趙公世本既卒其孤謙將治葬以余知其父行之詳也泣請銘墓不獲辭遂敘而銘之公諱興祖世本字也姓趙氏世為蘇之長洲人自高曾而下皆晦迹弗耀大父某始以才諝薦起仕國初為池州青陽丞父原潾母顧氏公自幼能砥礪志行初原潾從青陽君宦遊青陽卒貧不能歸留金陵久之既而挈帑還業將有營立未遂而亡公方髫齓傍無強近親戚孑然無所顧藉遂刻力事生握勞操苦不數歲遂大植門户而其持身終始一以儉朴雖故楮弊幃必緝而藏之旋出以副所需莫不適用生平恆以弗逮養親為憾四時奠獻必誠必潔而事繼母陸尤極孝敬御宗黨必以恩而能以義自持嘗誨諸子曰治身治家皆當以勤儉孝弟為本吾幼孤弗暇從學而先緒賴不墜者事此耳又以家世播遷之餘門祚衰薄思有以振青陽之業遣孫璚補郡庠弟子員凡所以教督䇿厲者無所不用其至晚年以家付子若孫徜徉詩酒間佳時勝日必命賓友具酒肴遨逰山水間悠然自適蓋不知其老而耄及之也嗚呼達哉成化丙戌十二月乙卯以疾卒距其生洪武辛未十二月丁亥享年七十有七配同郡徐氏子男三人長謙娶陸氏次讓娶周氏又次誠娶葉氏女三人適黃以安陳智顧庠孫男四璚瑢瑄璉女一曾孫男三女二于成化戊子正月二十四日葬吳縣至德鄉仰天山之原銘曰既儉亦勤植維其門孝弟恂恂康維其身匪康則身貽其子孫尚千百年斯其永存文氏五家集卷二
